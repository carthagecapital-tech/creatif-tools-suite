<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #0f0f16;
    --border: rgba(255,255,255,0.07);
    --accent: #00d4aa; --accent2: #00b894;
    --text: #e8e8f0; --muted: #6b6b80;
  }
  html, body { height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; }

  .demo-bar {
    flex-shrink: 0;
    display: flex; align-items: center; gap: 1rem;
    padding: 0.6rem 1rem;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .demo-bar-title { font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 0.5rem; }
  .demo-bar-title::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .demo-bar-meta { color: var(--muted); font-size: 0.8rem; }
  .demo-bar-spacer { flex: 1; }
  .demo-bar-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text);
    padding: 0.4rem 0.85rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer;
    font-family: inherit; font-weight: 500; text-decoration: none;
    display: inline-flex; align-items: center; gap: 0.4rem;
    transition: border-color 0.2s, background 0.2s;
  }
  .demo-bar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .demo-bar-btn-primary { background: var(--accent); color: #0a0a0f; border-color: var(--accent); }
  .demo-bar-btn-primary:hover { background: var(--accent2); color: #0a0a0f; }
  .demo-bar-close { width: 32px; height: 32px; padding: 0; display: grid; place-items: center; font-size: 1.2rem; line-height: 1; }

  .demo-frame-wrap { flex: 1; position: relative; }
  .demo-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; background: #050505; }

  .demo-overlay {
    position: absolute; inset: 0; display: none;
    align-items: center; justify-content: center;
    background: rgba(5, 5, 15, 0.94); backdrop-filter: blur(10px);
    z-index: 10; padding: 2rem;
  }
  .demo-overlay.active { display: flex; }
  .demo-overlay-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 2rem 2.25rem; max-width: 460px; width: 100%; text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
  }
  .demo-overlay-icon {
    width: 56px; height: 56px; border-radius: 50%;
    background: rgba(0, 212, 170, 0.12); border: 1px solid rgba(0, 212, 170, 0.3);
    display: grid; place-items: center; margin: 0 auto 1.25rem;
  }
  .demo-overlay-icon svg { color: var(--accent); }
  .demo-overlay-card h3 { font-size: 1.4rem; font-weight: 800; margin-bottom: 0.6rem; letter-spacing: -0.02em; }
  .demo-overlay-card p { color: var(--muted); margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.55; }
  .demo-overlay-actions { display: flex; flex-direction: column; gap: 0.6rem; }
  .demo-overlay-btn {
    padding: 0.85rem 1.25rem; border-radius: 10px; font-weight: 600; font-size: 0.95rem;
    text-decoration: none; cursor: pointer; border: none; font-family: inherit;
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    transition: background 0.2s, transform 0.15s, border-color 0.2s;
  }
  .demo-overlay-btn-primary { background: var(--accent); color: #0a0a0f; }
  .demo-overlay-btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
  .demo-overlay-btn-secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .demo-overlay-btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .demo-timer {
    color: var(--muted); font-size: 0.8rem;
    display: inline-flex; align-items: center; gap: 0.4rem;
  }
  .demo-timer strong { color: var(--text); font-variant-numeric: tabular-nums; }
  .demo-timer.warning strong { color: #f59e0b; }

  if (!appId || !APP_META[appId]) {
    document.getElementById('appName').textContent = 'Unknown app';

    document.body.insertAdjacentHTML('beforeend',

    return;
  }

  const meta = APP_META[appId];
  const appName = meta.name;
  const appPrice = meta.price;
  const etsyUrl = meta.etsyUrl;

  // Set the iframe to the app file
  const frame = document.getElementById('demoFrame');
  frame.src = `/apps/${appId}/index.html`;

  // Update UI
  document.getElementById('appName').textContent = `${appName} · ${meta.tagline || ''}`;
  const buyBtn = document.getElementById('buyBtn');
  const overlayBuy = document.getElementById('overlayBuy');
  buyBtn.href = etsyUrl;
  overlayBuy.href = etsyUrl;
  buyBtn.textContent = `Buy on Etsy — ${appPrice} →`;
  document.title = `${appName} — Live Demo | Creatif Tools`;

  // Close button
  document.getElementById('closeBtn').addEventListener('click', () => {
    if (window.opener) {
      window.close();
    } else {
      window.location.href = '/';
    }
  });

  // 90-second demo timer
  const DEMO_LIMIT_MS = 90 * 1000;
  const overlay = document.getElementById('demoOverlay');
  const timerEl = document.getElementById('timer');
  const timerSeconds = document.getElementById('timerSeconds');
  const dismissBtn = document.getElementById('overlayDismiss');
  const dismissedKey = `creatif_demo_dismissed_${appId}`;

  // If user already dismissed in this session, don't re-trigger
  let dismissed = sessionStorage.getItem(dismissedKey) === '1';

  let remaining = Math.floor(DEMO_LIMIT_MS / 1000);

  const tick = setInterval(() => {
    remaining--;
    if (remaining <= 0) {
      clearInterval(tick);
      timerSeconds.textContent = '0';
      timerEl.classList.add('warning');
      if (!dismissed) overlay.classList.add('active');
    } else {
      timerSeconds.textContent = String(remaining);
      if (remaining <= 15) timerEl.classList.add('warning');
    }
  }, 1000);

  // "Keep exploring" button
  dismissBtn.addEventListener('click', () => {
    dismissed = true;
    sessionStorage.setItem(dismissedKey, '1');
    overlay.classList.remove('active');
  });
