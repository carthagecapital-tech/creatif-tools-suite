                html += '<div><label style="font-size:0.72rem;color:var(--text-secondary);font-family:var(--font-mono);">Effect / Outcome</label><input type="text" id="mar-prn-effect" placeholder="e.g., Pain relieved" style="width:100%;font-size:0.8rem;"></div>';
                html += '<div><button type="button" id="mar-prn-give-btn" class="btn btn-teal" style="font-size:0.8rem;padding:0.4rem 0.8rem;">Log Administration</button></div>';
                html += '</div></div>';
                html += '</div>';
                return { html };
            }

            function bindMAREvents(patientId, formId, updateData) {
                const formBody = document.getElementById('form-content');
                if (!formBody) return;
                // Add med button
                const addBtn = formBody.querySelector('.add-med-btn');
                if (addBtn) {
                    addBtn.addEventListener('click', () => {
                        const data = getFormData(patientId, formId);
                        const meds = data.medications || [];
                        const newMed = { id: crypto.randomUUID(), name: '', dose: '', route: '', frequency: '', isPRN: false, indication: '', givenStatus: {}, holdReason: '', prnGiven: [] };
                        updateData({ ...data, medications: [...meds, newMed] });
                        renderFormContent();
                    });
                }
                // Delete med button
                formBody.querySelectorAll('.mar-del-med-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const data = getFormData(patientId, formId);
                        const idx = parseInt(btn.dataset.idx);
                        const meds = (data.medications || []).filter((_, i) => i !== idx);
                        updateData({ ...data, medications: meds });
                        renderFormContent();
                    });
                });
                // Text field changes (name, dose, indication, holdReason)
                formBody.querySelectorAll('.mar-med-name, .mar-med-dose, .mar-med-indication, .mar-med-hold-reason').forEach(inp => {
                    inp.addEventListener('input', () => {
                        const data = getFormData(patientId, formId);
                        const idx = parseInt(inp.dataset.idx);
                        const field = inp.dataset.field;
                        const meds = [...(data.medications || [])];
                        if (meds[idx]) {
                            meds[idx] = { ...meds[idx], [field]: inp.value };
                            updateData({ ...data, medications: meds });
                        }
                    });
                });
                // Select changes (route, frequency)
                formBody.querySelectorAll('.mar-med-route, .mar-med-freq').forEach(sel => {
                    sel.addEventListener('change', () => {
                        const data = getFormData(patientId, formId);
                        const idx = parseInt(sel.dataset.idx);
                        const field = sel.dataset.field;
                        const meds = [...(data.medications || [])];
                        if (meds[idx]) {
                            const isPRN = sel.value === 'PRN' || (field === 'frequency' && sel.value === 'PRN');
                            meds[idx] = { ...meds[idx], [field]: sel.value, isPRN: isPRN || meds[idx].isPRN };
                            updateData({ ...data, medications: meds });
                            if (field === 'frequency' && sel.value === 'PRN') renderFormContent();
                        }
                    });
                });
                // Status button cycling
                formBody.querySelectorAll('.mar-status-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const data = getFormData(patientId, formId);
                        const idx = parseInt(btn.dataset.idx);
                        const time = btn.dataset.time;
                        const meds = [...(data.medications || [])];
                        if (!meds[idx]) return;
                        const givenStatus = { ...(meds[idx].givenStatus || {}) };
                        const cycle = { '': 'given', 'given': 'held', 'held': 'missed', 'missed': '' };
                        const newStatus = cycle[givenStatus[time] || ''] || '';
                        givenStatus[time] = newStatus;
                        meds[idx] = { ...meds[idx], givenStatus };
                        updateData({ ...data, medications: meds });
                        const colors = { 'given': 'background:#065f46;color:#fff;', 'held': 'background:#78350f;color:#fff;', 'missed': 'background:#7f1d1d;color:#fff;', '': 'background:var(--bg-input);color:var(--text-muted);' };
                        const labels = { 'given': 'G', 'held': 'H', 'missed': 'M', '': '—' };
                        btn.style.cssText = `${colors[newStatus]}border:0.08rem solid var(--border-subtle);border-radius:var(--radius-sm);width:36px;height:28px;font-size:0.65rem;font-family:var(--font-mono);cursor:pointer;padding:0;`;
                        btn.textContent = labels[newStatus];
                        if (newStatus === 'held' || (newStatus === '' && Object.values(givenStatus).some(s => s === 'held'))) {
                            renderFormContent();
                        }
                    });
                });
                // PRN give button
                const prnGiveBtn = document.getElementById('mar-prn-give-btn');
                if (prnGiveBtn) {
                    prnGiveBtn.addEventListener('click', () => {
                        const select = document.getElementById('mar-prn-select');
                        const timeInput = document.getElementById('mar-prn-time');
                        const effectInput = document.getElementById('mar-prn-effect');
                        const medIdx = parseInt(select?.value);
                        if (isNaN(medIdx) || !timeInput?.value) {
                            showToast('Select a PRN medication and enter the time.', 'warning');
                            return;
                        }
                        const data = getFormData(patientId, formId);
                        const meds = [...(data.medications || [])];
                        if (!meds[medIdx]) return;
                        const prnGiven = [...(meds[medIdx].prnGiven || [])];
                        prnGiven.push({ time: timeInput.value, effect: effectInput.value || '' });
                        // Also mark in givenStatus
                        const givenStatus = { ...(meds[medIdx].givenStatus || {}) };
                        givenStatus[timeInput.value] = 'given';
                        meds[medIdx] = { ...meds[medIdx], prnGiven, givenStatus };
                        updateData({ ...data, medications: meds });
                        showToast('PRN administration logged.', 'success');
                        renderFormContent();
                    });
                }
            }

            // ------------------------------ EVENT HANDLING ------------------------------
            function attachEvents() {
                if (app._eventsAttached) return;
                app._eventsAttached = true;

                app.addEventListener('click', (e) => {
                    // Slot delete (intercept before slot-btn bubble)
                    const slotDelBtn = e.target.closest('.slot-delete-btn');
                    if (slotDelBtn) {
                        const id = parseInt(slotDelBtn.dataset.id);
                        const patient = state.patients.find(p => p.id === id);
                        if (!patient) return;
                        showConfirmModal({
                            title: 'Remove Patient',
                            message: `Remove <strong>${escapeHTML(patient.name)}</strong> from Bed ${escapeHTML(patient.bed||'—')}?`,
                            confirmLabel: 'Yes, Remove',
                            confirmClass: 'btn-danger',
                            onConfirm: () => deletePatient(id)
                        });
                        return;
                    }
                    // Patient slot button (switch / add / edit)
                    const slotBtn = e.target.closest('.patient-slot-btn');
                    if (slotBtn) {
                        const id = parseInt(slotBtn.dataset.id);
                        const patient = state.patients.find(p => p.id === id);
                        if (!patient) return;
                        if (!patient.name || patient.isPlaceholder) {
                            openPatientModal(patient);
                        } else if (id === state.activePatientId) {
                            openPatientModal(patient);
                        } else {
                            state.activePatientId = id;
                            saveState();
                            render();
                        }
                        return;
                    }
                    // Pin buttons (before form-item — pin-btn lives inside form-item)
                    const pinBtn = e.target.closest('.pin-btn');
                    if (pinBtn) {
                        togglePin(pinBtn.dataset.formid);
                        return;
                    }
                    // Sidebar form items
                    const formItem = e.target.closest('.form-item');
                    if (formItem) {
                        navigateToForm(formItem.dataset.formid);
                        return;
                    }
                    // Category headers (collapse/expand)
                    const catHeader = e.target.closest('.cat-header');
                    if (catHeader) {
                        const catId = catHeader.parentElement.dataset.cat;
                        if (!state.settings.collapsedCategories) state.settings.collapsedCategories = [];
                        const idx = state.settings.collapsedCategories.indexOf(catId);
                        if (idx > -1) state.settings.collapsedCategories.splice(idx, 1);
                        else state.settings.collapsedCategories.push(catId);
                        saveState();
                        updateSidebar();
                        return;
                    }
                    // Form toolbar buttons
                    if (e.target.closest('#toggle-complete-btn')) {
                        toggleFormCompletion(state.activePatientId, state.activeFormId);
                        return;
                    }
                    if (e.target.closest('#pin-form-btn')) {
                        togglePin(state.activeFormId);
                        return;
                    }
                    if (e.target.closest('#clear-form-btn')) {
                        const confirmEl = document.getElementById('clear-confirm');
                        if (confirmEl) confirmEl.style.display = 'flex';
                        return;
                    }
                    if (e.target.closest('#history-btn')) {
                        openFormHistoryModal();
                        return;
                    }
                    if (e.target.closest('#clear-confirm-yes')) {
                        const pid = state.activePatientId, fid = state.activeFormId;
                        const prev = getFormData(pid, fid);
                        _lastCleared = { patientId: pid, formId: fid, data: JSON.parse(JSON.stringify(prev)) };
                        setFormData(pid, fid, {});
                        const confirmEl = document.getElementById('clear-confirm');
                        if (confirmEl) confirmEl.style.display = 'none';
                        renderFormContent();
                        const undoId = 'undo-clear-' + Date.now();
                        const t = showToast(`Form cleared. <a href="#" id="${undoId}" style="color:var(--accent-teal);text-decoration:underline;font-weight:600;" onclick="return false;">Undo</a>`, 'info', 6000, true);
                        if (t) {
                            t.querySelector('#' + undoId)?.addEventListener('click', () => {
                                if (_lastCleared && _lastCleared.patientId === state.activePatientId && _lastCleared.formId === state.activeFormId) {
                                    setFormData(_lastCleared.patientId, _lastCleared.formId, _lastCleared.data);
                                    _lastCleared = null;
                                    renderFormContent();
                                    dismissToast(t);
                                    showToast('Clear undone.', 'success');
                                }
                            });
                        }
                        return;
                    }
                    if (e.target.closest('#clear-confirm-no')) {
                        const confirmEl = document.getElementById('clear-confirm');
                        if (confirmEl) confirmEl.style.display = 'none';
                        return;
                    }
                    // Dashboard cards (any remaining [data-formid] not already handled above)
                    const anyFormId = e.target.closest('[data-formid]');
                    if (anyFormId) {
                        navigateToForm(anyFormId.dataset.formid);
                        return;
                    }
                    // Header / sidebar global buttons
                    if (e.target.closest('#settings-btn') || e.target.closest('#sidebar-settings')) {
                        openSettingsDrawer();
                        return;
                    }
                    if (e.target.closest('#print-btn')) {
                        openPrintModal();
                        return;
                    }
                    if (e.target.closest('#new-shift-btn')) {
                        openShiftModal();
                        return;
                    }
                    if (e.target.closest('#export-btn')) {
                        exportData();
                        return;
                    }
                    if (e.target.closest('#patient-quick-info')) {
                        openPatientModal(getActivePatient());
                        return;
                    }
                    // Disclaimer dismiss
                    if (e.target.closest('#dismiss-disclaimer-btn')) {
                        state.settings.disclaimerDismissed = true;
                        saveState();
                        const banner = document.getElementById('disclaimer-banner');
                        if (banner) banner.remove();
                        return;
                    }
                    // Help modal
                    if (e.target.closest('#help-btn')) {
                        openHelpModal();
                        return;
                    }
                    // Mobile sidebar
                    if (e.target.closest('#mobile-menu-btn')) {
                        document.getElementById('sidebar')?.classList.toggle('mobile-open');
                        document.getElementById('sidebar-mobile-overlay')?.classList.toggle('visible');
                        return;
                    }
                    if (e.target.id === 'sidebar-mobile-overlay') {
                        document.getElementById('sidebar')?.classList.remove('mobile-open');
                        document.getElementById('sidebar-mobile-overlay').classList.remove('visible');
                        return;
                    }
                });

                app.addEventListener('keydown', (e) => {
                    const catHeader = e.target.closest('.cat-header');
                    if (catHeader && (e.key === 'Enter' || e.key === ' ')) {
                        e.preventDefault();
                        catHeader.click();
                        return;
                    }
                    const formItem = e.target.closest('.form-item');
                    if (formItem && (e.key === 'Enter' || e.key === ' ')) {
                        e.preventDefault();
                        if (!e.target.closest('.pin-btn')) navigateToForm(formItem.dataset.formid);
                        return;
                    }
                });

                app.addEventListener('input', (e) => {
                    if (e.target.id !== 'form-search') return;
                    const q = e.target.value.toLowerCase();
                    document.querySelectorAll('.form-item').forEach(item => {
                        const name = item.querySelector('span:nth-child(2)')?.textContent.toLowerCase() || '';
                        item.style.display = name.includes(q) ? '' : 'none';
                    });
                    document.querySelectorAll('.category').forEach(cat => {
                        const items = cat.querySelectorAll('.form-item');
                        let visible = false;
                        items.forEach(i => { if (i.style.display !== 'none') visible = true; });
                        cat.style.display = visible ? '' : 'none';
                    });
                });

                app.addEventListener('blur', (e) => {
                    const el = e.target;
                    if (!el.matches('input[type="number"],input[type="text"]')) return;
                    const fieldId = el.dataset.fieldid || el.id?.replace(/^field-/, '');
                    if (!fieldId || !VITAL_RANGES[fieldId]) return;
                    const result = checkVitalRange(fieldId, el.value);
                    if (!result) return;
                    // Find or create pill next to this input
                    let pill = el.parentElement.querySelector('.vital-alert-pill');
                    if (!pill) {
                        pill = document.createElement('span');
                        pill.className = 'vital-alert-pill clinical-flag';
                        el.parentElement.appendChild(pill);
                    }
                    if (result.level === 'normal') {
                        pill.remove();
                        return;
                    }
                    pill.className = `vital-alert-pill clinical-flag ${result.level === 'critical' ? 'flag-abnormal' : 'flag-warning'}`;
                    pill.textContent = result.level === 'critical' ? `CRITICAL ${result.label}` : `CHECK ${result.label}`;
                    pill.title = `${result.label}: ${result.value} ${result.unit} — ${result.level}`;
                    // Also update the alert strip
                    updateAlertStrip();
                }, true); // capture so blur propagates from inputs

                document.addEventListener('keydown', handleKeyboardShortcuts);
            }

            function updateAlertStrip() {
                const formContent = document.getElementById('form-content');
                if (!formContent) return;
                const alerts = [];
                formContent.querySelectorAll('.vital-alert-pill.flag-abnormal').forEach(p => alerts.push({ level:'critical', text: p.textContent }));
                formContent.querySelectorAll('.vital-alert-pill.flag-warning').forEach(p => alerts.push({ level:'warning', text: p.textContent }));
                let strip = document.getElementById('vital-alert-strip');
                if (alerts.length === 0) { strip?.remove(); return; }
                if (!strip) {
                    strip = document.createElement('div');
                    strip.id = 'vital-alert-strip';
                    strip.style.cssText = 'display:flex;flex-wrap:wrap;gap:0.46rem;padding:0.46rem 1.54rem;background:rgba(239,68,68,0.07);border-bottom:1px solid rgba(239,68,68,0.2);';
                    const formArea = document.getElementById('form-area');
                    formArea?.insertBefore(strip, formArea.firstChild);
                }
                strip.innerHTML = `<span style="font-family:var(--font-mono);font-size:0.69rem;color:var(--danger);font-weight:600;margin-right:0.31rem;">ALERTS:</span>` +
                    alerts.map(a => `<span class="clinical-flag ${a.level==='critical'?'flag-abnormal':'flag-warning'}">${escapeHTML(a.text)}</span>`).join('');
            }

            function handleKeyboardShortcuts(e) {
                if (state.isModalOpen || state.isSettingsOpen) return;
                if (e.ctrlKey || e.metaKey) {
                    switch (e.key.toLowerCase()) {
                        case 's':
                            e.preventDefault();
                            saveState();
                            state.autoSaveStatus = 'Saved (manual)';
                            updateAutoSaveStatus();
                            showToast('All data saved.', 'success');
                            break;
                        case 'p':
                            e.preventDefault();
                            window.print();
                            break;
                        case 'f':
                            e.preventDefault();
                            const searchEl = document.getElementById('form-search');
                            if (searchEl) searchEl.focus();
                            break;
                    }
                }
                if (e.key === 'Escape') {
                    const confirmEl = document.getElementById('clear-confirm');
                    if (confirmEl && confirmEl.style.display === 'flex') {
                        confirmEl.style.display = 'none';
                    }
                }
                if (e.key === '?' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) {
                    openHelpModal();
                }
            }

            function showLoadingBar() {
                document.getElementById('form-loading-bar')?.remove();
                const bar = document.createElement('div');
                bar.id = 'form-loading-bar';
                document.body.appendChild(bar);
                bar.addEventListener('animationend', () => bar.remove(), { once: true });
            }

            function navigateToForm(formId) {
                if (!FORM_DEFS.find(f => f.id === formId)) {
                    showToast('Form not found.', 'error');
                    return;
                }
                showLoadingBar();
                document.getElementById('sidebar')?.classList.remove('mobile-open');
                document.getElementById('sidebar-mobile-overlay')?.classList.remove('visible');
                state.activeFormId = formId;
                state.recentForms = [formId, ...state.recentForms.filter(f => f !== formId)].slice(0, 5);
                saveState();
                renderFormControls();
                renderFormContent();
                updateSidebar();
                updateDashboard();
                const formContent = document.getElementById('form-content');
                if (formContent) formContent.focus();
            }

            function togglePin(formId) {
                state.pinnedForms = state.pinnedForms.includes(formId) ?
                    state.pinnedForms.filter(f => f !== formId) : [...state.pinnedForms, formId];
                saveState();
                updateSidebar();
                renderFormControls();
                const isPinned = state.pinnedForms.includes(formId);
                showToast(isPinned ? 'Form pinned' : 'Form unpinned', 'info');
            }

            // ------------------------------ MODAL / DRAWER ------------------------------
            function openPatientModal(patient) {
                state.modalPatient = patient ? { ...patient } : { ...DEFAULT_PATIENT, id: Date.now(),
                    isPlaceholder: true };
                state.isModalOpen = true;
                renderModal();
                trapFocusInModal();
            }

            function closePatientModal() {
                state.isModalOpen = false;
                document.getElementById('modal-container').innerHTML = '';
            }

            function savePatientModal() {
                const form = document.getElementById('patient-form');
                if (!form) return;
                const nameVal = form.name.value.trim();
                const mrnVal = form.mrn.value.trim();
                if (!nameVal) {
                    showToast('Patient name is required.', 'error');
                    form.name.focus();
                    form.name.classList.add('input-error');
                    return;
                }
                if (!mrnVal) {
                    showToast('MRN is required.', 'error');
                    form.mrn.focus();
                    form.mrn.classList.add('input-error');
                    return;
                }
                const data = {
                    id: state.modalPatient.id,
                    name: nameVal,
                    mrn: mrnVal,
                    bed: form.bed.value.trim(),
                    age: parseInt(form.age.value) || '',
                    dob: form.dob.value.trim(),
                    physician: form.physician.value.trim(),
                    diagnosis: form.diagnosis.value.trim(),
                    admissionDate: form.admissionDate.value.trim(),
                    nurse: form.nurse.value.trim() || state.settings.nurseName,
                    unit: form.unit.value.trim() || state.settings.unit,
                    shift: form.shift.value,
                    date: new Date().toISOString().slice(0, 10),
                    isPlaceholder: false,
                    codeStatus: form.codeStatus?.value || '',
                    weight: form.weight?.value || '',
                    height: form.height?.value || '',
                    ibw: form.ibw?.value || '',
                    shiftStart: form.shiftStart?.value || '',
                    shiftEnd: form.shiftEnd?.value || '',
                    nkda: form.nkda?.checked || false,
                    allergies: form.nkda?.checked ? '' : (form.allergies?.value?.trim() || ''),
                };
                const idx = state.patients.findIndex(p => p.id === data.id);
                if (idx > -1) state.patients[idx] = data;
                else state.patients.push(data);
                state.activePatientId = data.id;
                saveState();
                closePatientModal();
                render();
                showToast('Patient saved successfully.', 'success');
            }

            function renderModal() {
                const p = state.modalPatient;
                const container = document.getElementById('modal-container');
                container.innerHTML = `
            <div class="overlay modal-enter" id="modal-overlay" aria-hidden="true"></div>
            <div class="modal-content-enter card" role="dialog" aria-modal="true" aria-labelledby="modal-title" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:101;background:var(--bg-sidebar);border:0.08rem solid var(--border-subtle);border-radius:var(--radius-2xl);padding:2.46rem;width:50rem;max-width:90vw;max-height:85vh;overflow:auto;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.23rem;">
                    <h2 id="modal-title" style="font-family:var(--font-mono);font-size:1.38rem;color:var(--text-primary);">Patient Setup</h2>
                    <button type="button" id="modal-close" class="btn btn-ghost" aria-label="Close patient setup"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                </div>
                ${isDemo(p) ? `<div style="background:var(--warning-bg);border:1px solid rgba(245,158,11,0.3);border-radius:var(--radius-md);padding:0.62rem 0.92rem;margin-bottom:1.23rem;font-family:var(--font-mono);font-size:0.82rem;color:var(--warning);">Demo Patient — Replace with real patient information before clinical use.</div>` : ''}
                <form id="patient-form" novalidate>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.23rem;">
                        <div><label for="pt-name">Patient Name <span class="required-indicator">*</span></label><input id="pt-name" name="name" value="${escapeHTML(p.name||'')}" placeholder="Full name" required autocomplete="off"></div>
                        <div><label for="pt-mrn">MRN <span class="required-indicator">*</span></label><input id="pt-mrn" name="mrn" value="${escapeHTML(p.mrn||'')}" required autocomplete="off"></div>
                        <div><label for="pt-bed">Room/Bed</label><input id="pt-bed" name="bed" value="${escapeHTML(p.bed||'')}"></div>
                        <div><label for="pt-age">Age</label><input id="pt-age" name="age" type="number" value="${p.age||''}" min="0" max="130"></div>
                        <div><label for="pt-dob">DOB</label><input id="pt-dob" name="dob" value="${escapeHTML(p.dob||'')}" placeholder="YYYY-MM-DD"></div>
                        <div><label for="pt-physician">Attending Physician</label><input id="pt-physician" name="physician" value="${escapeHTML(p.physician||'')}"></div>
                        <div><label for="pt-admit">Admission Date</label><input id="pt-admit" name="admissionDate" value="${escapeHTML(p.admissionDate||'')}" placeholder="YYYY-MM-DD"></div>
                        <div><label for="pt-nurse">Nurse Name</label><input id="pt-nurse" name="nurse" value="${escapeHTML(p.nurse||state.settings.nurseName)}"></div>
                        <div><label for="pt-unit">Unit</label><input id="pt-unit" name="unit" value="${escapeHTML(p.unit||state.settings.unit)}"></div>
                    </div>
                    <div style="margin-top:1.23rem;"><label for="pt-shift">Shift</label>
                        <select id="pt-shift" name="shift" style="width:15.38rem;">
                            <option value="Day" ${p.shift==='Day'?'selected':''}>Day</option>
                            <option value="Evening" ${p.shift==='Evening'?'selected':''}>Evening</option>
                            <option value="Night" ${p.shift==='Night'?'selected':''}>Night</option>
                        </select>
                    </div>
                    <div style="margin-top:1.23rem;"><label for="pt-diagnosis">Primary Diagnosis</label><textarea id="pt-diagnosis" name="diagnosis" style="width:100%;min-height:5.38rem;">${escapeHTML(p.diagnosis||'')}</textarea></div>
                    <div style="margin-top:1.23rem;display:grid;grid-template-columns:1fr 1fr;gap:1.23rem;">
                        <div><label for="pt-code-status">Code Status</label><select id="pt-code-status" name="codeStatus" style="width:100%;border:2px solid var(--warning);"><option value="">-- Select --</option><option value="Full Code" ${p.codeStatus==='Full Code'?'selected':''}>Full Code</option><option value="DNR" ${p.codeStatus==='DNR'?'selected':''}>DNR (Do Not Resuscitate)</option><option value="DNI" ${p.codeStatus==='DNI'?'selected':''}>DNI (Do Not Intubate)</option><option value="DNR/DNI" ${p.codeStatus==='DNR/DNI'?'selected':''}>DNR/DNI</option><option value="Comfort Measures Only" ${p.codeStatus==='Comfort Measures Only'?'selected':''}>Comfort Measures Only</option><option value="Limited Interventions" ${p.codeStatus==='Limited Interventions'?'selected':''}>Limited Interventions</option></select></div>
                        <div><label for="pt-weight">Actual Body Weight (kg)</label><input id="pt-weight" name="weight" type="number" value="${p.weight||''}" min="1" max="500" placeholder="70" style="width:100%;"></div>
                        <div><label for="pt-height">Height (cm)</label><input id="pt-height" name="height" type="number" value="${p.height||''}" min="50" max="250" placeholder="170" style="width:100%;"></div>
                        <div><label for="pt-ibw">Ideal Body Weight (kg) <span style="color:var(--text-muted);font-size:0.75rem;">auto-calc</span></label><input id="pt-ibw" name="ibw" type="number" value="${p.ibw||''}" placeholder="Auto" readonly style="width:100%;background:var(--bg-main);color:var(--accent-teal);"></div>
                        <div><label for="pt-shift-start">Shift Start Time</label><input id="pt-shift-start" name="shiftStart" type="time" value="${p.shiftStart||''}" style="width:100%;"></div>
                        <div><label for="pt-shift-end">Shift End Time</label><input id="pt-shift-end" name="shiftEnd" type="time" value="${p.shiftEnd||''}" style="width:100%;"></div>
                    </div>
                    <div style="margin-top:1.23rem;grid-column:1/-1;">
                        <label for="pt-allergies">Allergies <span style="color:var(--danger);font-size:0.85rem;margin-left:0.5rem;">[SAFETY CRITICAL]</span></label>
                        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:0.5rem;">
                            <label style="display:flex;align-items:center;gap:0.4rem;cursor:pointer;"><input type="checkbox" id="pt-nkda" name="nkda" ${p.nkda?'checked':''}><span style="font-family:var(--font-mono);font-size:0.9rem;">NKDA (No Known Drug Allergies)</span></label>
                        </div>
                        <textarea id="pt-allergies" name="allergies" placeholder="List allergies and reactions: e.g., Penicillin → anaphylaxis, Sulfa → rash" style="width:100%;min-height:4rem;" ${p.nkda?'disabled':''}>${escapeHTML(p.allergies||'')}</textarea>
                    </div>
                    <button type="button" id="modal-save" class="btn btn-teal" style="width:100%;margin-top:1.54rem;padding:0.92rem;justify-content:center;font-size:1rem;">Save Patient</button>
                    ${!p.isPlaceholder && p.name ? `<div style="margin-top:1rem;border-top:1px solid var(--border-subtle);padding-top:1rem;"><button type="button" id="modal-delete-patient" class="btn btn-danger" style="width:100%;justify-content:center;" aria-label="Delete this patient and clear slot"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Remove Patient &amp; Clear Slot</button></div>` : ''}
                </form>
            </div>`;
                document.getElementById('modal-overlay').addEventListener('click', closePatientModal);
                document.getElementById('modal-close').addEventListener('click', closePatientModal);
                document.getElementById('modal-save').addEventListener('click', savePatientModal);
                document.getElementById('patient-form')?.addEventListener('submit', e => e.preventDefault());
                document.getElementById('patient-form')?.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape') closePatientModal();
                });
                const nkdaEl = document.getElementById('pt-nkda');
                const allergiesEl = document.getElementById('pt-allergies');
                if (nkdaEl && allergiesEl) {
                    nkdaEl.addEventListener('change', () => {
                        allergiesEl.disabled = nkdaEl.checked;
                        if (nkdaEl.checked) allergiesEl.value = '';
                    });
                }
                const heightEl = document.getElementById('pt-height');
                const ibwEl = document.getElementById('pt-ibw');
                if (heightEl && ibwEl) {
                    heightEl.addEventListener('input', () => {
                        const h = parseFloat(heightEl.value);
                        if (h > 50) {
                            const inches = h / 2.54;
                            const ibw = Math.max(0, 45.5 + 2.3 * (inches - 60));
                            ibwEl.value = ibw.toFixed(1);
                        } else { ibwEl.value = ''; }
                    });
                }
                document.getElementById('modal-delete-patient')?.addEventListener('click', () => {
                    const pid = p.id, pname = p.name, pmrn = p.mrn, pbed = p.bed;
                    closePatientModal();
                    showConfirmModal({
                        title: 'Remove Patient',
                        message: `Permanently remove <strong>${escapeHTML(pname)}</strong> (MRN: ${escapeHTML(pmrn||'—')}, Bed: ${escapeHTML(pbed||'—')}) and clear all their form data?<br><br>This slot will become available for a new admission.`,
                        confirmLabel: 'Yes, Remove Patient',
                        confirmClass: 'btn-danger',
                        onConfirm: () => deletePatient(pid)
                    });
                });
            }

            function trapFocusInModal() {
                setTimeout(() => {
                    const modal = document.querySelector('#modal-container [role="dialog"]');
                    if (!modal) return;
                    const focusable = Array.from(modal.querySelectorAll(
                        'input, select, textarea, button, [tabindex]:not([tabindex="-1"])'));
                    if (focusable.length === 0) return;
                    focusable[0].focus();
                    modal.addEventListener('keydown', (e) => {
                        if (e.key !== 'Tab') return;
                        const first = focusable[0];
                        const last = focusable[focusable.length - 1];
                        if (e.shiftKey && document.activeElement === first) {
                            e.preventDefault(); last.focus();
                        } else if (!e.shiftKey && document.activeElement === last) {
                            e.preventDefault(); first.focus();
                        }
                    });
                }, 150);
            }

            function openSettingsDrawer() {
                state.isSettingsOpen = true;
                renderSettingsDrawer();
                setTimeout(() => {
                    const drawer = document.querySelector('#settings-drawer-container [style*="position:fixed"]');
                    if (drawer) {
                        const focusable = drawer.querySelectorAll('input, button, [tabindex]');
                        if (focusable.length > 0) focusable[0].focus();
                    }
                }, 200);
            }

            function closeSettingsDrawer() {
                state.isSettingsOpen = false;
                document.getElementById('settings-drawer-container').innerHTML = '';
            }

            function renderSettingsDrawer() {
                const container = document.getElementById('settings-drawer-container');
                container.innerHTML = `
            <div class="overlay" id="settings-overlay" aria-hidden="true"></div>

                        settings: state.settings,

                        formData: state.formData,
                        vitalHistory: state.vitalHistory || [],

                    const blob = new Blob([JSON.stringify(exportObj, null, 2)], { type: 'application/json' });

                    a.download = `nursedesk-pro-backup-${new Date().toISOString().slice(0,10)}.json`;

                    const file = e.target.files[0];
                    if (!file) return;
                    if (file.size > 50 * 1024 * 1024) { showToast('File too large. Max 50MB.', 'error'); return; }
                    const reader = new FileReader();
                    reader.onload = () => {
                        let data;
                        try {
                            data = JSON.parse(reader.result);
                        } catch (ex) {
                            showToast('Invalid backup file. Import failed.', 'error');
                            return;
                        }
                        if (!data.patients || !Array.isArray(data.patients)) {
                            showToast('Invalid backup file. Import failed.', 'error');
                            return;
                        }
                        // Auto-export current state as backup before overwriting
                        try {
                            const backupObj = {
                                version: '2.0',
                                exportedAt: new Date().toISOString(),
                                patients: state.patients,
                                activePatientId: state.activePatientId,
                                settings: state.settings,
                                pinnedForms: state.pinnedForms,
                                recentForms: state.recentForms,
                                formCompletion: state.formCompletion,
                                formTimestamps: state.formTimestamps,
                                formData: state.formData,
                            };
                            const blob = new Blob([JSON.stringify(backupObj, null, 2)], { type: 'application/json' });
                            const a = document.createElement('a');
                            a.href = URL.createObjectURL(blob);
                            a.download = `nursedesk-pre-import-backup-${new Date().toISOString().slice(0,10)}.json`;
                            a.click();
                            URL.revokeObjectURL(a.href);
                        } catch (_) {}
                        showToast('Backup saved. Importing new data...', 'info');
                        setTimeout(async () => {
                            const sanitizeKeys = (obj) => {
                                if (obj && typeof obj === 'object') {
                                    const clean = Array.isArray(obj) ? [] : {};
                                    for (const [k, v] of Object.entries(obj)) {
                                        if (k === '__proto__' || k === 'constructor' || k === 'prototype') continue;
                                        clean[k] = v && typeof v === 'object' ? sanitizeKeys(v) : v;
                                    }
                                    return clean;
                                }
                                return obj;
                            };
                            if (data.patients) state.patients = sanitizeKeys(data.patients);
                            if (data.settings) state.settings = sanitizeKeys(data.settings);
                            if (data.pinnedForms) state.pinnedForms = sanitizeKeys(data.pinnedForms);
                            if (data.recentForms) state.recentForms = sanitizeKeys(data.recentForms);
                            if (data.formCompletion) state.formCompletion = sanitizeKeys(data.formCompletion);
                            if (data.formTimestamps) state.formTimestamps = sanitizeKeys(data.formTimestamps);
                            if (data.formData) state.formData = sanitizeKeys(data.formData);
                            if (data.vitalHistory) state.vitalHistory = sanitizeKeys(data.vitalHistory);
                            if (data.activePatientId) state.activePatientId = data.activePatientId;
                            await saveState();
                            render();
                            showToast('Data imported successfully.', 'success');
                        }, 800);
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

            function showConfirmModal({ title, message, confirmLabel, confirmClass, onConfirm }) {
                const mc = document.getElementById('modal-container');
                if (!mc) return;
                const id = 'confirm-modal-' + Date.now();
                mc.insertAdjacentHTML('beforeend', `
                    <div id="${id}-overlay" class="overlay modal-enter" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:center;justify-content:center;">
                        <div class="card modal-content-enter" role="dialog" aria-modal="true" aria-labelledby="${id}-title" style="background:var(--bg-card);padding:2rem;border-radius:var(--radius-xl);max-width:26rem;width:90%;box-shadow:var(--shadow-lg);border:0.08rem solid var(--border-subtle);">
                            <h2 id="${id}-title" style="font-family:var(--font-mono);font-size:1.15rem;color:var(--text-primary);margin-bottom:0.92rem;">${escapeHTML(title)}</h2>

                                <button type="button" id="${id}-cancel" class="btn btn-outline">Cancel</button>
                                <button type="button" id="${id}-confirm" class="btn ${confirmClass}">${escapeHTML(confirmLabel)}</button>
                            </div>
                        </div>
                    </div>`);
                const overlay = document.getElementById(`${id}-overlay`);
                const cancelBtn = document.getElementById(`${id}-cancel`);
                const confirmBtn = document.getElementById(`${id}-confirm`);
                const keyHandler = e => { if (e.key === 'Escape') { dismiss(); } };
                const dismiss = () => { overlay.remove(); document.removeEventListener('keydown', keyHandler); };
                overlay.addEventListener('click', e => { if (e.target === overlay) dismiss(); });
                cancelBtn.addEventListener('click', dismiss);
                confirmBtn.addEventListener('click', () => { dismiss(); onConfirm(); });
                document.addEventListener('keydown', keyHandler);
                confirmBtn.focus();
            }

            function printCurrentForm(blank = false) {
                const formContent = document.getElementById('form-content');
                if (!formContent) return;
                if (blank) {
                    const inputs = formContent.querySelectorAll('input:not([readonly]), textarea, select');
                    const saved = new Map();
                    inputs.forEach(el => { saved.set(el, el.value); el.value = ''; });
                    window.print();
                    saved.forEach((val, el) => { el.value = val; });
                } else {
                    window.print();
                }
            }

            function buildPrintHeaderHTML(patient) {
                const today = new Date().toLocaleDateString();
                const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                return `<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;border-bottom:2px solid #000;padding-bottom:8px;"><div><div style="font-size:14px;font-weight:bold;">ICU NurseDesk Pro</div><div style="font-size:11px;">Unit: ${escapeHTML(patient.unit||'—')} | Nurse: ${escapeHTML(patient.nurse||'—')} | Shift: ${escapeHTML(patient.shift||'—')}</div></div><div style="text-align:right;"><div style="font-size:13px;font-weight:bold;">${escapeHTML(patient.name||'—')}</div><div>MRN: ${escapeHTML(patient.mrn||'—')} | DOB: ${escapeHTML(patient.dob||'—')} | Age: ${patient.age||'—'}</div><div>Bed: ${escapeHTML(patient.bed||'—')} | MD: ${escapeHTML(patient.physician||'—')}</div><div style="color:${patient.codeStatus==='Full Code'?'green':'red'};font-weight:bold;">${escapeHTML(patient.codeStatus||'Code Status: Not documented')}</div><div style="color:${patient.nkda?'green':'red'};">${patient.nkda ? 'NKDA' : patient.allergies ? '[ALLERGIES]: '+escapeHTML(patient.allergies) : ''}</div><div style="font-size:10px;color:#666;">Printed: ${today} ${time}</div></div></div>`;
            }

            function buildFormPrintHTML(formDef, formData) {
                let html = '';
                if (formDef.type === 'sectioned') {
                    formDef.sections.forEach(sec => {
                        html += `<div style="margin-bottom:12px;"><div style="font-weight:bold;font-size:10px;text-transform:uppercase;color:#374151;border-bottom:1px solid #d1d5db;margin-bottom:6px;">${escapeHTML(sec.title)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">`;
                        sec.fields.forEach(f => {
                            const secData = formData[sec.id] || {};
                            let val = secData[f.id];
                            if (Array.isArray(val)) val = val.join(', ');
                            html += `<div><div style="font-size:9px;text-transform:uppercase;color:#666;">${escapeHTML(f.label)}</div><div style="border-bottom:1px solid #ccc;min-height:18px;padding:2px 0;">${escapeHTML(String(val||''))}</div></div>`;
                        });
                        html += `</div></div>`;
                    });
                } else if (formDef.type === 'sbar') {
                    ['situation','background','assessment','recommendation'].forEach(key => {
                        html += `<div style="margin-bottom:10px;"><div style="font-size:9px;text-transform:uppercase;color:#666;">${key.toUpperCase()}</div><div style="border:1px solid #ccc;min-height:40px;padding:4px;">${escapeHTML(formData[key]||'')}</div></div>`;
                    });
                } else if (formDef.type === 'fluid-balance') {
                    const intake = formData.intakeRows || [];
                    const output = formData.outputRows || [];
                    const intakeTotal = intake.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
                    const outputTotal = output.reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
                    const balance = intakeTotal - outputTotal;
                    html += `<table style="width:100%;border-collapse:collapse;font-size:10px;"><tr style="background:#f3f4f6;"><th style="padding:3px 6px;text-align:left;">Time</th><th style="padding:3px 6px;text-align:left;">Source</th><th style="padding:3px 6px;text-align:right;">Amount (mL)</th></tr>`;
                    if (intake.length) { html += `<tr><td colspan="3" style="font-weight:bold;padding:4px 6px;background:#eff6ff;">INTAKE</td></tr>`; intake.forEach(r => { html += `<tr><td style="padding:3px 6px;">${escapeHTML(r.time||'')}</td><td style="padding:3px 6px;">${escapeHTML(r.source||'')}</td><td style="text-align:right;padding:3px 6px;">${escapeHTML(r.amount||'')}</td></tr>`; }); }
                    if (output.length) { html += `<tr><td colspan="3" style="font-weight:bold;padding:4px 6px;background:#fffbeb;">OUTPUT</td></tr>`; output.forEach(r => { html += `<tr><td style="padding:3px 6px;">${escapeHTML(r.time||'')}</td><td style="padding:3px 6px;">${escapeHTML(r.source||'')}</td><td style="text-align:right;padding:3px 6px;">${escapeHTML(r.amount||'')}</td></tr>`; }); }
                    html += `<tr style="font-weight:bold;background:#f3f4f6;"><td colspan="2" style="padding:4px 6px;">NET BALANCE</td><td style="text-align:right;padding:4px 6px;color:${balance>=0?'#2563eb':'#dc2626'};">${balance>=0?'+':''}${balance} mL</td></tr></table>`;
                } else if (formDef.type === 'mar') {
                    const meds = formData.medications || [];
                    const scheduledMeds = meds.filter(m => m.frequency !== 'PRN' && !m.isPRN);
                    const prnMeds = meds.filter(m => m.frequency === 'PRN' || m.isPRN);
                    if (scheduledMeds.length > 0) {
                        html += '<div style="margin-bottom:12px;"><div style="font-weight:bold;font-size:10px;text-transform:uppercase;color:#374151;border-bottom:1px solid #d1d5db;margin-bottom:6px;">Scheduled Medications</div><table style="width:100%;border-collapse:collapse;font-size:9px;"><thead><tr style="background:#f3f4f6;"><th style="padding:3px 6px;text-align:left;">Medication</th><th style="padding:3px 6px;text-align:left;">Dose</th><th style="padding:3px 6px;text-align:left;">Route</th><th style="padding:3px 6px;text-align:left;">Frequency</th></tr></thead><tbody>';
                        scheduledMeds.forEach(m => {
                            const givenCount = Object.values(m.givenStatus || {}).filter(s => s === 'given').length;
                            const totalSlots = Object.keys(m.givenStatus || {}).length;
                            html += `<tr style="border-bottom:1px solid #e5e7eb;"><td style="padding:3px 6px;">${escapeHTML(m.name || '—')}</td><td style="padding:3px 6px;">${escapeHTML(m.dose || '—')}</td><td style="padding:3px 6px;">${escapeHTML(m.route || '—')}</td><td style="padding:3px 6px;">${escapeHTML(m.frequency || '—')} ${totalSlots > 0 ? '(' + givenCount + '/' + totalSlots + ' given)' : ''}</td></tr>`;
                        });
                        html += '</tbody></table></div>';
                    }
                    if (prnMeds.length > 0) {
                        html += '<div style="margin-bottom:12px;"><div style="font-weight:bold;font-size:10px;text-transform:uppercase;color:#374151;border-bottom:1px solid #d1d5db;margin-bottom:6px;">PRN Medications</div><table style="width:100%;border-collapse:collapse;font-size:9px;"><thead><tr style="background:#f3f4f6;"><th style="padding:3px 6px;text-align:left;">Medication</th><th style="padding:3px 6px;text-align:left;">Dose</th><th style="padding:3px 6px;text-align:left;">Indication</th><th style="padding:3px 6px;text-align:left;">Times Given</th><th style="padding:3px 6px;text-align:left;">Outcomes</th></tr></thead><tbody>';
                        prnMeds.forEach(m => {
                            const entries = m.prnGiven || [];
                            const timesStr = entries.map(e => escapeHTML(e.time || '?')).join(', ') || 'Not given';
                            const effectsStr = entries.map(e => escapeHTML(e.effect || '—')).join('; ') || '—';
                            html += `<tr style="border-bottom:1px solid #e5e7eb;"><td style="padding:3px 6px;">${escapeHTML(m.name || '—')}</td><td style="padding:3px 6px;">${escapeHTML(m.dose || '—')}</td><td style="padding:3px 6px;">${escapeHTML(m.indication || '—')}</td><td style="padding:3px 6px;">${timesStr}</td><td style="padding:3px 6px;">${effectsStr}</td></tr>`;
                        });
                        html += '</tbody></table></div>';
                    }
                }
                if (formData.clinicalNotes) { html += `<div style="margin-top:10px;"><div style="font-size:9px;text-transform:uppercase;color:#666;">Clinical Notes</div><div style="border:1px solid #ccc;min-height:30px;padding:4px;">${escapeHTML(formData.clinicalNotes)}</div></div>`; }
                return html;
            }

            function printAllForms() {
                const patient = getActivePatient();
                const patientId = state.activePatientId;
                const filledForms = FORM_DEFS.filter(f => { const data = getFormData(patientId, f.id); return checkFormHasData(f.id, data); });
                if (filledForms.length === 0) { showToast('No forms have data entered for this patient.', 'warning'); return; }
                const printWindow = window.open('', '_blank');
                if (!printWindow) { showToast('Please allow popups to print.', 'warning'); return; }
                const header = buildPrintHeaderHTML(patient);
                let allContent = `<!DOCTYPE html><html><head><title>ICU Documentation — ${escapeHTML(patient.name||'')}</title><style>body{font-family:Arial,sans-serif;font-size:11px;color:#000;}.form-section{page-break-before:always;}.form-section:first-child{page-break-before:avoid;}.form-title{font-size:14px;font-weight:bold;margin-bottom:12px;border-bottom:1px solid #999;padding-bottom:4px;}.nurse-sig{margin-top:24px;border-top:1px solid #999;padding-top:8px;display:flex;justify-content:space-between;}</style></head><body>`;
                filledForms.forEach((formDef, idx) => {
                    const formData = getFormData(patientId, formDef.id);
                    allContent += `<div class="${idx>0?'form-section':''}">`;
                    allContent += header;
                    allContent += `<div class="form-title">${escapeHTML(formDef.name)}</div>`;
                    allContent += buildFormPrintHTML(formDef, formData);
                    allContent += `<div class="nurse-sig"><span>Nurse Signature: ___________________</span><span>Date/Time: ___________________</span><span>Page ${idx+1} of ${filledForms.length}</span></div></div>`;
                });
                allContent += '</body></html>';
                printWindow.document.write(allContent);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => { printWindow.print(); }, 500);
            }

            function printShiftSummary() {
                const printWindow = window.open('', '_blank');
                if (!printWindow) { showToast('Please allow popups to print.', 'warning'); return; }
                const today = new Date().toLocaleDateString();
                const time = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
                let html = `<!DOCTYPE html><html><head><title>Shift Summary — ${today}</title><style>body{font-family:Arial,sans-serif;font-size:11px;}h1{font-size:16px;margin:0;}h2{font-size:12px;margin:8px 0 4px;}table{width:100%;border-collapse:collapse;margin-bottom:16px;}th{background:#e5e7eb;padding:4px 8px;text-align:left;font-size:10px;}td{padding:4px 8px;border-bottom:1px solid #e5e7eb;}.complete{color:#059669;font-weight:bold;}.in-progress{color:#d97706;}.not-started{color:#9ca3af;}</style></head><body><h1>ICU NurseDesk Pro — Shift Summary</h1><p style="color:#666;margin:4px 0 16px;">Generated: ${today} ${time} | Unit: ${escapeHTML(state.settings.unit)} | Nurse: ${escapeHTML(state.settings.nurseName)}</p>`;
                state.patients.forEach(patient => {
                    if (patient.isPlaceholder || !patient.name) return;
                    const patientId = patient.id;
                    const completion = state.formCompletion[patientId] || {};
                    const completedCount = Object.values(completion).filter(s=>s==='complete').length;
                    const inProgressCount = Object.values(completion).filter(s=>s==='in-progress').length;
                    html += `<h2>BED ${escapeHTML(patient.bed||'—')} — ${escapeHTML(patient.name)} | MRN: ${escapeHTML(patient.mrn||'—')} | Age: ${patient.age||'—'} | MD: ${escapeHTML(patient.physician||'—')}</h2><table><tr><td><strong>Diagnosis:</strong> ${escapeHTML(patient.diagnosis||'—')}</td><td><strong>Code Status:</strong> ${escapeHTML(patient.codeStatus||'Not documented')}</td><td style="color:#dc2626;">${patient.nkda?'NKDA':patient.allergies?'[ALLERGIES]: '+escapeHTML(patient.allergies):'Allergies: Not documented'}</td></tr></table><table><thead><tr><th>Form</th><th>Status</th><th>Last Updated</th></tr></thead><tbody>`;
                    FORM_DEFS.forEach(f => {
                        const status = completion[f.id] || 'not-started';
                        const ts = state.formTimestamps?.[patientId]?.[f.id];
                        const timeStr = ts ? new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
                        const cls = status==='complete'?'complete':status==='in-progress'?'in-progress':'not-started';
                        const lbl = status==='complete'?'Complete':status==='in-progress'?'In Progress':'Not Started';
                        html += `<tr><td>${escapeHTML(f.name)}</td><td class="${cls}">${lbl}</td><td>${timeStr}</td></tr>`;
                    });
                    html += `</tbody></table><p style="font-size:10px;color:#666;">${completedCount}/${FORM_DEFS.length} complete | ${inProgressCount} in progress</p>`;
                });
                html += `<p style="margin-top:24px;border-top:1px solid #ccc;padding-top:8px;">Outgoing Nurse: ___________________ &nbsp;&nbsp; Incoming Nurse: ___________________ &nbsp;&nbsp; Time: ___________</p></body></html>`;
                printWindow.document.write(html);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => { printWindow.print(); }, 500);
            }

            async function deletePatient(patientId) {
                const idx = state.patients.findIndex(p => p.id === patientId);
                if (idx === -1) return;
                state.patients[idx] = { id: patientId, name: '', mrn: '', bed: '', isPlaceholder: true, nurse: state.settings.nurseName, unit: state.settings.unit, shift: 'Day', date: new Date().toISOString().slice(0, 10) };
                delete state.formData[patientId];
                delete state.formCompletion[patientId];
                delete state.formTimestamps[patientId];
                // Clean up form history for this patient
                try {
                    if (db.db) {
                        const tx = db.db.transaction('formHistory', 'readwrite');
                        const store = tx.objectStore('formHistory');
                        const idx2 = store.index('byForm');
                        const all = await new Promise(res => { const r = idx2.getAll(); r.onsuccess = () => res(r.result || []); });
                        for (const snap of all) {
                            if (snap.patientId === patientId) store.delete(snap.hid);
                        }
                    }
                } catch (_) {}
                if (state.activePatientId === patientId) {
                    const next = state.patients.find(p => !p.isPlaceholder && p.name);
                    state.activePatientId = next ? next.id : state.patients[0].id;
                }
                saveState();
                render();
                showToast('Patient removed. Slot is ready for new admission.', 'success');
            }

            // ------------------------------ PIN LOCK SYSTEM ------------------------------
            function hashPIN(pin) {
                let hash = 0;
                for (let i = 0; i < pin.length; i++) {
                    const char = pin.charCodeAt(i);
                    hash = ((hash << 5) - hash) + char;
                    hash = hash & hash;
                }
                return String(hash);
            }

            function showLockScreen() {
                const lockScreen = document.getElementById('lock-screen');
                if (!lockScreen) return;
                lockScreen.classList.remove('hidden');
                const digits = lockScreen.querySelectorAll('.pin-digit');
                digits.forEach(d => d.value = '');
                document.getElementById('lock-error').textContent = '';
                setTimeout(() => digits[0]?.focus(), 100);
                setupPINInputHandlers();
            }

            function hideLockScreen() {
                const lockScreen = document.getElementById('lock-screen');
                if (lockScreen) lockScreen.classList.add('hidden');
                resetIdleTimer();
            }

            function setupPINInputHandlers() {
                const lockScreen = document.getElementById('lock-screen');
                if (!lockScreen) return;
                const digits = lockScreen.querySelectorAll('.pin-digit');
                digits.forEach((digit, idx) => {
                    // Remove old listeners by cloning
                    const newDigit = digit.cloneNode(true);
                    digit.parentNode.replaceChild(newDigit, digit);
                });
                const freshDigits = lockScreen.querySelectorAll('.pin-digit');
                freshDigits.forEach((digit, idx) => {
                    digit.addEventListener('input', e => {
                        const val = e.target.value.replace(/\D/g, '');
                        e.target.value = val.slice(0, 1);
                        if (val) {
                            if (idx < freshDigits.length - 1) freshDigits[idx + 1].focus();
                            else document.getElementById('lock-unlock-btn').focus();
                        }
                    });
                    digit.addEventListener('keydown', e => {
                        if (e.key === 'Backspace' && !e.target.value && idx > 0) {
                            freshDigits[idx - 1].focus();
                        }
                        if (e.key === 'Enter') tryUnlock();
                    });
                });
                const unlockBtn = document.getElementById('lock-unlock-btn');
                if (unlockBtn) {
                    const newBtn = unlockBtn.cloneNode(true);
                    unlockBtn.parentNode.replaceChild(newBtn, unlockBtn);
                    newBtn.addEventListener('click', tryUnlock);
                }
            }

            function tryUnlock() {
                const lockScreen = document.getElementById('lock-screen');
                const digits = lockScreen.querySelectorAll('.pin-digit');
                const pin = Array.from(digits).map(d => d.value).join('');
                const errorEl = document.getElementById('lock-error');
                if (pin.length !== 4) {
                    errorEl.textContent = 'Enter all 4 digits';
                    return;
                }
                if (!state.settings.pinHash) {
                    // First time setup
                    state.settings.pinHash = hashPIN(pin);
                    state.settings.pinEnabled = true;
                    saveState();
                    hideLockScreen();
                    showToast('PIN set successfully. App is now protected.', 'success');
                    return;
                }
                if (hashPIN(pin) === state.settings.pinHash) {
                    hideLockScreen();
                    resetIdleTimer();
                } else {
                    errorEl.textContent = 'Incorrect PIN. Try again.';
                    digits.forEach(d => d.value = '');
                    digits[0].focus();
                }
            }

            let _idleTimer = null;
            let _idleWarningTimer = null;
            const IDLE_EVENTS = ['mousedown', 'mousemove', 'keydown', 'touchstart', 'scroll', 'input'];

            function resetIdleTimer() {
                if (!state.settings.pinEnabled || !state.settings.pinHash) return;
                if (_idleTimer) clearTimeout(_idleTimer);
                if (_idleWarningTimer) clearTimeout(_idleWarningTimer);
                const minutes = state.settings.autoLockMinutes || 15;
                const ms = minutes * 60 * 1000;
                // Show warning 30 seconds before lock
                if (ms > 30000) {
                    _idleWarningTimer = setTimeout(() => {
                        showToast('App will lock in 30 seconds due to inactivity.', 'warning');
                    }, ms - 30000);
                }
                _idleTimer = setTimeout(() => {
                    showLockScreen();
                    showToast('App locked due to inactivity.', 'info');
                }, ms);
            }

            function startIdleMonitoring() {
                IDLE_EVENTS.forEach(evt => {
                    document.addEventListener(evt, resetIdleTimer, { passive: true });
                });
                resetIdleTimer();
            }

            function stopIdleMonitoring() {
                IDLE_EVENTS.forEach(evt => {
                    document.removeEventListener(evt, resetIdleTimer, { passive: true });
                });
                if (_idleTimer) clearTimeout(_idleTimer);
                if (_idleWarningTimer) clearTimeout(_idleWarningTimer);
            }

            function maybeShowLockScreen() {
                if (state.settings.pinEnabled && state.settings.pinHash) {
                    showLockScreen();
                    startIdleMonitoring();
                }
            }

            // ------------------------------ TREND CHART ------------------------------
            const VITAL_COLORS = {
                hr: { color: '#ef4444', label: 'HR', min: 40, max: 140 },
                bp_sys: { color: '#3b82f6', label: 'SBP', min: 70, max: 180 },
                bp_dia: { color: '#60a5fa', label: 'DBP', min: 40, max: 110 },
                map: { color: '#a78bfa', label: 'MAP', min: 50, max: 130 },
                spo2: { color: '#10b981', label: 'SpO2', min: 85, max: 100 },
                temp_c: { color: '#f59e0b', label: 'Temp', min: 35, max: 40 },
                rr: { color: '#f97316', label: 'RR', min: 8, max: 30 },
            };
            let _chartActiveSeries = new Set(['hr', 'bp_sys', 'bp_dia', 'map', 'spo2', 'temp_c']);

            function renderTrendChart(canvasId, patientId) {
                const canvas = document.getElementById(canvasId);
                if (!canvas) return;
                const history = getPatientVitalHistory(patientId);
                if (history.length === 0) {
                    const ctx = canvas.getContext('2d');
                    const dpr = window.devicePixelRatio || 1;
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                    ctx.clearRect(0, 0, rect.width, rect.height);
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-muted').trim() || '#5a6e8a';
                    ctx.font = '12px "JetBrains Mono", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('No vital signs recorded yet.', rect.width / 2, rect.height / 2);
                    ctx.font = '10px "JetBrains Mono", monospace';
                    ctx.fillText('Enter vitals in Head-to-Toe Assessment to see trends.', rect.width / 2, rect.height / 2 + 18);
                    return;
                }
                const dpr = window.devicePixelRatio || 1;
                const rect = canvas.getBoundingClientRect();
                const W = rect.width;
                const H = rect.height;
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                const ctx = canvas.getContext('2d');
                ctx.scale(dpr, dpr);
                // Determine which vitals are present
                const activeKeys = Object.keys(VITAL_COLORS).filter(k => _chartActiveSeries.has(k));
                const presentKeys = activeKeys.filter(k => history.some(h => h.vitals[k] !== undefined));
                if (presentKeys.length === 0) {
                    ctx.clearRect(0, 0, W, H);
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-muted').trim() || '#5a6e8a';
                    ctx.font = '12px "JetBrains Mono", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('No data for selected vital signs.', W / 2, H / 2);
                    return;
                }
                // Calculate global Y range
                let globalMin = Infinity, globalMax = -Infinity;
                presentKeys.forEach(k => {
                    const cfg = VITAL_COLORS[k];
                    const vals = history.map(h => h.vitals[k]).filter(v => v !== undefined);
                    if (vals.length > 0) {
                        const vmin = Math.min(...vals);
                        const vmax = Math.max(...vals);
                        globalMin = Math.min(globalMin, Math.min(cfg.min, vmin));
                        globalMax = Math.max(globalMax, Math.max(cfg.max, vmax));
                    }
                });
                if (!isFinite(globalMin) || !isFinite(globalMax)) { globalMin = 0; globalMax = 100; }
                const padding = { top: 10, right: 10, bottom: 28, left: 38 };
                const chartW = W - padding.left - padding.right;
                const chartH = H - padding.top - padding.bottom;
                const yRange = globalMax - globalMin || 1;
                // Background
                ctx.clearRect(0, 0, W, H);
                ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--bg-card').trim() || '#0c1222';
                ctx.fillRect(0, 0, W, H);
                // Grid lines
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 0.5;
                for (let i = 0; i <= 5; i++) {
                    const y = padding.top + (chartH * i) / 5;
                    ctx.beginPath();
                    ctx.moveTo(padding.left, y);
                    ctx.lineTo(W - padding.right, y);
                    ctx.stroke();
                    // Y axis labels
                    const val = globalMax - (yRange * i) / 5;
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-muted').trim() || '#5a6e8a';
                    ctx.font = '9px "JetBrains Mono", monospace';
                    ctx.textAlign = 'right';
                    ctx.fillText(Math.round(val).toString(), padding.left - 6, y + 3);
                }
                // X axis labels (time)
                const timeLabels = 4;
                for (let i = 0; i < timeLabels; i++) {
                    const idx = Math.floor((history.length - 1) * i / (timeLabels - 1));
                    const entry = history[idx];
                    if (!entry) continue;
                    const x = padding.left + (chartW * i) / (timeLabels - 1);
                    const timeStr = new Date(entry.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--text-muted').trim() || '#5a6e8a';
                    ctx.font = '9px "JetBrains Mono", monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(timeStr, x, H - 6);
                }
                // Draw lines for each vital
                presentKeys.forEach(key => {
                    const cfg = VITAL_COLORS[key];
                    const points = history.map((h, i) => {
                        if (h.vitals[key] === undefined) return null;
                        const x = padding.left + (chartW * i) / Math.max(history.length - 1, 1);
                        const y = padding.top + chartH * (1 - (h.vitals[key] - globalMin) / yRange);
                        return { x, y, val: h.vitals[key] };
                    }).filter(p => p !== null);
                    if (points.length < 2) return;
                    // Line
                    ctx.strokeStyle = cfg.color;
                    ctx.lineWidth = 1.5;
                    ctx.beginPath();
                    ctx.moveTo(points[0].x, points[0].y);
                    for (let i = 1; i < points.length; i++) {
                        ctx.lineTo(points[i].x, points[i].y);
                    }
                    ctx.stroke();
                    // Dots
                    ctx.fillStyle = cfg.color;
                    points.forEach(p => {
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    // Label last point
                    const last = points[points.length - 1];
                    ctx.fillStyle = cfg.color;
                    ctx.font = 'bold 9px "JetBrains Mono", monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText(`${cfg.label} ${Math.round(last.val)}`, last.x + 6, last.y + 3);
                });
            }

            function generateTrendChartHTML(patientId) {
                const history = getPatientVitalHistory(patientId);
                if (history.length === 0) {
                    return `<div class="trend-chart-container"><div class="trend-chart-header"><span class="trend-chart-title">Vital Signs Trend</span></div><div class="trend-chart-empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:0.5rem;opacity:0.4;"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><br>No vital signs recorded yet.<br><span style="font-size:0.68rem;">Enter vitals in Head-to-Toe Assessment to see trends here.</span></div></div>`;
                }
                let legendHTML = '<div class="trend-chart-legend">';
                Object.entries(VITAL_COLORS).forEach(([key, cfg]) => {
                    const disabled = !_chartActiveSeries.has(key) ? 'disabled' : '';
                    legendHTML += `<span class="trend-legend-item ${disabled}" data-series="${key}"><span class="trend-legend-dot" style="background:${cfg.color};"></span>${cfg.label}</span>`;
                });
                legendHTML += '</div>';
                return `<div class="trend-chart-container"><div class="trend-chart-header"><span class="trend-chart-title">Vital Signs Trend</span>${legendHTML}</div><canvas id="trend-chart-canvas" class="trend-chart-canvas"></canvas></div>`;
            }

            function bindTrendChartEvents(patientId) {
                const container = document.getElementById('dashboard');
                if (!container) return;
                container.querySelectorAll('.trend-legend-item').forEach(item => {
                    item.addEventListener('click', () => {
                        const series = item.dataset.series;
                        if (_chartActiveSeries.has(series)) _chartActiveSeries.delete(series);
                        else _chartActiveSeries.add(series);
                        item.classList.toggle('disabled');
                        renderTrendChart('trend-chart-canvas', patientId);
                    });
                });
            }

            // ------------------------------ INIT ------------------------------
            try {
                loadConfig();
                await db.open();
                await loadState();
                if (!state.patients || state.patients.length === 0) {
                    state.patients = createInitialPatients();
                    state.activePatientId = 1;
                }
                if (!state.patients.find(p => p.id === state.activePatientId)) {
                    state.activePatientId = state.patients[0]?.id || 1;
                }
                if (!FORM_DEFS.find(f => f.id === state.activeFormId)) {
                    state.activeFormId = FORM_DEFS[0]?.id || 'demo-form';
                }
                render();
                maybeShowLockScreen();
                maybeShowOnboarding();
            } catch (e) {
                showToast('Initialization error. Please refresh the page.', 'error');
                document.getElementById('app').innerHTML =
                    '<div style="padding:3rem;text-align:center;color:var(--danger);"><h2>Initialization Error</h2><p>Please refresh the page. If the problem persists, clear browser data for this site.</p><button type="button" onclick="location.reload()" class="btn btn-teal" style="margin-top:1rem;">Reload</button></div>';
            }

        })();
    </script>
</body>
</html>
