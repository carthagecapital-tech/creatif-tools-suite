                    <button type="button" class="btn btn-ghost btn-sm" id="sidebar-settings" aria-label="Open settings"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg> Settings</button>
                    <button type="button" class="btn btn-ghost btn-sm" id="export-btn" aria-label="Export data"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:3px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export</button>
                    <button type="button" id="help-btn" aria-label="Keyboard shortcuts and tips" title="Help / Keyboard Shortcuts" style="margin-left:auto;width:1.85rem;height:1.85rem;border-radius:50%;background:var(--accent-teal);color:var(--text-inverse);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:0.92rem;font-weight:700;flex-shrink:0;transition:background 0.15s,transform 0.15s;">?</button>
                </div>
            </div>`;
            }

            function formListItem(f, status, isPinned = false) {
                const active = f.id === state.activeFormId;
                const statusColor = status === 'complete' ? 'var(--success)' : status === 'in-progress' ? 'var(--warning)' :
                    'var(--text-muted)';
                const statusGlow = status === 'complete' ? '0 0 0.46rem rgba(16,185,129,0.5)' : status === 'in-progress' ?
                    '0 0 0.46rem rgba(245,158,11,0.4)' : 'none';
                const statusLabel = status === 'complete' ? 'Complete' : status === 'in-progress' ? 'In Progress' :
                    'Not Started';
                return `<div class="form-item${active?' active-form':''}" data-formid="${escapeHTML(f.id)}" role="listitem" aria-label="${escapeHTML(f.name)} - ${statusLabel}" tabindex="0">
            <span class="status-dot" style="width:0.46rem;height:0.46rem;background:${statusColor};box-shadow:${statusGlow};" aria-hidden="true"></span>
            <span style="flex:1;font-size:0.85rem;color:${active?'var(--text-primary)':'var(--text-secondary)'};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHTML(f.name)}</span>
            <button type="button" class="pin-btn${isPinned?' pinned':''}" data-formid="${escapeHTML(f.id)}" aria-label="${isPinned?'Unpin':'Pin'} ${escapeHTML(f.name)}" title="${isPinned?'Unpin':'Pin'} form"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></button>
        </div>`;
            }

            function getSuggestedForm() {
                const pid = state.activePatientId;
                const completion = state.formCompletion[pid] || {};
                const status = id => completion[id] || 'not-started';
                // Priority order: assess → monitor → prevention → handoff
                const priority = [
                    { id: 'admission-nursing-assessment',      reason: 'Complete admission assessment' },
                    { id: 'head-to-toe-nursing-assessment',    reason: 'Perform head-to-toe shift assessment' },
                    { id: 'fall-risk-morse',                   reason: 'Assess fall risk' },
                    { id: 'pain-assessment-log',               reason: 'Document pain level and interventions' },
                    { id: 'io-tracking-24hr',                  reason: 'Track intake & output' },
                    { id: 'medication-reconciliation',         reason: 'Complete medication reconciliation' },
                    { id: 'braden-pressure-injury',            reason: 'Assess pressure injury risk' },
                    { id: 'patient-education-log',             reason: 'Document patient education' },
                    { id: 'shift-handoff-sbar',                reason: 'Prepare shift handoff report' },
                ];
                // First look for not-started forms in priority order
                for (const item of priority) {
                    if (status(item.id) === 'not-started') {
                        const def = FORM_DEFS.find(f => f.id === item.id);
                        if (def) return { form: def, reason: item.reason };
                    }
                }
                // If everything started, suggest oldest in-progress
                for (const item of priority) {
                    if (status(item.id) === 'in-progress') {
                        const def = FORM_DEFS.find(f => f.id === item.id);
                        if (def) return { form: def, reason: 'Resume in-progress form' };
                    }
                }
                return null;
            }

            function generateSuggestedFormHTML() {
                const suggestion = getSuggestedForm();
                if (!suggestion) return '';
                const { form, reason } = suggestion;
                return `<div class="card" style="padding:0.92rem 1.08rem;border-color:rgba(0,212,170,0.25);background:rgba(0,212,170,0.03);">
                    <div style="font-family:var(--font-mono);font-size:0.69rem;color:var(--accent-teal);margin-bottom:0.46rem;letter-spacing:0.05em;">SUGGESTED NEXT</div>
                    <div data-formid="${escapeHTML(form.id)}" style="cursor:pointer;padding:0.62rem 0.77rem;border-radius:var(--radius-md);border:1px solid rgba(0,212,170,0.2);background:rgba(0,212,170,0.05);transition:background 0.15s ease;" role="button" tabindex="0" aria-label="Navigate to ${escapeHTML(form.name)}">
                        <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--text-primary);font-weight:500;margin-bottom:0.2rem;">${escapeHTML(form.name)}</div>
                        <div style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);">${escapeHTML(reason)}</div>
                    </div>
                </div>`;
            }

            function generateDashboardHTML() {
                const patient = getActivePatient();
                const completedCount = Object.values(state.formCompletion[state.activePatientId] || {}).filter(s => s ===
                    'complete').length;
                const total = FORM_DEFS.length;
                const radius = 35,
                    circumference = 2 * Math.PI * radius,
                    offset = total > 0 ? circumference * (1 - completedCount / total) : circumference;
                const completionPercent = total > 0 ? Math.round((completedCount / total) * 100) : 0;
                let formStatusList = CATEGORIES.map(cat => {
                    const catForms = FORM_DEFS.filter(f => f.category === cat.id);
                    let items = catForms.map(f => {
                        const status = getFormCompletionStatus(state.activePatientId, f.id);
                        const active = f.id === state.activeFormId;
                        const ts = getFormTimestamp(state.activePatientId, f.id);
                        const timeStr = ts ? new Date(ts).toLocaleTimeString([], { hour: '2-digit',
                            minute: '2-digit' }) : '';
                        return `<div data-formid="${escapeHTML(f.id)}" style="display:flex;align-items:center;gap:0.6rem;padding:0.54rem 0.62rem;border-radius:var(--radius-sm);cursor:pointer;background:${active?'rgba(0,212,170,0.06)':'transparent'};transition:background 0.15s ease;" tabindex="0" role="button" aria-label="${escapeHTML(f.name)} - ${status==='complete'?'Complete':status==='in-progress'?'In Progress':'Not Started'}" onmouseenter="this.style.background='rgba(0,212,170,0.08)'" onmouseleave="this.style.background='${active?'rgba(0,212,170,0.06)':'transparent'}'">
                    <span class="status-dot" style="width:0.6rem;height:0.6rem;border-radius:50%;flex-shrink:0;background:${status==='complete'?'var(--success)':status==='in-progress'?'var(--warning)':'var(--text-muted)'};box-shadow:${status==='complete'?'0 0 0 2px rgba(16,185,129,0.25)':status==='in-progress'?'0 0 0 2px rgba(245,158,11,0.25)':'none'};" aria-hidden="true"></span>
                    <span style="font-size:0.88rem;color:${active?'var(--text-primary)':'var(--text-secondary)'};flex:1;line-height:1.3;">${escapeHTML(f.name)}</span>
                    ${timeStr?`<span style="font-size:0.72rem;color:var(--text-muted);font-family:var(--font-mono);flex-shrink:0;">${timeStr}</span>`:''}
                </div>`;
                    }).join('');
                    return `<div style="margin-bottom:0.85rem;" role="group" aria-label="${escapeHTML(cat.name)}"><div style="font-family:var(--font-mono);font-size:0.8rem;color:var(--accent-teal);margin-bottom:0.4rem;letter-spacing:0.04em;font-weight:500;">${escapeHTML(cat.name.toUpperCase())}</div>${items}</div>`;
                }).join('');
                const fbData = getFormData(state.activePatientId, 'fluid-balance-io');
                const ioIntake = (fbData.intakeRows||[]).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
                const ioOutput = (fbData.outputRows||[]).reduce((s,r)=>s+(parseFloat(r.amount)||0),0);
                const ioNet = ioIntake - ioOutput;
                const ioColor = ioNet > 500 ? 'var(--accent-blue)' : ioNet < -500 ? 'var(--danger)' : 'var(--success)';
                const ioHasData = (fbData.intakeRows?.length > 0) || (fbData.outputRows?.length > 0);
                return `
            <div class="card" style="padding:1.08rem;text-align:center;">
                <div style="font-family:var(--font-mono);font-size:0.92rem;color:var(--text-primary);font-weight:600;margin-bottom:0.31rem;">${escapeHTML(patient.name||'No Patient')}</div>
                <div style="display:flex;justify-content:center;margin:0.62rem 0;" aria-label="Form completion progress: ${completionPercent}%">
                    <svg width="80" height="80" viewBox="0 0 80 80" aria-hidden="true"><circle cx="40" cy="40" r="${radius}" fill="none" stroke="var(--border-subtle)" stroke-width="5"/><circle cx="40" cy="40" r="${radius}" fill="none" stroke="var(--accent-teal)" stroke-width="5" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}" transform="rotate(-90 40 40)" style="transition:stroke-dashoffset 0.6s ease;"/><text x="40" y="44" text-anchor="middle" fill="var(--text-primary)" font-family="var(--font-mono)" font-size="18" font-weight="500">${completedCount}</text></svg>
                </div>
                <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--text-secondary);">${completedCount} of ${total} forms complete (${completionPercent}%)</div>
            </div>
            <div class="card" style="padding:0.92rem 1.08rem;">
                <div style="font-family:var(--font-mono);font-size:0.77rem;color:var(--text-secondary);margin-bottom:0.46rem;">FLUID BALANCE (24HR)</div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.31rem;"><span style="font-size:0.77rem;color:var(--text-muted);font-family:var(--font-mono);">IN</span><span style="font-family:var(--font-mono);color:var(--accent-blue);">${ioIntake} mL</span></div>
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.46rem;"><span style="font-size:0.77rem;color:var(--text-muted);font-family:var(--font-mono);">OUT</span><span style="font-family:var(--font-mono);color:var(--warning);">${ioOutput} mL</span></div>
                <div style="border-top:1px solid var(--border-subtle);padding-top:0.46rem;display:flex;justify-content:space-between;align-items:center;"><span style="font-family:var(--font-mono);font-size:0.85rem;color:var(--text-primary);font-weight:600;">NET</span><span style="font-family:var(--font-mono);font-size:1.15rem;font-weight:700;color:${ioColor};">${ioNet>=0?'+':''}${ioNet} mL</span></div>
                ${!ioHasData ? `<div style="font-size:0.69rem;color:var(--text-muted);font-family:var(--font-mono);margin-top:0.31rem;">No I&O data entered</div>` : ''}
            </div>
            ${generateTrendChartHTML(state.activePatientId)}
            <div class="card" style="padding:1.15rem 1.08rem;flex:1;overflow:auto;min-height:320px;">
                <div style="font-family:var(--font-mono);font-size:0.95rem;color:var(--text-primary);margin-bottom:0.85rem;font-weight:600;letter-spacing:0.04em;">FORM STATUS</div>
                ${formStatusList}
            </div>
            ${generateSuggestedFormHTML()}
            <div class="card" style="padding:0.92rem 1.08rem;">
                <div style="font-family:var(--font-mono);font-size:0.77rem;color:var(--text-secondary);margin-bottom:0.62rem;">SHIFT INFO</div>
                <div style="font-size:0.85rem;color:var(--text-secondary);line-height:1.6;font-family:var(--font-mono);">
                    <div>Nurse: ${escapeHTML(patient.nurse||state.settings.nurseName)}</div>
                    <div>Unit: ${escapeHTML(patient.unit||state.settings.unit)}</div>
                    <div>Shift: ${escapeHTML(patient.shift||'Day')}</div>
                    <div>Date: ${escapeHTML(patient.date||new Date().toISOString().slice(0,10))}</div>
                    <div style="margin-top:0.46rem;color:var(--accent-teal);font-size:1rem;font-weight:500;" id="live-clock" aria-live="polite"></div>
                </div>
            </div>`;
            }

            function renderFormControls() {
                const patientId = state.activePatientId,
                    formId = state.activeFormId;
                const status = getFormCompletionStatus(patientId, formId);
                const isPinned = state.pinnedForms.includes(formId);
                const formDef = FORM_DEFS.find(f => f.id === formId);
                const formName = formDef ? formDef.name : 'Form';
                const controlsEl = document.getElementById('form-controls');
                if (!controlsEl) return;
                controlsEl.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.92rem;flex-wrap:wrap;">

                    <span style="width:0.77rem;height:0.77rem;border-radius:50%;background:${status==='complete'?'var(--success)':'var(--text-muted)'};display:inline-block;" aria-hidden="true"></span>
                    ${status==='complete'?'Complete':'Mark Complete'}
                </button>
                <button type="button" id="pin-form-btn" class="btn btn-ghost btn-sm" style="color:${isPinned?'var(--warning)':'var(--text-secondary)'};" aria-label="${isPinned?'Unpin':'Pin'} ${escapeHTML(formName)}"><svg width="14" height="14" viewBox="0 0 24 24" fill="${isPinned?'currentColor':'none'}" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg> ${isPinned?'Unpin':'Pin'}</button>
                <button type="button" id="clear-form-btn" class="btn btn-ghost btn-sm" aria-label="Clear form data"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Clear</button>
                <button type="button" id="history-btn" class="btn btn-ghost btn-sm" aria-label="View form history"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:4px;"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg> History</button>
                <span id="auto-save-status" style="margin-left:auto;font-family:var(--font-mono);font-size:0.77rem;color:var(--text-muted);" aria-live="polite">${state.autoSaveStatus}</span>
            </div>
            <div id="clear-confirm" style="display:none;align-items:center;gap:0.92rem;padding:0.77rem 1.08rem;border-radius:0.62rem;background:var(--danger-bg);border:0.08rem solid rgba(239,68,68,0.27);font-size:0.92rem;color:#fca5a5;" role="alert">
                <span>Clear all data in this form? This cannot be undone.</span>
                <button type="button" id="clear-confirm-yes" style="background:var(--danger);color:#fff;border:none;border-radius:var(--radius-sm);padding:0.38rem 0.92rem;cursor:pointer;font-family:var(--font-mono);font-size:0.77rem;">Yes, Clear</button>
                <button type="button" id="clear-confirm-no" style="background:transparent;color:var(--text-secondary);border:0.08rem solid var(--border-subtle);border-radius:var(--radius-sm);padding:0.38rem 0.92rem;cursor:pointer;font-family:var(--font-mono);font-size:0.77rem;">Cancel</button>
            </div>`;
            }

            function updateAutoSaveStatus() {
                const el = document.getElementById('auto-save-status');
                if (el) el.textContent = state.autoSaveStatus;
            }

            function renderLandingPage(container) {
                container.classList.remove('form-fade-in');
                void container.offsetWidth;
                container.classList.add('form-fade-in');
                container.innerHTML = `
                <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:2rem;text-align:center;gap:2rem;">
                    <div style="background:linear-gradient(135deg,rgba(0,212,170,0.12),rgba(59,130,246,0.08));border:1px solid rgba(0,212,170,0.2);border-radius:1.54rem;padding:3rem 2.5rem;max-width:640px;width:100%;">
                        <div style="font-family:var(--font-mono);font-size:0.72rem;color:var(--accent-teal);letter-spacing:0.12em;margin-bottom:1rem;">MED-SURG NURSEDESK PRO v2.0</div>
                        <h1 style="font-family:var(--font-mono);font-size:1.85rem;font-weight:600;color:var(--text-primary);margin-bottom:0.77rem;line-height:1.2;">Clinical Documentation.<br><span style="color:var(--accent-teal);">Built for the Bedside.</span></h1>
                        <p style="color:var(--text-secondary);font-size:0.95rem;line-height:1.7;margin-bottom:2rem;">30 professional Med-Surg forms. Real-time fluid balance. SBAR handoff. All offline, all on your device.</p>
                        <button type="button" id="landing-add-patient-btn" class="btn btn-teal" style="padding:0.92rem 2rem;font-size:1rem;border-radius:var(--radius-lg);">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
                            Add Your First Patient
                        </button>
                    </div>
                    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:0.92rem;max-width:640px;width:100%;">
                        ${[
                            { icon:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>', label:'Auto-save', desc:'Saves as you type' },
                            { icon:'<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>', label:'6 Patients', desc:'Full slot isolation' },
                            { icon:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>', label:'Export', desc:'JSON backup anytime' },
                            { icon:'<rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>', label:'100% Offline', desc:'No internet needed' },
                        ].map(f=>`<div style="background:rgba(255,255,255,0.02);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:1rem;text-align:left;">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent-teal)" stroke-width="2" style="margin-bottom:0.46rem;">${f.icon}</svg>
                            <div style="font-family:var(--font-mono);font-size:0.85rem;color:var(--text-primary);font-weight:600;">${f.label}</div>
                            <div style="font-size:0.77rem;color:var(--text-muted);margin-top:0.15rem;">${f.desc}</div>
                        </div>`).join('')}
                    </div>
                    <p style="font-size:0.69rem;color:var(--text-muted);font-family:var(--font-mono);">For educational and organizational purposes only. Not a medical device.</p>
                </div>`;
                container.querySelector('#landing-add-patient-btn')?.addEventListener('click', () => {
                    openPatientModal(getActivePatient());
                });
            }

            function renderFormContent() {
                const patientId = state.activePatientId,
                    formId = state.activeFormId;
                const patient = getActivePatient();

                // Clear any leftover alert strip from previous form
                document.getElementById('vital-alert-strip')?.remove();

                // Show landing page when active patient is a placeholder
                const container = document.getElementById('form-content');
                if (!container) return;
                if (patient.isPlaceholder) {
                    renderLandingPage(container);
                    return;
                }

                const formDef = FORM_DEFS.find(f => f.id === formId);
                if (!formDef) {
                    container.innerHTML =
                        '<div style="padding:3rem;text-align:center;color:var(--text-muted);"><p>Form not found. Please select a valid form from the sidebar.</p></div>';
                    return;
                }
                const formData = getFormData(patientId, formId);
                container.innerHTML = '';
                container.classList.remove('form-fade-in');
                void container.offsetWidth;
                container.classList.add('form-fade-in');
                container.setAttribute('aria-label', `Form: ${formDef.name}`);

                const ctxDiv = document.createElement('div');

                            fieldsGrid.appendChild(bradenSummary);

                            camSummary.style.cssText = 'grid-column:1/-1;padding:0.77rem 1rem;border-radius:var(--radius-md);font-family:var(--font-mono);font-size:0.92rem;display:flex;align-items:center;gap:1.5rem;margin-top:0.5rem;';
                            fieldsGrid.appendChild(camSummary);
                            updateCAMSummary(patientId, formId, sec.id);
                        }

                        formBody.appendChild(secDiv);
                    });
                } else if (formDef.type === 'sbar') {

                        { id: 'situation', title: 'S — Situation', color: '#00d4aa',
                            bg: 'rgba(0,212,170,0.04)', desc: 'What is happening right now? State the concern clearly.' },
                        { id: 'background', title: 'B — Background', color: '#3b82f6',
                            bg: 'rgba(59,130,246,0.04)',
                            desc: 'Relevant history: admission date, diagnosis, relevant labs, interventions.' },
                        { id: 'assessment', title: 'A — Assessment', color: '#f59e0b',
                            bg: 'rgba(245,158,11,0.04)',
                            desc: 'What do you think is going on? Clinical impression, vital sign trends.' },
                        { id: 'recommendation', title: 'R — Recommendation', color: '#10b981',
                            bg: 'rgba(16,185,129,0.04)',
                            desc: 'What needs to be done? Specific actions, orders requested, pending tasks.' }
                    ];
                    sbarSections.forEach(sec => {
                        const block = document.createElement('div');
                        block.style.cssText =
                            `margin-bottom:1.23rem;padding:1.23rem;border-radius:0.77rem;background:${sec.bg};border:0.08rem solid ${sec.color}22;border-left:0.23rem solid ${sec.color};`;
                        block.setAttribute('role', 'group');
                        block.setAttribute('aria-labelledby', `sbar-${sec.id}`);
                        block.innerHTML =
                            `<h3 id="sbar-${sec.id}" style="font-family:var(--font-mono);font-size:1.08rem;color:${sec.color};margin:0 0 0.31rem;">${escapeHTML(sec.title)}</h3><p style="color:#5a6e8a;font-size:0.85rem;margin:0 0 0.77rem;">${escapeHTML(sec.desc)}</p>`;
                        const ta = document.createElement('textarea');
                        ta.style.cssText =
                            'width:100%;min-height:6.15rem;background:var(--bg-input);border:0.08rem solid var(--border-subtle);border-radius:var(--radius-md);color:var(--text-primary);padding:0.77rem;font-family:var(--font-sans);font-size:1rem;';
                        ta.setAttribute('aria-label', sec.title);
                        ta.value = formData[sec.id] || '';
                        ta.addEventListener('input', e => {
                            const currentData = getFormData(patientId, formId);
                            setFormData(patientId, formId, { ...currentData, [sec.id]: e.target.value });
                        });
                        block.appendChild(ta);
                        formBody.appendChild(block);
                    });
                    const confDiv = document.createElement('div');
                    confDiv.style.cssText =
                        'margin-top:1.54rem;padding:1.23rem;border-radius:0.77rem;background:rgba(255,255,255,0.02);border:0.08rem solid var(--border-subtle);';
                    confDiv.setAttribute('role', 'group');
                    confDiv.setAttribute('aria-label', 'Handoff Confirmation');
                    confDiv.innerHTML =
                        `<h3 style="font-family:var(--font-mono);font-size:1rem;color:var(--text-primary);margin-bottom:0.92rem;">Handoff Confirmation</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.23rem;">
                    <div><label style="color:var(--text-secondary);font-size:0.77rem;font-family:var(--font-mono);">Outgoing Nurse Signature <span class="required-indicator">*</span></label><input type="text" id="sbar-out" placeholder="Print name" value="${escapeHTML(formData.outgoingNurse||'')}" aria-required="true"></div>
                    <div><label style="color:var(--text-secondary);font-size:0.77rem;font-family:var(--font-mono);">Incoming Nurse Signature <span class="required-indicator">*</span></label><input type="text" id="sbar-in" placeholder="Print name" value="${escapeHTML(formData.incomingNurse||'')}" aria-required="true"></div>
                </div>`;
                    formBody.appendChild(confDiv);
                    // Use requestAnimationFrame to ensure DOM is ready for event binding
                    requestAnimationFrame((function(pid, fid) {
                        return function() {
                            const outEl = document.getElementById('sbar-out');
                            const inEl = document.getElementById('sbar-in');
                            if (outEl) outEl.addEventListener('input', e => {
                                const currentData = getFormData(pid, fid);
                                setFormData(pid, fid, { ...currentData, outgoingNurse: e.target.value });
                            });
                            if (inEl) inEl.addEventListener('input', e => {
                                const currentData = getFormData(pid, fid);
                                setFormData(pid, fid, { ...currentData, incomingNurse: e.target.value });
                            });
                        };
                    })(patientId, formId));
                } else if (formDef.type === 'fluid-balance') {
                    const fluidContent = renderFluidBalance(formData, patientId, formId);
                    formBody.innerHTML = fluidContent.html;
                    requestAnimationFrame(() => {
                        bindFluidEvents(patientId, formId, (newData) => setFormData(patientId, formId, newData));
                    });
                } else if (formDef.type === 'mar') {
                    const marContent = renderMAR(formData, patientId, formId);
                    formBody.innerHTML = marContent.html;
                    requestAnimationFrame(() => {
                        bindMAREvents(patientId, formId, (newData) => setFormData(patientId, formId, newData));
                    });
                }
                container.appendChild(formBody);

                const notesDiv = document.createElement('div');
                notesDiv.style.cssText =
                    'margin-top:1.54rem;padding-top:1.23rem;border-top:0.08rem solid var(--border-subtle);';
                notesDiv.innerHTML =
                    `<label style="color:var(--text-secondary);font-size:0.85rem;font-family:var(--font-mono);margin-bottom:0.46rem;display:block;">Clinical Notes / Additional Observations</label>`;
                const notesTa = document.createElement('textarea');
                notesTa.style.width = '100%';
                notesTa.placeholder = 'Enter additional clinical notes, observations, or follow-up items...';
                notesTa.setAttribute('aria-label', 'Clinical notes');
                notesTa.value = formData.clinicalNotes || '';
                notesTa.addEventListener('input', e => {
                    const currentData = getFormData(patientId, formId);
                    setFormData(patientId, formId, { ...currentData, clinicalNotes: e.target.value });

            function updateFieldValidation(field, inputElement, value) {
                if (!field.required) return;
                const isEmpty = value === '' || value === undefined || value === null || (Array.isArray(value) && value
                    .length === 0);
                if (isEmpty) {
                    inputElement.classList.add('input-error');
                    inputElement.classList.remove('input-valid');
                } else {
                    inputElement.classList.remove('input-error');
                    if (field.normalRange || field.criticalBelow !== undefined || field.criticalAbove !== undefined) {
                        const flag = getClinicalFlag(field, value);
                        if (flag === 'critical') {
                            inputElement.classList.add('input-error');
                            inputElement.classList.remove('input-valid');
                        } else if (flag === 'abnormal') {
                            inputElement.classList.add('input-valid');
                            inputElement.style.borderColor = 'var(--warning)';
                        } else {
                            inputElement.classList.add('input-valid');
                            inputElement.style.borderColor = '';
                        }
                    } else {
                        inputElement.classList.add('input-valid');
                    }
                }
            }

            function updateSectionStatusIndicator(secDiv, section, patientId, formId) {
                const statusEl = secDiv.querySelector('.section-status');
                const newStatus = getSectionCompletionStatus(patientId, formId, section.id);
                if (statusEl) {
                    statusEl.textContent = newStatus === 'complete' ? 'Complete' : newStatus === 'in-progress' ?
                        'In Progress' : 'Not Started';
                    statusEl.className = 'section-status ' + (newStatus === 'complete' ? 'flag-normal' : newStatus ===
                        'in-progress' ? 'flag-warning' : '');
                } else if (newStatus !== 'not-started') {
                    const header = secDiv.querySelector('.section-header');
                    if (header) {
                        const span = document.createElement('span');
                        span.className = 'section-status ' + (newStatus === 'complete' ? 'flag-normal' :
                            'flag-warning');
                        span.style.cssText = 'font-size:0.65rem;';
                        span.textContent = newStatus === 'complete' ? 'Complete' : 'In Progress';
                        header.appendChild(span);
                    }
                }
            }

            function createFieldElement(field, value, onChange) {
                if (field.type === 'select') {
                    const sel = document.createElement('select');
                    sel.setAttribute('aria-label', field.label);
                    sel.innerHTML = `<option value="">--Select--</option>` + field.options.map(o =>
                        `<option value="${escapeHTML(o)}" ${value===o?'selected':''}>${escapeHTML(o)}</option>`).join('');
                    sel.addEventListener('change', e => onChange(e.target.value));
                    return sel;
                } else if (field.type === 'radio') {
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.gap = '0.92rem';
                    div.style.flexWrap = 'wrap';
                    div.setAttribute('role', 'radiogroup');
                    div.setAttribute('aria-label', field.label);
                    const name = `radio_${field.id}_${Date.now()}`;
                    field.options.forEach(o => {
                        const label = document.createElement('label');
                        label.style.cssText =
                            'display:flex;align-items:center;gap:0.38rem;color:var(--text-secondary);font-size:0.92rem;cursor:pointer;';
                        const radio = document.createElement('input');
                        radio.type = 'radio';
                        radio.name = name;
                        radio.value = o;
                        radio.checked = value === o;
                        radio.addEventListener('change', () => onChange(o));
                        label.appendChild(radio);
                        label.appendChild(document.createTextNode(o));
                        div.appendChild(label);
                    });
                    return div;
                } else if (field.type === 'checkboxes') {
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.gap = '0.92rem';
                    div.style.flexWrap = 'wrap';
                    div.setAttribute('role', 'group');
                    div.setAttribute('aria-label', field.label);
                    field.options.forEach(o => {
                        const label = document.createElement('label');
                        label.style.cssText =
                            'display:flex;align-items:center;gap:0.38rem;color:var(--text-secondary);font-size:0.92rem;cursor:pointer;';
                        const cb = document.createElement('input');
                        cb.type = 'checkbox';
                        cb.checked = Array.isArray(value) && value.includes(o);
                        cb.addEventListener('change', () => {
                            const newVal = cb.checked ? [...(Array.isArray(value) ? value : []),
                                o
                            ] : (Array.isArray(value) ? value : []).filter(v => v !== o);
                            onChange(newVal);
                        });
                        label.appendChild(cb);
                        label.appendChild(document.createTextNode(o));
                        div.appendChild(label);
                    });
                    return div;
                } else if (field.type === 'textarea') {
                    const ta = document.createElement('textarea');
                    ta.value = value || '';
                    ta.placeholder = field.placeholder || '';
                    ta.setAttribute('aria-label', field.label);
                    if (field.min !== undefined) ta.setAttribute('min', field.min);
                    if (field.max !== undefined) ta.setAttribute('max', field.max);
                    ta.addEventListener('input', e => onChange(e.target.value));
                    return ta;
                } else {
                    const input = document.createElement('input');
                    input.type = field.type || 'text';
                    input.value = value || '';
                    input.placeholder = field.placeholder || '';
                    input.setAttribute('aria-label', field.label);
                    input.dataset.fieldid = field.id;
                    if (field.min !== undefined) input.setAttribute('min', field.min);
                    if (field.max !== undefined) input.setAttribute('max', field.max);
                    if (field.type === 'number') {
                        input.setAttribute('step', 'any');
                        input.style.fontFamily = 'var(--font-mono)';
                    }
                    input.addEventListener('input', e => {
                        let newVal = e.target.value;
                        if (field.type === 'number' && newVal !== '') {
                            if (/[eE+]/.test(newVal)) { e.target.value = newVal.replace(/[eE+]/g, ''); newVal = e.target.value; }
                            const num = parseFloat(newVal);
                            if (!isNaN(num)) {
                                if (field.min !== undefined && num < field.min) newVal = String(field.min);
                                if (field.max !== undefined && num > field.max) newVal = String(field.max);
                                if (newVal !== e.target.value) e.target.value = newVal;
                            }
                        }
                        onChange(newVal);
                    });
                    input.addEventListener('blur', e => {
                        if (field.type === 'number' && e.target.value !== '') {
                            const num = parseFloat(e.target.value);
                            if (field.min !== undefined && num < field.min) {
                                e.target.value = field.min;
                                onChange(String(field.min));
                            }
                            if (field.max !== undefined && num > field.max) {
                                e.target.value = field.max;
                                onChange(String(field.max));
                            }
                        }
                    });
                    if (field.type === 'time' || field.type === 'datetime-local') {
                        const wrapper = document.createElement('div');
                        wrapper.style.cssText = 'display:flex;gap:0.4rem;align-items:center;';
                        const nowBtn = document.createElement('button');
                        nowBtn.type = 'button';
                        nowBtn.textContent = 'Now';
                        nowBtn.style.cssText = 'padding:0.3rem 0.6rem;font-size:0.75rem;font-family:var(--font-mono);background:transparent;border:1px solid var(--border-subtle);border-radius:var(--radius-sm);color:var(--accent-teal);cursor:pointer;white-space:nowrap;';
                        nowBtn.addEventListener('click', () => {
                            const now = new Date();
                            const hh = String(now.getHours()).padStart(2, '0');
                            const mm = String(now.getMinutes()).padStart(2, '0');
                            const timeVal = `${hh}:${mm}`;
                            input.value = field.type === 'datetime-local'
                                ? new Date(now - now.getTimezoneOffset()*60000).toISOString().slice(0,16)
                                : timeVal;
                            onChange(input.value);
                        });
                        wrapper.appendChild(input);
                        wrapper.appendChild(nowBtn);
                        return wrapper;
                    }
                    return input;
                }
            }

            function renderFluidBalance(data, patientId, formId) {
                const intakeRows = data.intakeRows || [],
                    outputRows = data.outputRows || [];
                let html = `<div>`;
                ['intake', 'output'].forEach(type => {
                    const rows = type === 'intake' ? intakeRows : outputRows;
                    const title = type === 'intake' ? 'INTAKE' : 'OUTPUT';
                    const color = type === 'intake' ? '#3b82f6' : '#f59e0b';
                    html +=
                        `<div style="margin-bottom:1.54rem;" role="group" aria-label="${title}"><h3 style="font-family:var(--font-mono);font-size:1rem;color:${color};margin-bottom:0.77rem;border-bottom:0.08rem solid ${color}44;padding-bottom:0.46rem;">${title}</h3>
            <table style="width:100%;border-collapse:collapse;font-size:0.92rem;" aria-label="${title} rows"><thead><tr style="border-bottom:0.08rem solid var(--border-subtle);">
                <th style="padding:0.62rem 0.46rem;text-align:left;color:var(--text-secondary);font-family:var(--font-mono);font-size:0.77rem;">Time</th>
                <th style="padding:0.62rem 0.46rem;text-align:left;color:var(--text-secondary);font-family:var(--font-mono);font-size:0.77rem;">Source/Type</th>
                <th style="padding:0.62rem 0.46rem;text-align:right;color:var(--text-secondary);font-family:var(--font-mono);font-size:0.77rem;">Amount (mL)</th><th style="width:2.3rem;"></th></tr></thead><tbody>`;
                    rows.forEach(row => {
                        html +=
                            `<tr><td><input class="fluid-time" data-id="${row.id}" data-type="${type}" value="${escapeHTML(row.time||'')}" placeholder="HH:MM" aria-label="Time" style="width:5.38rem;font-size:0.85rem;"></td>
                <td><input class="fluid-source" data-id="${row.id}" data-type="${type}" value="${escapeHTML(row.source||'')}" placeholder="${type==='intake'?'e.g. IV NS':'e.g. Urine'}" aria-label="Source" style="width:100%;font-size:0.85rem;"></td>
                <td><input class="fluid-amount" data-id="${row.id}" data-type="${type}" value="${escapeHTML(row.amount||'')}" placeholder="0" aria-label="Amount in mL" style="width:6.15rem;text-align:right;font-family:var(--font-mono);"></td>
                <td><button type="button" class="del-row-btn" data-id="${row.id}" data-type="${type}" aria-label="Delete row" style="background:none;border:none;color:var(--danger);cursor:pointer;padding:0;display:flex;align-items:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></td></tr>`;
                    });
                    const total = rows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                    html +=
                        `<tr style="background:rgba(0,212,170,0.06);font-weight:600;"><td colspan="2" style="padding:0.62rem 0.46rem;font-family:var(--font-mono);font-size:0.92rem;color:var(--accent-teal);">Total ${title}</td><td style="text-align:right;font-family:var(--font-mono);font-size:1.08rem;color:var(--accent-teal);">${total} mL</td><td></td></tr></tbody></table>
            <button class="add-row-btn" data-type="${type}" style="margin-top:0.62rem;background:none;border:0.08rem solid var(--border-subtle);color:var(--text-secondary);padding:0.46rem 0.92rem;border-radius:var(--radius-sm);cursor:pointer;font-family:var(--font-mono);font-size:0.85rem;" aria-label="Add row to ${title}">+ Add Row</button></div>`;
                });
                const intakeTotal = intakeRows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                const outputTotal = outputRows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                const balance = intakeTotal - outputTotal;
                const balanceColor = balance >= 0 ? '#3b82f6' : '#ef4444';
                const balanceBg = balance >= 0 ? 'rgba(59,130,246,0.08)' : 'rgba(239,68,68,0.08)';
                html +=
                    `<div style="padding:1.08rem 1.23rem;border-radius:0.62rem;background:${balanceBg};border:0.15rem solid ${balanceColor};display:flex;justify-content:space-between;align-items:center;margin-top:1.23rem;" aria-live="polite" aria-label="Net fluid balance">
            <span style="font-family:var(--font-mono);font-size:1.08rem;color:var(--text-primary);">NET BALANCE</span>
            <span style="font-family:var(--font-mono);font-size:1.54rem;font-weight:600;color:${balanceColor};">${balance>=0?'+':''}${balance} mL</span></div></div>`;
                return { html, intakeRows, outputRows };
            }

            function updateGCSSummary(patientId, formId, sectionId) {
                const summaryEl = document.getElementById(`gcs-summary-${sectionId}`);
                if (!summaryEl) return;
                const data = getFormData(patientId, formId);
                const secData = data[sectionId] || {};
                const eye = parseInt(secData.gcs_eye) || 0;
                const verbal = parseInt(secData.gcs_verbal) || 0;
                const motor = parseInt(secData.gcs_motor) || 0;
                const total = eye + verbal + motor;
                let severity = '', severityColor = 'var(--text-muted)';
                if (total === 0) { severity = 'Not entered'; }
                else if (total >= 13) { severity = 'Mild'; severityColor = 'var(--success)'; }
                else if (total >= 9) { severity = 'Moderate'; severityColor = 'var(--warning)'; }
                else if (total >= 4) { severity = 'Severe'; severityColor = 'var(--danger)'; }
                else { severity = 'Coma'; severityColor = 'var(--danger)'; }
                summaryEl.innerHTML = `<span style="color:var(--text-secondary);">GCS TOTAL:</span><span style="font-size:1.38rem;font-weight:700;color:${severityColor};">${total>0?total:'—'} / 15</span><span style="color:${severityColor};font-weight:600;">${severity}</span><span style="color:var(--text-muted);font-size:0.77rem;">E${eye||'?'} V${verbal||'?'} M${motor||'?'}</span>`;
            }

            function updateBradenSummary(patientId, formId, sectionId) {
                const summaryEl = document.getElementById(`braden-summary-${sectionId}`);
                if (!summaryEl) return;
                const data = getFormData(patientId, formId);
                const secData = data[sectionId] || {};
                const fields = ['sensory','moisture','activity','mobility','nutrition','shear'];
                const scores = fields.map(f => parseInt(secData[f]) || 0);
                const total = scores.reduce((a,b) => a+b, 0);
                const allEntered = scores.every(s => s > 0);
                let risk = '', riskColor = 'var(--text-muted)', bg = 'rgba(255,255,255,0.03)';
                if (!allEntered) { risk = 'Enter all 6 scores'; }
                else if (total >= 19) { risk = 'No Risk'; riskColor = 'var(--success)'; bg = 'rgba(16,185,129,0.06)'; }
                else if (total >= 15) { risk = 'Mild Risk'; riskColor = 'var(--success)'; bg = 'rgba(16,185,129,0.06)'; }
                else if (total >= 13) { risk = 'Moderate Risk'; riskColor = 'var(--warning)'; bg = 'rgba(245,158,11,0.08)'; }
                else if (total >= 10) { risk = 'High Risk'; riskColor = 'var(--danger)'; bg = 'rgba(239,68,68,0.08)'; }
                else { risk = 'Very High Risk'; riskColor = 'var(--danger)'; bg = 'rgba(239,68,68,0.12)'; }
                summaryEl.style.background = bg;
                summaryEl.style.border = `1px solid ${riskColor}44`;
                summaryEl.innerHTML = `<span style="color:var(--text-secondary);">BRADEN SCORE:</span><span style="font-size:1.38rem;font-weight:700;color:${riskColor};">${allEntered?total:'—'} / 23</span><span style="color:${riskColor};font-weight:600;">${risk}</span>`;
                if (allEntered) {
                    const updated = { ...secData, total_score: String(total) };
                    setFormData(patientId, formId, { ...getFormData(patientId,formId), [sectionId]: updated });
                    const totalInput = document.querySelector(`#form-content input[aria-label="Total Score"]`);
                    if (totalInput) totalInput.value = total;
                }
            }

            function updateCAMSummary(patientId, formId, sectionId) {
                const summaryEl = document.getElementById(`cam-summary-${sectionId}`);
                if (!summaryEl) return;
                const data = getFormData(patientId, formId);
                const d = data[sectionId] || {};
                const f1 = d.feature1 === 'Yes';
                const f2 = parseInt(d.feature2_errors) > 2;
                const rassVal = d.rass || '';
                const f3 = rassVal !== '' && rassVal !== '0 Alert and calm';
                const f4answers = [d.feature4_q1, d.feature4_q2, d.feature4_q3, d.feature4_q4];
                const f4Incorrect = f4answers.some(a => a === 'Incorrect');
                const f4Commands = d.feature4_commands === 'Not Followed';
                const f4 = f4Incorrect || f4Commands;
                const hasEnoughData = d.feature1 && d.feature2_errors !== undefined && d.rass;
                let result, resultColor, bg;
                if (!hasEnoughData) { result = 'Incomplete — enter Features 1, 2, and RASS'; resultColor = 'var(--text-muted)'; bg = 'rgba(255,255,255,0.03)'; }
                else if (d.rass === '-4 Deep sedation' || d.rass === '-5 Unarousable') { result = 'Unable to Assess (RASS -4 or -5)'; resultColor = 'var(--text-muted)'; bg = 'rgba(255,255,255,0.03)'; }
                else if (f1 && f2 && (f3 || f4)) { result = 'CAM-ICU POSITIVE — Delirium Present'; resultColor = 'var(--danger)'; bg = 'rgba(239,68,68,0.08)'; }
                else { result = 'CAM-ICU NEGATIVE — No Delirium Detected'; resultColor = 'var(--success)'; bg = 'rgba(16,185,129,0.06)'; }
                summaryEl.style.background = bg;
                summaryEl.style.border = `1px solid ${resultColor}44`;
                summaryEl.innerHTML = `<span style="font-size:1rem;font-weight:700;color:${resultColor};">${result}</span>`;
                if (hasEnoughData) {
                    const autoResult = (d.rass === '-4 Deep sedation' || d.rass === '-5 Unarousable') ? 'Unable to assess' : (f1 && f2 && (f3 || f4)) ? 'Positive' : 'Negative';
                    if (d.cam_result !== autoResult) {
                        const updated = { ...d, cam_result: autoResult };
                        setFormData(patientId, formId, { ...getFormData(patientId,formId), [sectionId]: updated });
                        const camResultSelect = document.querySelector(`#form-content select[aria-label="CAM-ICU Result"]`);
                        if (camResultSelect) camResultSelect.value = autoResult;
                    }
                }
            }

            function updateFluidTotalsDOM(patientId, formId) {
                const data = getFormData(patientId, formId);
                const intakeRows = data.intakeRows || [];
                const outputRows = data.outputRows || [];
                const intakeTotal = intakeRows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                const outputTotal = outputRows.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
                const balance = intakeTotal - outputTotal;
                const balanceColor = balance >= 0 ? '#3b82f6' : '#ef4444';
                const balanceBg = balance >= 0 ? 'rgba(59,130,246,0.08)' : 'rgba(239,68,68,0.08)';

                const tables = document.querySelectorAll('#form-content table');
                tables.forEach((table, idx) => {
                    const rows = table.querySelectorAll('tr');
                    const lastRow = rows[rows.length - 1];
                    if (lastRow && lastRow.textContent.includes('Total')) {
                        const totalVal = idx === 0 ? intakeTotal : outputTotal;
                        const cells = lastRow.querySelectorAll('td');
                        if (cells.length >= 2) {
                            cells[cells.length - 2].innerHTML = `<span style="font-family:var(--font-mono);font-size:1.08rem;color:var(--accent-teal);">${totalVal} mL</span>`;
                        }
                    }
                });

                const netBanner = document.querySelector('#form-content > div > div:last-child');
                if (netBanner && netBanner.textContent.includes('NET BALANCE')) {
                    netBanner.style.background = balanceBg;
                    netBanner.style.borderColor = balanceColor;
                    netBanner.innerHTML = `
                        <span style="font-family:var(--font-mono);font-size:1.08rem;color:var(--text-primary);">NET BALANCE</span>
                        <span style="font-family:var(--font-mono);font-size:1.54rem;font-weight:600;color:${balanceColor};">${balance>=0?'+':''}${balance} mL</span>
                    `;
                }
                updateDashboard();
            }

            function bindFluidEvents(patientId, formId, updateData) {
                const formBody = document.getElementById('form-content');
                if (!formBody) return;
                const addBtns = formBody.querySelectorAll('.add-row-btn');
                const delBtns = formBody.querySelectorAll('.del-row-btn');
                const fluidInputs = formBody.querySelectorAll('.fluid-time, .fluid-source, .fluid-amount');

                addBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const data = getFormData(patientId, formId);
                        const type = btn.dataset.type;
                        const key = type === 'intake' ? 'intakeRows' : 'outputRows';
                        const newRow = { id: crypto.randomUUID(), time: '', source: '', amount: '' };
                        updateData({ ...data, [key]: [...(data[key] || []), newRow] });
                        renderFormContent();
                    });
                });

                delBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        const data = getFormData(patientId, formId);
                        const rowId = btn.dataset.id,
                            type = btn.dataset.type;
                        const key = type === 'intake' ? 'intakeRows' : 'outputRows';
                        updateData({ ...data, [key]: (data[key] || []).filter(r => r.id !== rowId) });
                        renderFormContent();
                    });
                });

                fluidInputs.forEach(inp => {
                    inp.addEventListener('input', () => {
                        const data = getFormData(patientId, formId);
                        const rowId = inp.dataset.id,
                            type = inp.dataset.type;
                        const field = inp.classList.contains('fluid-time') ? 'time' : inp.classList
                            .contains('fluid-source') ? 'source' : 'amount';
                        const key = type === 'intake' ? 'intakeRows' : 'outputRows';
                        const rows = (data[key] || []).map(r => r.id === rowId ? { ...r, [field]: inp.value } : r);
                        updateData({ ...data, [key]: rows });
                        updateFluidTotalsDOM(patientId, formId); // FIX: recalculate totals live
                    });
                });
            }

            function renderMAR(formData, patientId, formId) {
                const medications = formData.medications || [];
                const standardTimes = ['08:00', '09:00', '10:00', '11:00', '12:00', '13:00', '14:00', '15:00', '16:00', '17:00', '18:00', '19:00', '20:00'];
                let html = '<div style="margin-bottom:1rem;">';

                html += '</div>';

                    html += '<div style="text-align:center;padding:2rem;color:var(--text-muted);font-family:var(--font-mono);font-size:0.85rem;border:0.08rem dashed var(--border-subtle);border-radius:var(--radius-md);">No medications added yet.<br>Click "Add Medication" to start building the MAR.</div>';
                } else {
                    html += '<div style="overflow-x:auto;">';
                    html += '<table style="width:100%;border-collapse:collapse;font-size:0.8rem;">';
                    html += '<thead><tr style="background:var(--bg-sidebar);">';
                    html += '<th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);min-width:120px;">Medication</th>';
                    html += '<th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Dose</th>';
                    html += '<th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Route</th>';
                    html += '<th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Freq</th>';
                    standardTimes.forEach(t => {
                        html += `<th style="padding:0.4rem;text-align:center;font-family:var(--font-mono);font-size:0.65rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);min-width:45px;">${t}</th>`;
                    });
                    html += '<th style="padding:0.5rem;border-bottom:0.08rem solid var(--border-subtle);width:40px;"></th>';
                    html += '</tr></thead><tbody>';
                    medications.forEach((med, idx) => {
                        const givenStatus = med.givenStatus || {};
                        const isPRN = med.isPRN;
                        html += `<tr data-med-index="${idx}" style="border-bottom:0.08rem solid var(--border-subtle);${isPRN ? 'background:rgba(245,158,11,0.04);' : ''}">`;
                        html += `<td style="padding:0.4rem;"><input type="text" class="mar-med-name" data-field="name" data-idx="${idx}" value="${escapeHTML(med.name || '')}" placeholder="Med name" style="width:100%;min-width:110px;font-size:0.78rem;padding:0.3rem;"></td>`;
                        html += `<td style="padding:0.4rem;"><input type="text" class="mar-med-dose" data-field="dose" data-idx="${idx}" value="${escapeHTML(med.dose || '')}" placeholder="Dose" style="width:70px;font-size:0.78rem;padding:0.3rem;"></td>`;
                        html += `<td style="padding:0.4rem;"><select class="mar-med-route" data-field="route" data-idx="${idx}" style="width:65px;font-size:0.75rem;padding:0.2rem;"><option value="">--</option><option value="PO" ${med.route==='PO'?'selected':''}>PO</option><option value="IV" ${med.route==='IV'?'selected':''}>IV</option><option value="IM" ${med.route==='IM'?'selected':''}>IM</option><option value="SQ" ${med.route==='SQ'?'selected':''}>SQ</option><option value="PR" ${med.route==='PR'?'selected':''}>PR</option><option value="SL" ${med.route==='SL'?'selected':''}>SL</option><option value="INH" ${med.route==='INH'?'selected':''}>INH</option><option value="TOP" ${med.route==='TOP'?'selected':''}>TOP</option><option value="NG" ${med.route==='NG'?'selected':''}>NG</option><option value="Other" ${med.route==='Other'?'selected':''}>Other</option></select></td>`;
                        html += `<td style="padding:0.4rem;"><select class="mar-med-freq" data-field="frequency" data-idx="${idx}" style="width:70px;font-size:0.75rem;padding:0.2rem;"><option value="">--</option><option value="Q1H" ${med.frequency==='Q1H'?'selected':''}>Q1H</option><option value="Q2H" ${med.frequency==='Q2H'?'selected':''}>Q2H</option><option value="Q4H" ${med.frequency==='Q4H'?'selected':''}>Q4H</option><option value="Q6H" ${med.frequency==='Q6H'?'selected':''}>Q6H</option><option value="Q8H" ${med.frequency==='Q8H'?'selected':''}>Q8H</option><option value="Q12H" ${med.frequency==='Q12H'?'selected':''}>Q12H</option><option value="BID" ${med.frequency==='BID'?'selected':''}>BID</option><option value="TID" ${med.frequency==='TID'?'selected':''}>TID</option><option value="QID" ${med.frequency==='QID'?'selected':''}>QID</option><option value="Daily" ${med.frequency==='Daily'?'selected':''}>Daily</option><option value="PRN" ${med.frequency==='PRN'?'selected':''}>PRN</option><option value="Once" ${med.frequency==='Once'?'selected':''}>Once</option><option value="Continuous" ${med.frequency==='Continuous'?'selected':''}>Cont</option></select></td>`;
                        standardTimes.forEach(t => {
                            const status = givenStatus[t] || '';
                            const btnClass = status === 'given' ? 'background:#065f46;color:#fff;' : status === 'held' ? 'background:#78350f;color:#fff;' : status === 'missed' ? 'background:#7f1d1d;color:#fff;' : 'background:var(--bg-input);color:var(--text-muted);';

                        });
                        html += `<td style="padding:0.4rem;text-align:center;"><button type="button" class="mar-del-med-btn" data-idx="${idx}" style="background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding:0.2rem;" title="Remove medication">&times;</button></td>`;
                        html += '</tr>';
                        // Indication row for PRN
                        if (isPRN || med.frequency === 'PRN') {
                            html += `<tr style="border-bottom:0.08rem solid var(--border-subtle);"><td colspan="${4 + standardTimes.length + 1}" style="padding:0.3rem 0.5rem;"><input type="text" class="mar-med-indication" data-field="indication" data-idx="${idx}" value="${escapeHTML(med.indication || '')}" placeholder="PRN indication / reason for use" style="width:100%;font-size:0.75rem;padding:0.25rem 0.5rem;background:rgba(245,158,11,0.03);"></td></tr>`;

                        // Hold reason row if any held

                            html += `<tr style="border-bottom:0.08rem solid var(--border-subtle);"><td colspan="${4 + standardTimes.length + 1}" style="padding:0.3rem 0.5rem;"><input type="text" class="mar-med-hold-reason" data-field="holdReason" data-idx="${idx}" value="${escapeHTML(med.holdReason || '')}" placeholder="Hold reason (e.g., NPO, BP low, patient refused)" style="width:100%;font-size:0.75rem;padding:0.25rem 0.5rem;background:rgba(239,68,68,0.03);"></td></tr>`;
                        }
                    });
                    html += '</tbody></table></div>';
                }
                // PRN section
                html += '<div style="margin-top:1.5rem;padding-top:1rem;border-top:0.08rem solid var(--border-subtle);">';
                html += '<h3 style="font-family:var(--font-mono);font-size:1rem;color:var(--text-primary);margin-bottom:0.75rem;">PRN / As-Needed Medications</h3>';
                const prnMeds = medications.filter(m => m.isPRN || m.frequency === 'PRN');
                if (prnMeds.length === 0) {
                    html += '<div style="color:var(--text-muted);font-size:0.8rem;font-family:var(--font-mono);">No PRN medications. Add a medication with frequency "PRN" to track as-needed meds.</div>';
                } else {
                    html += '<table style="width:100%;border-collapse:collapse;font-size:0.8rem;">';
                    html += '<thead><tr style="background:var(--bg-sidebar);"><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Medication</th><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Dose</th><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Route</th><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Indication</th><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Given Time</th><th style="padding:0.5rem;text-align:left;font-family:var(--font-mono);font-size:0.7rem;color:var(--text-secondary);border-bottom:0.08rem solid var(--border-subtle);">Effect / Outcome</th></tr></thead><tbody>';
                    prnMeds.forEach(med => {
                        const givenEntries = med.prnGiven || [];
                        if (givenEntries.length === 0) {
                            html += `<tr style="border-bottom:0.08rem solid var(--border-subtle);"><td style="padding:0.4rem;">${escapeHTML(med.name || '—')}</td><td style="padding:0.4rem;">${escapeHTML(med.dose || '—')}</td><td style="padding:0.4rem;">${escapeHTML(med.route || '—')}</td><td style="padding:0.4rem;">${escapeHTML(med.indication || '—')}</td><td style="padding:0.4rem;color:var(--text-muted);">Not given</td><td style="padding:0.4rem;">—</td></tr>`;
