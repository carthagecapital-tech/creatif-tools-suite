  // Schedule chart rendering after DOM update
  let chartRenderQueue = [];
  let chartRenderRAF = null;

  function scheduleChartRender(fn) {
    chartRenderQueue.push(fn);
    if (!chartRenderRAF) {
      chartRenderRAF = requestAnimationFrame(() => {
        chartRenderRAF = null;
        const queue = chartRenderQueue;
        chartRenderQueue = [];
        queue.forEach(f => {
          try { f(); } catch (e) { console.error('Chart render error:', e); }
        });
      });
    }
  }

  function cancelChartRenders() {
    if (chartRenderRAF) {
      cancelAnimationFrame(chartRenderRAF);
      chartRenderRAF = null;
    }
    chartRenderQueue = [];
  }

  /* ==========================================================================
   * FILTERING HELPERS
   * ========================================================================== */
  function getFilteredPosts() {
    let posts = state.data.posts;
    if (state.activePlatformFilter !== 'all') {
      posts = posts.filter(p => p.platforms && p.platforms.includes(state.activePlatformFilter));
    }
    return posts;
  }

  function getAnalyticsDateRange(range) {
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    let from = null;

    switch (range) {
      case '7d':
        from = new Date(today);
        from.setDate(today.getDate() - 7);
        return { from: dateToISO(from), to: dateToISO(today) };
      case '30d':
        from = new Date(today);
        from.setDate(today.getDate() - 30);
        return { from: dateToISO(from), to: dateToISO(today) };
      case '90d':
        from = new Date(today);
        from.setDate(today.getDate() - 90);
        return { from: dateToISO(from), to: dateToISO(today) };
      case 'mo':
        from = new Date(today.getFullYear(), today.getMonth(), 1);
        return { from: dateToISO(from), to: dateToISO(today) };
      case 'lmo': {
        const lm = new Date(today.getFullYear(), today.getMonth() - 1, 1);
        const lme = new Date(today.getFullYear(), today.getMonth(), 0);
        return { from: dateToISO(lm), to: dateToISO(lme) };
      }
      default:
        return { from: null, to: null };
    }
  }

  function filterPostsByRange(posts, range) {
    const { from, to } = getAnalyticsDateRange(range);
    if (!from) return posts;
    return posts.filter(p => {
      const d = p.publishedDate || p.scheduledDate;
      return d && d >= from && d <= to;
    });
  }

  function filterHistoryByRange(history, range) {
    if (range === 'all') return history;
    const { from } = getAnalyticsDateRange(range);
    if (!from) return history;
    const fromMonth = from.slice(0, 7);
    const toMonth = dateToISO(new Date()).slice(0, 7);
    return history.filter(a => a.month >= fromMonth && a.month <= toMonth);
  }

  /* ==========================================================================
   * NAVIGATION & ROUTING
   * ========================================================================== */
  function navigate(page, opts) {
    if (!PAGE_TITLES[page]) return;
    opts = opts || {};
    const wasOnSamePage = state.currentPage === page;
    state.currentPage = page;

    document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
    const target = document.getElementById('page-' + page);
    if (target) target.classList.add('active');

    document.getElementById('topbarTitle').textContent = PAGE_TITLES[page] || page;
    document.title = PAGE_TITLES[page] + ' — ContentFlow Pro';
    renderSidebar();
    cancelChartRenders();
    destroyAllCharts();
    renderPage(page);
    closeMobileSidebar();

    // History: pushState for new pages so the browser back button works.
    // replaceState only on initial load or when triggered by hashchange/popstate.
    if (!opts.fromHashChange) {
      const url = '#' + page;
      try {
        if (window.location.hash !== url) {
          if (opts.replace || wasOnSamePage) {
            history.replaceState({ page: page }, '', url);
          } else {
            history.pushState({ page: page }, '', url);
          }
        }
      } catch (_) { /* sandboxed iframe — history API blocked, safe to ignore */ }
    }

    // Scroll content area to top on navigation
    const content = document.getElementById('content');
    if (content) content.scrollTop = 0;
  }
  window.navigate = navigate;

  function renderPage(page) {
    const fn = window['render_' + page];
    if (typeof fn === 'function') {
      try {
        fn();
      } catch (e) {
        console.error('Render error for page', page, e);
        document.getElementById('page-' + page).innerHTML =
          `<div class="card" style="padding:40px;text-align:center;">
            <div style="font-size:2rem;margin-bottom:10px;">⚠️</div>
            <div class="text-title">Something went wrong</div>
            <p class="muted text-body" style="margin-top:8px;">There was an error rendering this page. Please try refreshing.</p>
            <button class="btn btn-primary" style="margin-top:14px;" onclick="navigate('dashboard')">Go to Dashboard</button>
          </div>`;
      }
    }
  }

  function toggleSidebar() {
    document.getElementById('app').classList.toggle('sidebar-collapsed');
  }

  function openMobileSidebar() {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebarOverlay').classList.add('open');
  }

  function closeMobileSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  function renderSidebar() {
    const nav = document.getElementById('sidebarNav');
    let htmlStr = '';
    NAV_GROUPS.forEach(group => {
      htmlStr += '<div class="nav-group"><div class="nav-group-label">' + esc(group.label) + '</div>';
      group.items.forEach(item => {
        const active = state.currentPage === item.id ? ' active' : '';
        const badge = item.badge ? '<span class="nav-badge">' + esc(item.badge) + '</span>' : '';
        const icon = navIcon(item.id);
        htmlStr += `<div class="nav-item${active}" data-nav="${esc(item.id)}" title="${esc(item.label)}" role="button" tabindex="0">
          <span class="nav-item-icon">${icon.__html}</span>
          <span class="nav-item-label">${esc(item.label)}</span>${badge}
        </div>`;
      });
      htmlStr += '</div>';
    });
    nav.innerHTML = htmlStr;

    // Update user info — prefer Settings → Profile values; fall back to first team member
    const settings = state.data.settings || {};
    const teamMember = state.data.team.find(x => x.id === 'u1') || state.data.team[0] || {};
    const name = settings.userName || teamMember.name || 'User';
    const role = settings.userRole || teamMember.role || '';
    const color = settings.userColor || teamMember.color || '#e11d48';
    const initials = name.split(/\s+/).map(p => p.charAt(0).toUpperCase()).slice(0, 2).join('') || '??';

  function getNotifications() {
    const today = todayISO();
    const notifs = [];
    const prefs = (state.data.settings && state.data.settings.notifications) || {};
    state.data.posts.forEach(p => {
      if (prefs.postsDueToday !== false && p.status === 'scheduled' && p.scheduledDate === today) {
        notifs.push({ msg: '📅 Scheduled today: ' + p.title, postId: p.id });
      }
      if (prefs.overdueDrafts !== false && p.status === 'draft' && p.scheduledDate && p.scheduledDate < today) {
        notifs.push({ msg: '⚠️ Overdue draft: ' + p.title, postId: p.id });
      }
    });
    return notifs;
  }

  function doDownloadPDF() {
    if (typeof window.html2pdf !== 'function') {
      showToast('PDF library still loading — please retry in a moment', 'warning');
      doPrint(); // fall back to native print dialog (which can save as PDF)
      return;
    }
    const activePage = document.querySelector('.page.active');
    if (!activePage) { showToast('Nothing to export', 'warning'); return; }
    preparePrintMeta();
    showToast('Generating PDF…', 'info', 2000);
    document.body.classList.add('pdf-rendering');

    // Clone the active page into a printable wrapper so we don't disturb live UI
    const wrap = document.createElement('div');
    wrap.style.cssText = 'background:#fff;color:#000;padding:24px;font-family:Inter,system-ui,sans-serif;width:794px;';
    const headerHTML = document.querySelector('.print-only-header').innerHTML;
    const footerHTML = document.querySelector('.print-only-footer').innerHTML;
    wrap.innerHTML =
      '<div style="text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #000;">' + headerHTML + '</div>' +
      '<div style="color:#000;">' + activePage.innerHTML + '</div>' +
      '<div style="text-align:center;font-size:9pt;color:#666;margin-top:24px;padding-top:12px;border-top:1px solid #ccc;">' + footerHTML + '</div>';
    // Force light backgrounds for PDF readability
    wrap.querySelectorAll('canvas').forEach(c => { c.style.maxWidth = '100%'; });
    wrap.querySelectorAll('.card, .stat-card, .kanban-card, .queue-card, .idea-card, .kanban-col').forEach(el => {
      el.style.background = '#fff';
      el.style.color = '#000';
      el.style.border = '1px solid #ddd';
      el.style.boxShadow = 'none';
    });
    wrap.querySelectorAll('*').forEach(el => {
      const cs = getComputedStyle(el);
      if (cs.color && cs.color.includes('rgb(') && cs.color !== 'rgb(0, 0, 0)') {
        // Keep brand/category colors but darken text to be readable on white
        if (el.matches('.text-title, .text-section, .section-title, h1, h2, h3, p, span, div, td, th, label')) {
          if (cs.color === 'rgb(255, 255, 255)' || cs.color.startsWith('rgba(255, 255, 255')) {
            el.style.color = '#0f172a';
          }
        }
      }
    });
    document.body.appendChild(wrap);

    const filename = 'ContentFlow_' + (PAGE_TITLES[state.currentPage] || 'Page').replace(/\s+/g, '_') + '_' + todayISO() + '.pdf';
    window.html2pdf().set({
      margin: [10, 10, 10, 10],
      filename: filename,
      image: { type: 'jpeg', quality: 0.95 },
      html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff', logging: false },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
    }).from(wrap).save().then(() => {
      document.body.removeChild(wrap);
      document.body.classList.remove('pdf-rendering');
      showToast('PDF downloaded', 'success');
    }).catch(err => {
      console.error('PDF generation failed:', err);
      if (wrap.parentNode) document.body.removeChild(wrap);
      document.body.classList.remove('pdf-rendering');
      showToast('PDF failed — opening print dialog instead', 'warning');
      doPrint();
    });
  }

  /* ==========================================================================
   * DASHBOARD RENDER
   * ========================================================================== */
  window.render_dashboard = function() {
    const today = todayISO();
    const posts = state.data.posts;
    const postsToday = posts.filter(p => p.scheduledDate === today);
    const postsThisWeek = posts.filter(p => {
      const w = getWeekDates(0);
      return w.includes(p.scheduledDate);
    });
    const scheduled = posts.filter(p => p.status === 'scheduled');
    const drafts = posts.filter(p => p.status === 'draft');
    const ideas = posts.filter(p => p.status === 'idea');
    const published = posts.filter(p => p.status === 'published');
    const avgEng = published.length
      ? (published.reduce((s, p) => s + (p.metrics.engagementRate || 0), 0) / published.length)
      : 0;
    const totalFollowers = state.data.platforms.reduce((s, p) => s + p.followers, 0);
    const lastHistoryMonth = state.data.analyticsHistory[state.data.analyticsHistory.length - 1];
    const followersGained = lastHistoryMonth
      ? state.data.analyticsHistory.filter(a => a.month === lastHistoryMonth.month).reduce((s, a) => s + a.followersGained, 0)
      : 0;

    // Real avg-engagement delta vs prior month
    let prevMonthEng = 0;
    if (state.data.analyticsHistory.length > 0) {
      const months = Array.from(new Set(state.data.analyticsHistory.map(a => a.month))).sort();
      if (months.length >= 2) {
        const prev = months[months.length - 2];
        const prevRows = state.data.analyticsHistory.filter(a => a.month === prev);
        prevMonthEng = prevRows.length
          ? prevRows.reduce((s, a) => s + (a.avgEngagementRate || 0), 0) / prevRows.length
          : 0;
      }
    }
    const engDelta = prevMonthEng > 0 ? avgEng - prevMonthEng : 0;
    const engDeltaSign = engDelta > 0 ? '+' : '';
    const engDeltaCls = engDelta > 0.05 ? 'trend-up' : (engDelta < -0.05 ? 'trend-down' : 'muted');

    const now = new Date();
    const greetingHour = now.getHours();
    const greet = greetingHour < 12 ? 'Good morning' : (greetingHour < 18 ? 'Good afternoon' : 'Good evening');
    const dateStr = DAYS_FULL[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
    const userName = ((state.data.settings.userName || 'Jordan').split(' ')[0]);

    const todayQueue = posts
      .filter(p => (p.status === 'scheduled' || p.status === 'published') &&
                   (p.scheduledDate === today || p.scheduledDate === dateToISO(new Date(Date.now() + 86400000))))
      .sort((a, b) => (a.scheduledDate + a.scheduledTime).localeCompare(b.scheduledDate + b.scheduledTime));

    const container = document.getElementById('page-dashboard');

    // Build queue strip
    let queueHTML = '';
    if (todayQueue.length === 0) {
      queueHTML = '<div class="muted text-body">Nothing scheduled for today or tomorrow. <span class="section-title-link" data-nav="composer" role="button" tabindex="0">Schedule one →</span></div>';
    } else {
      queueHTML = '<div class="queue-strip">' + todayQueue.map(p => {
        const a = getAssignee(p.assigneeId);
        const pColor = getPlatformColor(p.platforms[0]);
        const avHTML = a ? avatarHTML(a).__html : '';
        const plHTML = platformList(p.platforms.slice(0, 2), 16).__html;
        const badgeHTML = getStatusBadge(p.status).__html;
        const shortPl = esc(p.platforms[0].toUpperCase().slice(0, 2));
        return `<div class="queue-card" style="border-left-color:${esc(pColor)};" data-post-id="${esc(p.id)}" role="button" tabindex="0">
          <div class="queue-card-head">${plHTML} <span class="queue-card-time">${esc(p.scheduledTime || '—')}</span></div>
          <div class="queue-card-meta">${shortPl} · ${esc(p.type)}</div>
          <div class="queue-card-title">${esc(p.title)}</div>
          <div class="queue-card-foot">${badgeHTML} ${avHTML}</div>
        </div>`;
      }).join('') + '</div>';
    }

    // Build week strip
    const weekDates = getWeekDates(0);
    let weekHTML = '';
    weekDates.forEach(d => {
      const dt = parseDate(d);
      const isToday = d === today;
      const dayPosts = posts.filter(p => p.scheduledDate === d);
      const dots = dayPosts.slice(0, 5).map(p => {
        const color = getPlatformColor(p.platforms[0]);
        return `<span class="week-day-dot" style="background:${safeColor(color)};" aria-hidden="true"></span>`;
      }).join('');
      weekHTML += `<div class="week-day${isToday ? ' today' : ''}" data-week-date="${esc(d)}" role="button" tabindex="0">
        <div class="week-day-name">${DAYS[dt.getDay()]}</div>
        <div class="week-day-num metric">${dt.getDate()}</div>
        <div class="week-day-dots">${dots}</div>
      </div>`;
    });

    // Platform performance rows — real growth based on analytics history
    let perfHTML = '';
    state.data.platforms.filter(p => p.active).forEach(p => {
      const history = state.data.analyticsHistory.filter(a => a.platform === p.id);
      const lastMo = history[history.length - 1] || {};
      const prevMo = history[history.length - 2];
      let growthPct = 0;
      if (prevMo && prevMo.followers > 0 && lastMo.followers != null) {
        growthPct = ((lastMo.followers - prevMo.followers) / prevMo.followers) * 100;
      } else if (lastMo.followersGained != null && lastMo.followers > 0) {
        const baseline = lastMo.followers - lastMo.followersGained;
        growthPct = baseline > 0 ? (lastMo.followersGained / baseline) * 100 : 0;
      }
      const trendCls = growthPct >= 0 ? 'trend-up' : 'trend-down';
      const arrow = growthPct >= 0 ? '↑' : '↓';
      const sign = growthPct >= 0 ? '+' : '';
      perfHTML += `<div class="platform-perf-row">
        <div>${platformIcon(p.id, 20).__html}</div>
        <div class="name">${esc(p.name)}</div>
        <div class="stat metric">${fmt(p.followers)}</div>
        <div class="stat metric">${lastMo.posts || 0} posts</div>
        <div class="stat metric">${(lastMo.avgEngagementRate || 0).toFixed(1)}%</div>
        <div class="stat ${trendCls}">${arrow} ${sign}${growthPct.toFixed(1)}%</div>
      </div>`;
    });

    // Upcoming deadlines
    const upcoming = posts
      .filter(p => p.scheduledDate && p.status !== 'published')
      .sort((a, b) => (a.scheduledDate + a.scheduledTime).localeCompare(b.scheduledDate + b.scheduledTime))
      .slice(0, 7);

    let upcomingHTML = '';
    if (!upcoming.length) {
      upcomingHTML = '<div class="muted text-body">All clear!</div>';
    } else {
      upcomingHTML = upcoming.map(p => {

  /* ==========================================================================

  window.render_calendar = function() {
    if (!state.currentMonth) {
      const t = new Date();
      state.currentMonth = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0');
    }
    const [yStr, mStr] = state.currentMonth.split('-');
    const y = parseInt(yStr), mo = parseInt(mStr) - 1;
    const view = state.calendarView;

    let campaignHTML = '';
    if (state.data.campaigns.length) {
      campaignHTML = '<div style="display:flex;gap:14px;margin-bottom:14px;flex-wrap:wrap;">' +
        state.data.campaigns.map(c =>
          `<div style="display:flex;align-items:center;gap:6px;font-size:0.78rem;"><span style="width:10px;height:10px;border-radius:3px;background:${safeColor(c.color)};" aria-hidden="true"></span>${esc(c.name)}</div>`
        ).join('') + '</div>';
    }

    document.getElementById('page-calendar').innerHTML = `
      <div class="cal-toolbar">
        <button class="btn btn-ghost" id="calPrevBtn">‹ Prev</button>
        <div class="cal-month-label">${MONTHS_FULL[mo]} ${y}</div>
        <button class="btn btn-ghost" id="calNextBtn">Next ›</button>
        <button class="btn btn-secondary" id="calTodayBtn">Today</button>
        <div class="cal-toolbar-spacer"></div>
        <select class="select" style="width:auto;" id="calViewSelect">
          <option value="month" ${view === 'month' ? 'selected' : ''}>Month View</option>
          <option value="week" ${view === 'week' ? 'selected' : ''}>Week View</option>
          <option value="list" ${view === 'list' ? 'selected' : ''}>List View</option>
        </select>
      </div>
      ${campaignHTML}
      <div id="calBody"></div>
    `;

    // Bind toolbar events
    document.getElementById('calPrevBtn').addEventListener('click', () => navMonth(-1));
    document.getElementById('calNextBtn').addEventListener('click', () => navMonth(1));
    document.getElementById('calTodayBtn').addEventListener('click', goToday);
    document.getElementById('calViewSelect').addEventListener('change', function() {
      setCalView(this.value);
    });

    if (view === 'month') renderCalMonth(y, mo);
    else if (view === 'week') renderCalWeek();
    else renderCalList();
  };

  function navMonth(delta) {
    const [yStr, mStr] = state.currentMonth.split('-');
    let y = parseInt(yStr), m = parseInt(mStr) - 1 + delta;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    state.currentMonth = y + '-' + String(m + 1).padStart(2, '0');
    render_calendar();
  }

  function goToday() {
    const t = new Date();
    state.currentMonth = t.getFullYear() + '-' + String(t.getMonth() + 1).padStart(2, '0');
    state.currentWeek = 0;
    render_calendar();
  }

  function setCalView(v) {
    state.calendarView = v;
    render_calendar();
  }

  function renderCalMonth(y, m) {
    const grid = getMonthGrid(y, m);
    const today = todayISO();
    const posts = getFilteredPosts();
    const weekStart = (state.data.settings && state.data.settings.weekStartsOn != null) ? state.data.settings.weekStartsOn : 1;
    const dayLabels = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const orderedDays = Array.from({ length: 7 }, (_, i) => dayLabels[(weekStart + i) % 7]);

    let htmlStr = '<div class="cal-grid"><div class="cal-weekday-row">';
    orderedDays.forEach(d => htmlStr += `<div class="cal-weekday">${d}</div>`);
    htmlStr += '</div>';

    grid.forEach(week => {
      htmlStr += '<div class="cal-week">';
      week.forEach(day => {
        const dayPosts = posts.filter(p => p.scheduledDate === day.date);
        const otherClass = day.inMonth ? '' : ' other-month';
        const todayClass = day.date === today ? ' today' : '';
        const visiblePosts = dayPosts.slice(0, 3);
        const more = dayPosts.length - visiblePosts.length;

        htmlStr += `<div class="cal-day${otherClass}${todayClass}" data-date="${day.date}">
          <span class="cal-day-num">${day.day}</span>`;

        visiblePosts.forEach(p => {
          const camp = state.data.campaigns.find(c => c.name === p.campaign);
          const bg = camp ? camp.color : getPlatformColor(p.platforms[0]);
          const plHTML = platformList(p.platforms.slice(0, 1), 12).__html;
          htmlStr += `<div class="cal-chip cal-chip-status-${esc(p.status)}" style="border-left-color:${safeColor(bg)};" draggable="true" data-post-id="${esc(p.id)}">
            ${plHTML}<span style="overflow:hidden;text-overflow:ellipsis;">${esc(p.title)}</span>
          </div>`;
        });

        if (more > 0) {
          htmlStr += `<div class="cal-more" data-date="${day.date}">+${more} more</div>`;
        }
        htmlStr += `<div class="cal-add" data-date="${day.date}">+ add</div>`;
        htmlStr += '</div>';
      });
      htmlStr += '</div>';
    });
    htmlStr += '</div>';

    const calBody = document.getElementById('calBody');
    calBody.innerHTML = htmlStr;

    // Bind calendar events
    calBody.querySelectorAll('.cal-chip[data-post-id]').forEach(chip => {
      chip.addEventListener('click', function(e) {
        e.stopPropagation();
        openComposer(this.dataset.postId);
      });
    });
    calBody.querySelectorAll('.cal-more[data-date]').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        showDayPostsModal(this.dataset.date);
      });
    });
    calBody.querySelectorAll('.cal-add[data-date]').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        openComposerForDate(this.dataset.date);
      });
    });
  }

    const today = todayISO();

    let htmlStr = `<div style="display:flex;gap:6px;margin-bottom:14px;">
      <button class="btn btn-ghost" id="calWeekPrev">‹ Prev Week</button>
      <button class="btn btn-secondary" id="calWeekToday">This Week</button>
      <button class="btn btn-ghost" id="calWeekNext">Next Week ›</button>
    </div>`;

    htmlStr += '<div class="cal-grid"><div class="cal-weekday-row">';
    week.forEach(d => {
      const dt = parseDate(d);
      htmlStr += `<div class="cal-weekday">${DAYS[dt.getDay()]} ${dt.getDate()}</div>`;
    });
    htmlStr += '</div><div class="cal-week" style="min-height:500px;">';

    week.forEach(d => {
      const dayPosts = posts.filter(p => p.scheduledDate === d).sort((a, b) => (a.scheduledTime || '').localeCompare(b.scheduledTime || ''));
      const todayClass = d === today ? ' today' : '';
      htmlStr += `<div class="cal-day${todayClass}" data-date="${d}" style="min-height:500px;">`;

      dayPosts.forEach(p => {
        const plHTML = platformList(p.platforms, 14).__html;
        htmlStr += `<div class="cal-chip cal-chip-status-${esc(p.status)}" style="border-left-color:${esc(getPlatformColor(p.platforms[0]))};padding:8px;margin-bottom:6px;" draggable="true" data-post-id="${esc(p.id)}">

        htmlStr += '<div class="muted text-tiny" style="text-align:center;margin-top:20px;">No posts</div>';
      }
      htmlStr += `<div class="cal-add" data-date="${d}">+ add</div>`;
      htmlStr += '</div>';
    });

    htmlStr += '</div></div>';
    document.getElementById('calBody').innerHTML = htmlStr;

    // Bind week navigation
    document.getElementById('calWeekPrev').addEventListener('click', () => {
      state.currentWeek--;
      render_calendar();
    });
    document.getElementById('calWeekToday').addEventListener('click', () => {
      state.currentWeek = 0;
      render_calendar();
    });
    document.getElementById('calWeekNext').addEventListener('click', () => {
      state.currentWeek++;
      render_calendar();

    // Bind chip clicks
    document.getElementById('calBody').querySelectorAll('.cal-chip[data-post-id]').forEach(chip => {
      chip.addEventListener('click', function(e) {
        e.stopPropagation();
        openComposer(this.dataset.postId);
      });

    document.getElementById('calBody').querySelectorAll('.cal-add[data-date]').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        openComposerForDate(this.dataset.date);
      });
    });
  }

  function renderCalList() {
    const posts = getFilteredPosts()
      .filter(p => p.scheduledDate)
      .sort((a, b) => (a.scheduledDate + a.scheduledTime).localeCompare(b.scheduledDate + b.scheduledTime));

        htmlStr += `<div class="cal-list-date-header">${getDayName(d)}, ${formatDate(d)}</div>`;

          htmlStr += `<div class="cal-list-row" data-post-id="${esc(p.id)}" role="button" tabindex="0">

  function duplicatePost(id) {
    const p = state.data.posts.find(x => x.id === id);
    if (!p) return;
    const copy = clone(p);
    copy.id = uid('p');
    copy.title = p.title + ' (copy)';
    copy.status = 'draft';
    copy.publishedDate = '';
    copy.metrics = { likes: 0, comments: 0, shares: 0, saves: 0, reach: 0, impressions: 0, clicks: 0, engagementRate: 0 };
    copy.createdAt = new Date().toISOString();
    state.data.posts.push(copy);
    save();
    showToast('Post duplicated', 'success');
    renderPage(state.currentPage);
  }

  function deletePost(id) {
    const post = state.data.posts.find(p => p.id === id);
    if (!post) return;
    const snapshot = clone(post);
    state.data.posts = state.data.posts.filter(p => p.id !== id);
    save();
    closeAllModals();
    renderPage(state.currentPage);
    showUndoToast('Post deleted: ' + (post.title || 'Untitled'), () => {
      state.data.posts.push(snapshot);
      save();
      renderPage(state.currentPage);
      showToast('Post restored', 'success');
    });
  }

  function filterPipelinePosts(colId) {
    const f = state.pipelineFilter;
    let posts = state.data.posts.filter(p => p.status === colId);
    if (state.activePlatformFilter !== 'all') posts = posts.filter(p => p.platforms.includes(state.activePlatformFilter));
    if (f.platform !== 'all') posts = posts.filter(p => p.platforms.includes(f.platform));
    if (f.assignee !== 'all') posts = posts.filter(p => p.assigneeId === f.assignee);
    if (f.campaign !== 'all') posts = posts.filter(p => p.campaign === f.campaign);
    if (f.type !== 'all') posts = posts.filter(p => p.type === f.type);
    if (f.search) {
      const s = f.search.toLowerCase();
      posts = posts.filter(p => p.title.toLowerCase().includes(s) || (p.caption || '').toLowerCase().includes(s));
    }
    return posts;
  }

  function openComposer(postId) {
    if (postId) {
      const p = state.data.posts.find(x => x.id === postId);
      if (p) {
        state.selectedPostId = postId;
        state.composerData = clone(p);
      } else {
        state.composerData = blankComposerData();
      }
    } else {
      state.selectedPostId = null;
      state.composerData = blankComposerData();
    }
    state.composerPreviewPlatform = state.composerData.platforms[0] || 'instagram';
    showComposerModal();

  function showComposerModal() {
    closeAllModals();
    const isEdit = !!state.selectedPostId;
    const content = `
      <div class="modal-header">
        <div class="modal-title">${isEdit ? '✏️ Edit Post' : '✍️ New Post'}</div>

        <button class="btn btn-ghost" id="cmpCancel">Cancel</button>
        <button class="btn btn-secondary" id="cmpSaveDraft">Save Draft</button>
        <button class="btn btn-primary" id="cmpSave">Save Post <kbd class="kbd-hint">⌘S</kbd></button>
      </div>`;
    const modalId = openModal(content, 'lg');

    const overlay = document.getElementById(modalId);
    if (overlay) {
      overlay.querySelector('#cmpCancel').addEventListener('click', () => closeModal(modalId));
      overlay.querySelector('#cmpSave').addEventListener('click', () => { closeModal(modalId); composerSave(); });
      overlay.querySelector('#cmpSaveDraft').addEventListener('click', () => { closeModal(modalId); composerSave('draft'); });
      overlay.querySelector('#cmpDuplicate').addEventListener('click', composerDuplicate);
      if (isEdit) {
        overlay.querySelector('#cmpDelete').addEventListener('click', composerDelete);
      }

      // Ctrl/Cmd+S inside the composer saves instead of triggering the browser save dialog
      overlay.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 's') {
          e.preventDefault();
          closeModal(modalId);
          composerSave();
        }
      });

      renderComposerBody();
    }
  }

  function composerTogglePlatform(id) {
    const arr = state.composerData.platforms;
    const idx = arr.indexOf(id);
    if (idx === -1) arr.push(id);
    else if (arr.length > 1) arr.splice(idx, 1);
    if (!arr.includes(state.composerPreviewPlatform)) state.composerPreviewPlatform = arr[0];
    renderComposerBody();
  }

  function composerSetType(t) {
    state.composerData.type = t;
    renderComposerBody();
  }

  function addHashtag(val) {
    val = (val || '').replace(/^#/, '').trim();
    if (!val) return;
    if (state.composerData.hashtags.length >= 30) {
      showToast('Max 30 hashtags reached', 'warning');
      return;
    }
    if (!state.composerData.hashtags.includes(val)) {
      state.composerData.hashtags.push(val);
    }
    renderComposerBody();
    setTimeout(() => {
      const input = document.getElementById('hashInput');
      if (input) input.focus();
    }, 50);
  }

  function removeHashtag(h) {
    state.composerData.hashtags = state.composerData.hashtags.filter(x => x !== h);
    renderComposerBody();
  }

  function loadHashtagSet(id) {
    const set = state.data.hashtagSets.find(s => s.id === id);
    if (!set) return;
    const combined = Array.from(new Set([...state.composerData.hashtags, ...set.hashtags]));
    if (combined.length > 30) {
      showToast('Set would exceed 30 hashtags. Truncated to 30.', 'warning');
      state.composerData.hashtags = combined.slice(0, 30);
    } else {
      state.composerData.hashtags = combined;
    }
    state.composerData.hashtagSetId = id;
    renderComposerBody();
    showToast('Loaded ' + set.hashtags.length + ' hashtags from "' + set.name + '"', 'info');
  }

  function updateCharCounters() {
    const cont = document.getElementById('charCounters');
    if (!cont) return;
    const cap = state.composerData.caption || '';
    const len = cap.length;
    cont.innerHTML = state.composerData.platforms.map(p => {
      const limit = PLATFORM_LIMITS[p] || 2200;
      const pct = len / limit;
      const cls = pct >= 0.95 ? 'over' : (pct >= 0.8 ? 'warn' : '');
      const shortName = state.data.platforms.find(pp => pp.id === p)?.name || p;
      return `<span class="char-counter ${cls}">${esc(shortName)}: ${len}/${limit}</span>`;
    }).join('');
  }

  // Collect composer data from form fields
  function collectComposerFormData() {
    const d = state.composerData;
    // Title
    const titleEl = document.getElementById('cmpTitle');
    if (titleEl) d.title = titleEl.value.trim();
    // Caption
    const capEl = document.getElementById('cmpCaption');
    if (capEl) d.caption = capEl.value;
    // Media
    const mediaEl = document.getElementById('cmpMedia');
    if (mediaEl) d.mediaUrl = mediaEl.value.trim();
    // Date
    const dateEl = document.getElementById('cmpDate');
    if (dateEl) d.scheduledDate = dateEl.value;
    // Time
    const timeEl = document.getElementById('cmpTime');
    if (timeEl) d.scheduledTime = timeEl.value;
    // Status
    const statusEl = document.getElementById('cmpStatus');
    if (statusEl) d.status = statusEl.value;
    // Assignee
    const assigneeEl = document.getElementById('cmpAssignee');
    if (assigneeEl) d.assigneeId = assigneeEl.value;
    // Category
    const catEl = document.getElementById('cmpCategory');
    if (catEl) d.category = catEl.value;
    // Pillar
    const pillarEl = document.getElementById('cmpPillar');
    if (pillarEl) d.pillar = pillarEl.value;
    // Campaign
    const campEl = document.getElementById('cmpCampaign');
    if (campEl) d.campaign = campEl.value;
    // Notes
    const notesEl = document.getElementById('cmpNotes');
    if (notesEl) d.notes = notesEl.value;
    // Tags
    const tagsEl = document.getElementById('cmpTags');
    if (tagsEl) d.tags = tagsEl.value.split(',').map(s => s.trim()).filter(Boolean);
  }

  function composerSave(forceStatus) {
    const d = state.composerData;
    // Collect latest form data
    collectComposerFormData();

    if (!d.title && !d.caption) {
      showToast('Add a title or caption first', 'warning');
      return;
    }
    if (!d.title) {
      d.title = (d.caption.split('\n')[0] || 'Untitled post').slice(0, 60);
    }
    if (forceStatus) d.status = forceStatus;
    d.updatedAt = new Date().toISOString();

    if (state.selectedPostId) {
      const idx = state.data.posts.findIndex(p => p.id === state.selectedPostId);
      if (idx >= 0) state.data.posts[idx] = d;
      else state.data.posts.push(d);
    } else {
      state.data.posts.push(d);
    }
    save();
    showToast(state.selectedPostId ? 'Post updated' : 'Post created', 'success');
    refreshNotifs();
    renderPage(state.currentPage);
  }

  function composerDuplicate() {
    collectComposerFormData();
    const d = clone(state.composerData);
    d.id = uid('p');
    d.title = (d.title || 'Untitled') + ' (copy)';
    d.status = 'draft';
    d.publishedDate = '';
    d.metrics = { likes: 0, comments: 0, shares: 0, saves: 0, reach: 0, impressions: 0, clicks: 0, engagementRate: 0 };
    state.composerData = d;
    state.selectedPostId = null;
    showToast('Duplicated — save to keep', 'info');
    renderComposerBody();
  }

  function composerDelete() {
    if (!state.selectedPostId) return;
    const post = state.data.posts.find(p => p.id === state.selectedPostId);
    if (!post) return;
    const snapshot = clone(post);
    state.data.posts = state.data.posts.filter(p => p.id !== state.selectedPostId);
    state.selectedPostId = null;
    save();
    closeAllModals();
    renderPage(state.currentPage);
    showUndoToast('Post deleted: ' + (post.title || 'Untitled'), () => {
      state.data.posts.push(snapshot);
      save();
      renderPage(state.currentPage);
      showToast('Post restored', 'success');
    });
  }

  function useCaptionTemplate(id) {
    const c = state.data.captions.find(x => x.id === id);
    if (!c) return;
    c.uses = (c.uses || 0) + 1;
    save();

    const placeholders = Array.from(new Set((c.text.match(/\[[^\]]+\]/g) || [])));
    if (!placeholders.length) {
      collectComposerFormData();
      state.composerData.caption = c.text;
      state.composerData.captionLibraryId = c.id;
      showComposerModal();
      showToast('Template applied', 'success');
      return;
    }

    // Ask for placeholder values
    const phHTML = placeholders.map((ph, i) =>
      `<div class="field"><div class="label">${esc(ph)}</div><input class="input" id="ph_${i}" placeholder="Enter ${esc(ph.replace(/[\[\]]/g, '').toLowerCase())}"></div>`
    ).join('');

    const content = `
      <div class="modal-header">
        <div class="modal-title">Fill in template: ${esc(c.name)}</div>
        <button class="modal-close">×</button>
      </div>
      <div class="modal-body">${phHTML}</div>
      <div class="modal-footer">
        <button class="btn btn-ghost cancel-ph">Cancel</button>
        <button class="btn btn-primary apply-ph">Apply Template</button>
      </div>`;
    closeAllModals();
    const modalId = openModal(content);
    const overlay = document.getElementById(modalId);
    if (overlay) {
      overlay.querySelector('.cancel-ph').addEventListener('click', () => {
        closeModal(modalId);
        showComposerModal();
      });
      overlay.querySelector('.apply-ph').addEventListener('click', () => {
        let text = c.text;
        placeholders.forEach((ph, i) => {
          const val = document.getElementById('ph_' + i)?.value || ph;
          text = text.split(ph).join(val);
        });
        collectComposerFormData();
        state.composerData.caption = text;
        state.composerData.captionLibraryId = id;
        closeModal(modalId);
        showComposerModal();
        showToast('Template applied', 'success');
      });
    }
  }

  function saveIdeaFromModal(modalId, ideaId, isEdit) {
    const platforms = Array.from(
      document.querySelectorAll('#' + modalId + ' #ideaPlatforms .platform-select-pill.active')
    ).map(el => el.dataset.platform);

    const data = {
      id: ideaId,
      title: document.getElementById('ideaTitle').value.trim() || 'Untitled idea',
      description: document.getElementById('ideaDesc').value.trim(),
      platforms: platforms.length ? platforms : [state.data.platforms[0].id],
      category: document.getElementById('ideaCategorySel').value,
      pillar: document.getElementById('ideaPillarSel').value,
      priority: document.getElementById('ideaPrioritySel').value,
      tags: document.getElementById('ideaTags').value.split(',').map(s => s.trim()).filter(Boolean),
      inspiration: document.getElementById('ideaInsp').value.trim(),
      createdAt: isEdit
        ? (state.data.ideas.find(x => x.id === ideaId)?.createdAt || new Date().toISOString())
        : new Date().toISOString()
    };

    if (isEdit) {
      const idx = state.data.ideas.findIndex(x => x.id === ideaId);
      if (idx >= 0) state.data.ideas[idx] = data;
    } else {
      state.data.ideas.push(data);
    }
    save();
    closeModal(modalId);
    showToast('Idea saved', 'success');
    render_ideas();
  }

  function deleteIdea(id) {
    const idea = state.data.ideas.find(i => i.id === id);
    if (!idea) return;

  function classifyHashtag(tag) {
    const len = tag.length;
    const common = ['fashion', 'style', 'food', 'travel', 'beauty', 'love', 'life', 'art', 'photo', 'music', 'fitness', 'tech', 'wellness'];
    if (common.some(c => tag === c || tag.startsWith(c + ' '))) return 'mega';
    if (len <= 6) return 'large';
    if (len <= 10) return 'medium';
    return 'niche';
  }

    const pct = (n) => Math.round((n / total) * 100);

    let rec = '✅ Good mix.';
    if (pct(clsCount.niche) < 15) rec = '⚠️ Add more niche hashtags.';
    if (pct(clsCount.mega) > 50) rec = '⚠️ Too many mega tags — add more medium/niche.';

    const hashChipsHTML = s.hashtags.map(h =>

        </div>
        <div class="progress-bar"><div class="progress-bar-fill" style="width:${Math.min(100, (s.hashtags.length / 30) * 100)}%;"></div></div>
      </div>
      <div style="margin-top:14px;background:var(--bg-card-2);padding:14px;border-radius:var(--radius-sm);">

        </div>

          <div class="hashtag-mix-legend-item"><span class="hashtag-mix-legend-dot" style="background:var(--brand-2);"></span>Mega 1M+ (${clsCount.mega})</div>
          <div class="hashtag-mix-legend-item"><span class="hashtag-mix-legend-dot" style="background:var(--status-scheduled);"></span>Large 100K-1M (${clsCount.large})</div>
          <div class="hashtag-mix-legend-item"><span class="hashtag-mix-legend-dot" style="background:var(--status-ready);"></span>Medium 10K-100K (${clsCount.medium})</div>

  window.render_besttimes = function() {
    if (!state.bestTimesPlatform) state.bestTimesPlatform = state.data.platforms[0]?.id || 'instagram';
    const p = state.data.platforms.find(x => x.id === state.bestTimesPlatform);
    if (!p) return;

    // Build heatmap data
    const grid = Array.from({ length: 7 }, () => Array(18).fill(0));
    const counts = Array.from({ length: 7 }, () => Array(18).fill(0));
    state.data.posts
      .filter(po => po.platforms.includes(p.id) && po.status === 'published' && po.publishedDate && po.scheduledTime)
      .forEach(po => {
        const dt = parseDate(po.publishedDate);
        if (!dt) return;
        const dow = (dt.getDay() + 6) % 7;
        const hr = parseInt(po.scheduledTime.slice(0, 2));
        if (hr < 6 || hr > 23) return;
        grid[dow][hr - 6] += po.metrics.engagementRate || 0;
        counts[dow][hr - 6]++;
      });

    const avg = grid.map((row, i) => row.map((v, j) => counts[i][j] ? (v / counts[i][j]) : 0));
    const flat = [];
    for (let d = 0; d < 7; d++) {
      for (let h = 0; h < 18; h++) {
        if (counts[d][h] > 0) flat.push({ d, h, eng: avg[d][h], count: counts[d][h] });
      }
    }
    flat.sort((a, b) => b.eng - a.eng);
    const top5 = flat.slice(0, 5);
    const maxEng = Math.max(...avg.flat(), 0.1);

    // Build heatmap HTML
    let heatmapHTML = '<div class="heatmap"><div></div>';
    for (let h = 0; h < 18; h++) heatmapHTML += `<div class="heatmap-label">${h + 6}</div>`;
    const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    for (let di = 0; di < 7; di++) {
      heatmapHTML += `<div class="heatmap-label">${dayNames[di]}</div>`;
      for (let hi = 0; hi < 18; hi++) {
        const v = avg[di][hi];
        const intensity = v / maxEng;
        const bg = v === 0 ? 'var(--bg-input)' : `rgba(225,29,72,${(0.15 + intensity * 0.8).toFixed(2)})`;
        heatmapHTML += `<div class="heatmap-cell" style="background:${bg};"><div class="heatmap-tooltip">${dayNames[di]} ${hi + 6}:00 — ${v.toFixed(1)}% avg eng (${counts[di][hi]} posts)</div></div>`;
      }
    }
    heatmapHTML += '</div>';

    // Build top 5 HTML
    let top5HTML = top5.length === 0
      ? '<div class="muted text-body">Not enough data yet — publish more posts.</div>'
      : top5.map((t, i) => {
          const day = dayNames[t.d];
          return `<div class="best-time-row">
            <div class="best-time-rank">${i + 1}</div>
            <div class="best-time-day">${day}, ${t.h + 6}:00</div>
            <div class="best-time-bar"><div class="best-time-bar-fill" style="width:${(t.eng / maxEng) * 100}%;"></div></div>
            <div class="best-time-pct metric">${t.eng.toFixed(1)}%</div>
          </div>`;
        }).join('');

    document.getElementById('page-besttimes').innerHTML = `
      <div class="page-header">
        <div><div class="text-title">⏰ Best Times to Post</div><div class="muted text-body" style="margin-top:4px;">Data-driven recommendations from your engagement history</div></div>
      </div>
      <div class="tabs-row" id="bestTimesTabs">
        ${state.data.platforms.filter(pp => pp.active).map(pp =>
          `<button class="tab-btn${pp.id === state.bestTimesPlatform ? ' active' : ''}" data-platform="${esc(pp.id)}">${esc(pp.name)}</button>`
        ).join('')}
      </div>
      <div class="dashboard-grid-1">
        <div class="card">
          <div class="section-title">7-Day × 24-Hour Heatmap</div>

            <span>Less</span>
            <div style="display:flex;gap:2px;">${[0.15, 0.35, 0.55, 0.75, 0.95].map(o => `<div style="width:18px;height:14px;border-radius:3px;background:rgba(225,29,72,${o});"></div>`).join('')}</div>
            <span>More engagement</span>
          </div>
        </div>
        <div class="card">
          <div class="section-title">🏆 Top 5 Times</div>
          ${top5HTML}
          <div style="margin-top:18px;background:var(--brand-subtle);border:1px solid var(--brand);padding:12px;border-radius:var(--radius-sm);">
            <div style="font-weight:700;font-size:0.85rem;margin-bottom:4px;">📊 Industry Benchmark</div>
            <div class="muted text-small">${esc(p.name)} average engagement: ~5.1%. ${p.avgLikes ? `You're at ${((p.avgLikes / p.avgReach) * 100).toFixed(1)}% — performing well!` : 'Start publishing to compare.'}</div>

  let analyticsSortDir = {};

  // Format a percent delta with arrow + class
  function deltaPill(curr, prev, opts) {
    opts = opts || {};
    if (prev == null || prev === 0) {
      if (curr > 0) return { html: '<span class="trend-up">↑ new</span>', pct: 100, cls: 'trend-up' };
      return { html: '<span class="muted">no data</span>', pct: 0, cls: 'muted' };
    }
    const pct = ((curr - prev) / prev) * 100;
    const cls = pct > 0.05 ? 'trend-up' : (pct < -0.05 ? 'trend-down' : 'muted');
    const arrow = pct > 0.05 ? '↑' : (pct < -0.05 ? '↓' : '·');
    const sign = pct > 0 ? '+' : '';
    const dec = opts.decimals != null ? opts.decimals : 1;
    return { html: `<span class="${cls}">${arrow} ${sign}${pct.toFixed(dec)}%</span>`, pct: pct, cls: cls };
  }

  // Compute previous period range stats for vs-prev comparisons
  function getPrevRangePosts(range) {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const dayMs = 86400000;
    let from, to;
    if (range === '7d') { to = new Date(today.getTime() - 7 * dayMs); from = new Date(to.getTime() - 7 * dayMs); }
    else if (range === '30d') { to = new Date(today.getTime() - 30 * dayMs); from = new Date(to.getTime() - 30 * dayMs); }
    else if (range === '90d') { to = new Date(today.getTime() - 90 * dayMs); from = new Date(to.getTime() - 90 * dayMs); }
    else if (range === 'mo') {
      from = new Date(today.getFullYear(), today.getMonth() - 1, 1);
      to = new Date(today.getFullYear(), today.getMonth(), 0, 23, 59, 59);
    }
    else if (range === 'lmo') {
      from = new Date(today.getFullYear(), today.getMonth() - 2, 1);
      to = new Date(today.getFullYear(), today.getMonth() - 1, 0, 23, 59, 59);
    }
    else { return []; }
    return state.data.posts.filter(p => {
      if (p.status !== 'published' || !p.publishedDate) return false;
      const d = parseDate(p.publishedDate);
      if (!d) return false;
      return d >= from && d <= to;
    });
  }

  window.render_analytics = function() {
    const range = state.analyticsRange;
    const tab = state.analyticsTab;
    const allPlatforms = state.data.platforms.filter(p => p.active);
    const publishedAll = state.data.posts.filter(p => p.status === 'published');
    const rangeFiltered = filterPostsByRange(publishedAll, range);
    const filtered = tab === 'all' ? rangeFiltered : rangeFiltered.filter(p => p.platforms.includes(tab));

    const totalReach = filtered.reduce((s, p) => s + p.metrics.reach, 0);
    const totalImpressions = filtered.reduce((s, p) => s + p.metrics.impressions, 0);
    const avgEng = filtered.length
      ? (filtered.reduce((s, p) => s + p.metrics.engagementRate, 0) / filtered.length)
      : 0;
    const totalFollowers = (tab === 'all' ? allPlatforms : allPlatforms.filter(p => p.id === tab))
      .reduce((s, p) => s + p.followers, 0);
    const lastMo = filterHistoryByRange(state.data.analyticsHistory, range).slice(-allPlatforms.length);
    const followerGrowth = lastMo.filter(a => tab === 'all' || a.platform === tab)
      .reduce((s, a) => s + a.followersGained, 0);

    // Previous-period comparisons (real math, not hardcoded)
    const prevPosts = getPrevRangePosts(range);
    const prevFiltered = tab === 'all' ? prevPosts : prevPosts.filter(p => p.platforms.includes(tab));
    const prevReach = prevFiltered.reduce((s, p) => s + p.metrics.reach, 0);
    const prevImpressions = prevFiltered.reduce((s, p) => s + p.metrics.impressions, 0);
    const prevAvgEng = prevFiltered.length
      ? (prevFiltered.reduce((s, p) => s + p.metrics.engagementRate, 0) / prevFiltered.length)
      : 0;
    // Previous follower growth: a window of comparable size before the current window
    const prevHistory = state.data.analyticsHistory.filter(a => tab === 'all' || a.platform === tab);
    const prevFollowerGrowth = prevHistory.length >= allPlatforms.length * 2
      ? prevHistory.slice(-allPlatforms.length * 2, -allPlatforms.length).reduce((s, a) => s + a.followersGained, 0)
      : 0;

    const reachDelta = deltaPill(totalReach, prevReach);
    const imprDelta = deltaPill(totalImpressions, prevImpressions);
    const engDelta = deltaPill(avgEng, prevAvgEng, { decimals: 1 });
    const growthDelta = deltaPill(followerGrowth, prevFollowerGrowth);
    const postsDelta = deltaPill(filtered.length, prevFiltered.length, { decimals: 0 });

    // MoM "best performer" / "most growth" — computed from history
    const platformPostMap = {};
    const platformGrowthMap = {};
    allPlatforms.forEach(p => {
      const pp = rangeFiltered.filter(po => po.platforms.includes(p.id));
      platformPostMap[p.id] = {
        name: p.name,
        avgEng: pp.length ? pp.reduce((s, x) => s + x.metrics.engagementRate, 0) / pp.length : 0,
        posts: pp.length
      };
      const hist = state.data.analyticsHistory.filter(a => a.platform === p.id);
      const last = hist[hist.length - 1];
      const prev = hist[hist.length - 2];
      platformGrowthMap[p.id] = {
        name: p.name,
        gained: last ? last.followersGained : 0,
        pct: (prev && prev.followers > 0 && last) ? ((last.followers - prev.followers) / prev.followers) * 100 : 0
      };
    });
    const bestPerformer = Object.values(platformPostMap).sort((a, b) => b.avgEng - a.avgEng)[0];
    const mostGrowth = Object.values(platformGrowthMap).sort((a, b) => b.pct - a.pct)[0];

    // MoM summary tiles
    const momTiles = [];
    if (engDelta.cls === 'trend-up') momTiles.push(`<div>✅ Engagement up <strong>${engDelta.pct.toFixed(1)}%</strong></div>`);
    else if (engDelta.cls === 'trend-down') momTiles.push(`<div>⚠️ Engagement down <strong>${Math.abs(engDelta.pct).toFixed(1)}%</strong></div>`);
    else momTiles.push(`<div>· Engagement steady</div>`);

    if (growthDelta.cls === 'trend-up') momTiles.push(`<div>✅ Follower growth up <strong>${growthDelta.pct.toFixed(0)}%</strong></div>`);
    else if (growthDelta.cls === 'trend-down') momTiles.push(`<div>⚠️ Follower growth down <strong>${Math.abs(growthDelta.pct).toFixed(0)}%</strong></div>`);
    else momTiles.push(`<div>· Follower growth steady</div>`);

    if (reachDelta.cls === 'trend-up') momTiles.push(`<div>✅ Reach up <strong>${reachDelta.pct.toFixed(0)}%</strong></div>`);
    else if (reachDelta.cls === 'trend-down') momTiles.push(`<div>⚠️ Reach down <strong>${Math.abs(reachDelta.pct).toFixed(0)}%</strong></div>`);
    else momTiles.push(`<div>· Reach steady</div>`);

    const postDiff = filtered.length - prevFiltered.length;
    if (postDiff > 0) momTiles.push(`<div>✅ Posts published up <strong>${postDiff}</strong></div>`);
    else if (postDiff < 0) momTiles.push(`<div>⚠️ Posts published down <strong>${Math.abs(postDiff)}</strong></div>`);
    else momTiles.push(`<div>· Same number of posts published</div>`);

    if (bestPerformer && bestPerformer.posts > 0) {
      momTiles.push(`<div>✅ <strong>${esc(bestPerformer.name)}</strong> best performer (${bestPerformer.avgEng.toFixed(1)}%)</div>`);
    }

    container.innerHTML = `

  function sortAnalyticsTable(col) {
    const tbody = document.querySelector('#cmpTable tbody');
    if (!tbody) return;
    const rows = Array.from(tbody.querySelectorAll('tr'));
    analyticsSortDir[col] = !analyticsSortDir[col];
    const dir = analyticsSortDir[col];
    rows.sort((a, b) => {
      const av = a.children[col].innerText.replace(/[^0-9.\-]/g, '');
      const bv = b.children[col].innerText.replace(/[^0-9.\-]/g, '');
      const an = parseFloat(av), bn = parseFloat(bv);
      if (isNaN(an) || isNaN(bn)) {
        return dir
          ? a.children[col].innerText.localeCompare(b.children[col].innerText)
          : b.children[col].innerText.localeCompare(a.children[col].innerText);
      }
      return dir ? an - bn : bn - an;
    });
    rows.forEach(r => tbody.appendChild(r));
  }

  window.renderAnalyticsCharts = renderAnalyticsCharts;

  function computeInsights(posts) {
    const out = [];
    // Type comparison
    const tMap = {};
    posts.forEach(p => {
      if (!tMap[p.type]) tMap[p.type] = { sum: 0, count: 0 };
      tMap[p.type].sum += p.metrics.engagementRate;
      tMap[p.type].count++;
    });
    const tArr = Object.entries(tMap).map(([k, v]) => [k, v.sum / v.count]).sort((a, b) => b[1] - a[1]);
    if (tArr.length >= 2) {
      out.push(`<strong>${tArr[0][0]}</strong> outperforms <strong>${tArr[tArr.length - 1][0]}</strong> by ${(tArr[0][1] / Math.max(0.1, tArr[tArr.length - 1][1])).toFixed(1)}×`);
    }
    // Best day
    const dayMap = [0, 0, 0, 0, 0, 0, 0], dayCnt = [0, 0, 0, 0, 0, 0, 0];
    posts.forEach(p => {
      const d = parseDate(p.publishedDate);
      if (d) { dayMap[d.getDay()] += p.metrics.engagementRate; dayCnt[d.getDay()]++; }
    });
    const dayAvgs = dayMap.map((v, i) => dayCnt[i] ? v / dayCnt[i] : 0);
    const bestDay = DAYS_FULL[dayAvgs.indexOf(Math.max(...dayAvgs))];
    out.push(`<strong>${bestDay}</strong> is your best day`);
    // Best category
    const cMap = {};
    posts.forEach(p => {
      if (!cMap[p.category]) cMap[p.category] = { sum: 0, count: 0 };
      cMap[p.category].sum += p.metrics.engagementRate;
      cMap[p.category].count++;
    });
    const cArr = Object.entries(cMap).map(([k, v]) => [k, v.sum / v.count]).sort((a, b) => b[1] - a[1]);
    if (cArr[0]) out.push(`<strong>${cArr[0][0]}</strong> category: highest engagement`);
    // Posting time
    const hMap = {}, hCnt = {};
    posts.forEach(p => {
      if (!p.scheduledTime) return;
      const h = p.scheduledTime.slice(0, 2);
      if (!hMap[h]) hMap[h] = 0;
      hMap[h] += p.metrics.engagementRate;
      hCnt[h] = (hCnt[h] || 0) + 1;
    });
    const hArr = Object.entries(hMap).map(([k, v]) => [k, v / hCnt[k]]).sort((a, b) => b[1] - a[1]);
    if (hArr[0]) out.push(`Posts at <strong>${hArr[0][0]}:00</strong> get the most engagement`);
    return out;
  }

  function computeRecommendations(posts) {
    const out = [];
    const tMap = {};
    posts.forEach(p => {
      if (!tMap[p.type]) tMap[p.type] = { sum: 0, count: 0 };
      tMap[p.type].sum += p.metrics.engagementRate;
      tMap[p.type].count++;
    });
    const tArr = Object.entries(tMap).map(([k, v]) => [k, v.sum / v.count]).sort((a, b) => b[1] - a[1]);
    if (tArr[0]) out.push(`Post 2 more <strong>${tArr[0][0]}s</strong> this week`);
    // Low frequency platform
    const pcMap = {};
    state.data.platforms.forEach(p => { pcMap[p.id] = 0; });
    posts.forEach(p => p.platforms.forEach(pl => { pcMap[pl] = (pcMap[pl] || 0) + 1; }));
    const sorted = Object.entries(pcMap).sort((a, b) => a[1] - b[1]);
    if (sorted[0]) {
      const pname = state.data.platforms.find(p => p.id === sorted[0][0])?.name || sorted[0][0];
      out.push(`Increase posting to <strong>${pname}</strong> (lowest frequency)`);
    }
    out.push('Try <strong>video format</strong> if your last carousels underperformed');
    out.push('Schedule posts during your top 5 engagement windows');
    return out;
  }

  function saveTeamMember(modalId, id, isEdit) {
    const overlay = document.getElementById(modalId);
    const name = overlay.querySelector('#tmName').value.trim();
    const role = overlay.querySelector('#tmRole').value.trim() || 'Team member';
    if (!name) { showToast('Name is required', 'warning'); return; }
    const activeSwatch = overlay.querySelector('#tmSwatches .swatch.active');
    const color = activeSwatch ? activeSwatch.dataset.color : '#e11d48';
    const initials = name.split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase();
    const data = { id, name, role, color, initials };

    if (isEdit) {
      const idx = state.data.team.findIndex(t => t.id === id);
      if (idx >= 0) state.data.team[idx] = data;
    } else {
      state.data.team.push(data);
    }
    save();
    closeModal(modalId);
    renderSidebar();
    render_team();
    showToast('Team member saved', 'success');
  }

  function removeTeamMember(id) {
    const member = state.data.team.find(t => t.id === id);
    if (!member) return;
    const reassignTarget = state.data.team.find(t => t.id !== id)?.id || null;
    const reassigned = state.data.posts.filter(p => p.assigneeId === id).map(p => p.id);
    const snapshot = { member: clone(member), reassignedPostIds: reassigned, originalAssigneeId: id };
    state.data.team = state.data.team.filter(t => t.id !== id);
    state.data.posts.forEach(p => {
      if (p.assigneeId === id) p.assigneeId = reassignTarget;
    });
    save();
    renderSidebar();
    render_team();
    showUndoToast('Team member removed: ' + (member.name || 'Untitled'), () => {
      state.data.team.push(snapshot.member);
      state.data.posts.forEach(p => {
        if (snapshot.reassignedPostIds.indexOf(p.id) >= 0) p.assigneeId = snapshot.originalAssigneeId;
      });
      save();
      renderSidebar();
      render_team();
      showToast('Team member restored', 'success');
    });
  }

  window.addTeamMember = () => editTeamMember(null);
  window.editTeamMember = editTeamMember;
  window.saveTeamMember = saveTeamMember;
  window.removeTeamMember = removeTeamMember;

  function refreshStorageStatus() {
    const engineLabel = document.getElementById('storageEngineLabel');
    const engineBadge = document.getElementById('storageEngineBadge');
    const sizeLabel   = document.getElementById('storageSizeLabel');
    if (!engineLabel || !engineBadge || !sizeLabel) return;

    const usingIDB = window.CFProStorage && window.CFProStorage.isUsingIDB && window.CFProStorage.isUsingIDB();
    if (usingIDB) {
      engineLabel.textContent = 'IndexedDB (with localStorage mirror) — fast and quota-safe';
      engineBadge.textContent = '✓ IndexedDB';
      engineBadge.style.background = 'rgba(0, 212, 170, 0.15)';
      engineBadge.style.borderColor = 'rgba(0, 212, 170, 0.40)';
      engineBadge.style.color = '#00d4aa';
    } else if (window.CFProStorage) {
      engineLabel.textContent = 'localStorage only — IndexedDB not available in this browser';
      engineBadge.textContent = '⚠ localStorage';
      engineBadge.style.background = 'rgba(245, 158, 11, 0.15)';
      engineBadge.style.borderColor = 'rgba(245, 158, 11, 0.40)';
      engineBadge.style.color = '#f59e0b';
      // IDB may be initializing — re-check shortly
      setTimeout(refreshStorageStatus, 800);
    } else {
      engineLabel.textContent = 'localStorage';
      engineBadge.textContent = 'localStorage';
    }

    if (window.CFProStorage && window.CFProStorage.getSize) {
      window.CFProStorage.getSize().then(bytes => {
        const kb = bytes / 1024;
        const mb = kb / 1024;
        const display = mb >= 1 ? mb.toFixed(2) + ' MB' : kb.toFixed(1) + ' KB';
        const max = window.CFProStorage.MAX_LS || 4500000;
        const pct = Math.min(100, Math.round((bytes / max) * 100));
        sizeLabel.textContent = display + ' used · about ' + pct + '% of mirror cap';
      }).catch(() => {
        sizeLabel.textContent = 'Unknown';
      });
    } else {
      try {
        const raw = localStorage.getItem(STORAGE_KEY) || '';
        const kb = (new Blob([raw]).size) / 1024;
        sizeLabel.textContent = kb.toFixed(1) + ' KB used';
      } catch (e) {
        sizeLabel.textContent = 'Unknown';
      }
    }
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'contentflow-backup-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    showToast('✅ Backup exported', 'success');
  }

  function importData(input) {
    const file = input.files[0];
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) {
      showToast('Backup file too large (over 50 MB)', 'error');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = () => {
      let parsed;
      try {
        parsed = JSON.parse(reader.result);
      } catch (e) {
        showToast('Invalid file — not valid JSON', 'error');
        input.value = '';
        return;
      }
      const required = ['posts', 'platforms', 'settings'];
      const missing = required.filter(k => !parsed || !Object.prototype.hasOwnProperty.call(parsed, k));
      if (missing.length) {
        showToast('Invalid backup file: missing keys — ' + missing.join(', '), 'error');
        input.value = '';
        return;
      }
      if (!Array.isArray(parsed.posts) || !Array.isArray(parsed.platforms)) {
        showToast('Invalid backup file: posts/platforms must be arrays', 'error');
        input.value = '';
        return;
      }
      confirmDialog('Replace all current data with imported file? A rollback snapshot will be kept.', () => {
        // Snapshot current state to a rollback slot before overwriting
        try {
          localStorage.setItem(STORAGE_KEY + '_rollback', JSON.stringify({
            t: Date.now(),
            data: state.data
          }));
        } catch (e) { /* if rollback can't be saved, continue but warn */ }
        try {
          const migrated = migrate(parsed);
          state.data = migrated;
          ensureSettingsDefaults();
          save();
          applyTheme();
          applyAccent();
          renderSidebar();
          renderTopbarPills();
          refreshNotifs();
          renderPage(state.currentPage);
          showToast('Data imported. Use Restore Last Snapshot in Settings if needed.', 'success', 5500);
        } catch (e) {
          // Roll back
          try {
            const raw = localStorage.getItem(STORAGE_KEY + '_rollback');
            if (raw) {
              const snap = JSON.parse(raw);
              if (snap && snap.data) {
                state.data = snap.data;
                save();
                renderPage(state.currentPage);
              }
            }
          } catch (_) {}
          showToast('Import failed — restored previous data', 'error', 5000);
          console.error('Import migration failed:', e);
        }
      });
    };
    reader.onerror = () => {
      showToast('Could not read file', 'error');
      input.value = '';
    };
    reader.readAsText(file);
    input.value = '';
  }

  function rollbackImport() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY + '_rollback');
      if (!raw) {
        showToast('No rollback snapshot available', 'warning');
        return;
      }
      const snap = JSON.parse(raw);
      if (!snap || !snap.data) {
        showToast('Rollback snapshot is corrupted', 'error');
        return;
      }
      confirmDialog('Restore data from snapshot taken ' + new Date(snap.t).toLocaleString() + '?', () => {
        state.data = migrate(snap.data);
        ensureSettingsDefaults();
        save();
        applyTheme();
        applyAccent();
        renderSidebar();
        renderTopbarPills();
        refreshNotifs();
        renderPage(state.currentPage);
        showToast('Snapshot restored', 'success');
      });
    } catch (e) {
      showToast('Could not restore snapshot', 'error');
    }
  }

  function resetSampleData() {
    confirmDialog('Reset all data back to the sample dataset? Your current data will be lost.', () => {
      state.data = getSampleData();
      save();
      showToast('Sample data restored', 'success');
      applyTheme();
      applyAccent();
      renderSidebar();
      renderTopbarPills();
      navigate('dashboard');
    });
  }

  function getEmptyData() {
    const sample = getSampleData();
    return {
      settings: sample.settings,
      platforms: sample.platforms,
      team: [],
      campaigns: [],
      pillars: sample.pillars,
      posts: [],
      ideas: [],
      captions: [],
      hashtagSets: [],
      analyticsHistory: [],
      wipLimits: { idea: 0, draft: 8, ready: 5, scheduled: 10 }
    };
  }

  function clearAllData() {
    confirmDialog('PERMANENTLY clear all data? This cannot be undone.', () => {
      confirmDialog('Are you absolutely sure? You will lose everything.', () => {
        state.data = getEmptyData();
        save();
        showToast('All data cleared', 'success');
        applyTheme();
        applyAccent();
        renderSidebar();
        renderTopbarPills();
        navigate('dashboard');
      });
    });
  }

  window.exportData = exportData;
  window.importData = importData;
  window.resetSampleData = resetSampleData;
  window.clearAllData = clearAllData;

  /* ==========================================================================
   * INITIALIZATION
   * ========================================================================== */
  function ensureSettingsDefaults() {
    state.data.settings = state.data.settings || {};
    const s = state.data.settings;
    const defaultTeam = (state.data.team && state.data.team[0]) || { name: 'Jordan Lee', role: 'Content Manager', color: '#00d4aa' };
    if (!s.theme) s.theme = 'dark';
    if (!s.accentColor || !ACCENT_COLORS[s.accentColor]) s.accentColor = 'creatif';
    if (s.weekStartsOn == null) s.weekStartsOn = 1;
    if (!s.defaultView) s.defaultView = 'dashboard';
    if (!s.userName) s.userName = defaultTeam.name;
    if (!s.userRole) s.userRole = defaultTeam.role;
    if (!s.userColor) s.userColor = defaultTeam.color;
    if (!s.notifications) s.notifications = { postsDueToday: true, overdueDrafts: true };
    if (!state.data.wipLimits) state.data.wipLimits = { idea: 0, draft: 8, ready: 5, scheduled: 10 };
  }

  let _notifTimer = null;
  function startNotificationTimer() {
    if (_notifTimer) clearInterval(_notifTimer);
    // Refresh notifications every 5 min so day-roll is reflected
    _notifTimer = setInterval(refreshNotifs, 5 * 60 * 1000);
    // Also refresh on tab regain
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) refreshNotifs();
    });
  }

  function init() {
    load();
    ensureSettingsDefaults();

    applyTheme();
    applyAccent();
    renderSidebar();
    renderTopbarPills();
    refreshNotifs();
    startNotificationTimer();

    // Restore page from URL hash
    const hash = window.location.hash.replace('#', '');
    const startPage = hash && PAGE_TITLES[hash] ? hash : (state.data.settings.defaultView || 'dashboard');
    navigate(startPage, { replace: true });

    // Listen for hash changes (manual URL edits / browser back-forward)
    window.addEventListener('hashchange', function() {
      const newHash = window.location.hash.replace('#', '');
      if (newHash && PAGE_TITLES[newHash] && newHash !== state.currentPage) {
        navigate(newHash, { fromHashChange: true });
      }
    });

    // Also listen for popstate (back/forward navigation with pushState)
    window.addEventListener('popstate', function() {
      const newHash = window.location.hash.replace('#', '');
      if (newHash && PAGE_TITLES[newHash] && newHash !== state.currentPage) {
        navigate(newHash, { fromHashChange: true });
      }
    });

    // Async upgrade from IndexedDB if available — re-renders if newer data found
    upgradeFromIDB();

    if (window.CFProStorage) {
      // storage type surfaced in Settings > Storage panel
    }
  }

  // Start the app
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>

</body>
</html>
