<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexFlow Pro — Project & Task Management Suite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root[data-theme="dark"] {
      --bg-primary: #0a0a0a; --bg-secondary: #111111; --bg-tertiary: #1a1a1a; --bg-hover: #252525;
      --text-primary: #f8fafc; --text-secondary: #94a3b8; --text-muted: #64748b; --border: #262626;
      --accent: #00d4aa; --accent-hover: #00b38f; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --category-business: #3b82f6; --category-personal: #8b5cf6; --category-health: #06b6d4;
      --category-family: #ec4899; --category-social: #f97316; --category-work: #10b981;
      --category-learning: #eab308; --category-finance: #14b8a6; --category-hobby: #f472b6; --category-other: #6b7280;
    }
    :root[data-theme="dark-blue"] {
      --bg-primary: #0b0f19; --bg-secondary: #111827; --bg-tertiary: #1f2937; --bg-hover: #2d3748;
      --text-primary: #f1f5f9; --text-secondary: #94a3b8; --text-muted: #64748b; --border: #334155;
      --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
      --category-business: #3b82f6; --category-personal: #8b5cf6; --category-health: #06b6d4;
      --category-family: #ec4899; --category-social: #f97316; --category-work: #10b981;
      --category-learning: #eab308; --category-finance: #14b8a6; --category-hobby: #f472b6; --category-other: #6b7280;
    }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 200; }
    .logo { display: flex; align-items: center; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
    .logo-text { font-size: 18px; font-weight: 600; } .logo-sub { font-size: 11px; color: var(--accent); }
    .hamburger { display: none; width: 24px; height: 24px; flex-direction: column; justify-content: center; gap: 4px; cursor: pointer; background: none; border: none; color: var(--text-primary); margin-left: auto; }
    .hamburger span { height: 3px; background: currentColor; border-radius: 2px; }
    nav { display: flex; flex-direction: column; flex: 1; }
    .nav-section { margin-bottom: 24px; }
    .nav-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; font-size: 14px; font-family: inherit; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: #000; font-weight: 500; }
    .nav-item svg { width: 18px; height: 18px; }
    .main { flex: 1; margin-left: 250px; padding: 24px 32px; min-height: 100vh; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .main-title { font-size: 24px; font-weight: 600; } .main-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--accent); color: #000; } .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); } .btn-secondary:hover { background: var(--bg-hover); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; } .stat-value { font-size: 28px; font-weight: 600; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-tertiary); border-radius: 8px; cursor: pointer; transition: all 0.15s; border-left: 4px solid var(--border); }
    .task-item.priority-high { border-left-color: var(--danger); } .task-item.priority-medium { border-left-color: var(--warning); } .task-item.priority-low { border-left-color: var(--success); }
    .task-item.overdue { background: rgba(239,68,68,0.1); } .task-item:hover { background: var(--bg-hover); transform: translateY(-2px); }
    .task-checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; flex-shrink: 0; background: var(--bg-tertiary); display: flex; align-items: center; justify-content: center; }
    .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .task-checkbox svg { width: 12px; height: 12px; color: #000; display: none; } .task-checkbox.checked svg { display: block; }
    .task-title { flex: 1; font-size: 14px; } .task-title.done { text-decoration: line-through; color: var(--text-muted); }
    .tag { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 500; }
    .tag-high { background: rgba(239,68,68,0.2); color: #ef4444; } .tag-medium { background: rgba(245,158,11,0.2); color: #f59e0b; } .tag-low { background: rgba(16,185,129,0.2); color: #10b981; }
    .tag-todo { background: rgba(148,163,184,0.2); color: #94a3b8; } .tag-in-progress { background: rgba(59,130,246,0.2); color: #3b82f6; } .tag-review { background: rgba(168,85,247,0.2); color: #a855f7; } .tag-done { background: rgba(16,185,129,0.2); color: #10b981; }
    .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
    .kanban-column { min-width: 280px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .kanban-title { font-size: 14px; font-weight: 600; } .kanban-count { font-size: 12px; color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 10px; }
    .kanban-cards { min-height: 200px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; } .kanban-card:hover { border-color: var(--accent); }
    .kanban-card-title { font-size: 14px; margin-bottom: 8px; }
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; min-height: 500px; }
    .matrix-quadrant { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .matrix-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .q1 .matrix-title { color: #ef4444; } .q2 .matrix-title { color: #3b82f6; } .q3 .matrix-title { color: #f59e0b; } .q4 .matrix-title { color: #64748b; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .team-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .team-avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #000; }
    .team-name { font-size: 16px; font-weight: 600; } .team-role { font-size: 13px; color: var(--text-secondary); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; } .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 18px; font-weight: 600; } .modal-body { padding: 20px; } .modal-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 20px; border-top: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; } .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select { width: 100%; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pomodoro { position: fixed; bottom: 24px; right: 24px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 260px; z-index: 100; }
    .pomodoro-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
    .pomodoro-time { font-size: 48px; font-weight: 600; color: var(--accent); text-align: center; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
    .pomodoro-controls { display: flex; gap: 8px; margin-bottom: 12px; } .pomodoro-controls .btn { flex: 1; }
    .backup-banner { background: var(--bg-secondary); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes confetti { 0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx),200px) rotate(360deg); opacity: 0; } }
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: auto; position: fixed; top: 0; left: 0; right: 0; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 16px; z-index: 1000; flex-direction: row; overflow: visible; }
      .hamburger { display: flex; } .logo { padding-bottom: 0; border-bottom: none; margin-bottom: 0; gap: 8px; flex: 1; } .logo-icon { width: 32px; height: 32px; } .logo-text { font-size: 14px; } .logo-sub { display: none; }
      nav { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--bg-secondary); flex-direction: column; border-bottom: 1px solid var(--border); max-height: calc(100vh - 60px); overflow-y: auto; padding: 12px 0; z-index: 999; }
      nav.mobile-open { display: flex; } .nav-section { margin-bottom: 0; padding: 12px 16px; border-bottom: 1px solid var(--border); } .nav-label { padding: 0; margin-bottom: 8px; } .nav-item { padding: 8px 16px; border-radius: 0; }
      .main { margin-left: 0; margin-top: 60px; padding: 16px; } .main-header { flex-direction: column; align-items: flex-start; gap: 12px; } .main-title { font-size: 20px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); } .kanban-board { overflow-x: auto; } .kanban-column { min-width: 240px; }
      .matrix-grid { grid-template-columns: 1fr; gap: 12px; min-height: auto; } .team-grid { grid-template-columns: 1fr; }
      .pomodoro { width: calc(100% - 32px); right: 16px; left: 16px; bottom: 16px; } .btn { font-size: 13px; padding: 8px 12px; } .form-row { grid-template-columns: 1fr; } .modal { width: 95%; max-width: 100%; } .filter-bar { flex-wrap: wrap; }
    }
    @media (max-width: 480px) { .main { padding: 12px; } .stats-grid { grid-template-columns: 1fr; } }
    @media print {
      @page { margin: 2cm; } body { font-size: 12pt; color: #000; background: #fff; } .sidebar, .pomodoro, .modal-overlay, .hamburger, .btn, .filter-bar, .print-hide, .backup-banner { display: none !important; }
      .app { display: block; } .main { margin: 0; padding: 0; background: #fff; } .main-header { margin-bottom: 16px; } .main-title { font-size: 22pt; color: #000; } .main-subtitle { font-size: 12pt; color: #555; }
      .stats-grid { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); } .stat-card { background: #fff; border: 1px solid #ccc; padding: 10px; } .stat-value { font-size: 24pt; }
      .card { background: #fff; border: 1px solid #ddd; break-inside: avoid; } .task-item { background: #f9f9f9; border-left-width: 4px; border-left-style: solid; border-color: #ccc; }
      .task-item.priority-high { border-left-color: #ef4444; } .task-item.priority-medium { border-left-color: #f59e0b; } .task-item.priority-low { border-left-color: #10b981; }
      .task-checkbox { border-color: #999; background: #fff; } .tag { border: 1px solid #999; color: #000; background: transparent; }
      .kanban-board { display: block; overflow-x: visible; } .kanban-column { width: 100%; min-width: auto; break-inside: avoid; margin-bottom: 16px; }
      .matrix-grid { grid-template-columns: 1fr 1fr; } .matrix-quadrant { background: #fff; border: 1px solid #ddd; }
      .team-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); } .team-card { background: #fff; border: 1px solid #ddd; }
      .print-only-header { display: block !important; text-align: center; margin-bottom: 24px; } .print-only-footer { display: block !important; text-align: center; font-size: 9pt; color: #888; margin-top: 32px; }
      svg { stroke: #000; color: #000; }
    }
    .print-only-header, .print-only-footer { display: none; }
    /* Loading screen */
    #loading-screen { position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999; }
    .loading-logo { width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#000;margin-bottom:20px;animation:pulse 1.4s infinite; }
    .loading-text { font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:6px; }
    .loading-sub { font-size:13px;color:var(--accent); }
  </style>
</head>

<div id="loading-screen">
  <div class="loading-logo">A</div>
  <div class="loading-text">ApexFlow Pro</div>
  <div class="loading-sub">creatif.tools</div>
</div>
<div class="app" id="app"></div>
<script>
  // ========== INDEXEDDB STORAGE ENGINE ==========
  const DB_NAME = 'apexflow_db', DB_VERSION = 1, STORE_NAME = 'appdata', LS_KEY = 'apexflow';
  function openDB() { return new Promise((resolve, reject) => { const r = indexedDB.open(DB_NAME, DB_VERSION); r.onerror = () => reject(r.error); r.onsuccess = () => resolve(r.result); r.onupgradeneeded = (e) => { const db = e.target.result; if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME, { keyPath: 'key' }); }; }); }
  async function getDB() { if (!window.indexedDB) return null; try { return await openDB(); } catch (e) { return null; } }
  async function saveToIDB(data) { const db = await getDB(); if (!db) return false; return new Promise((resolve) => { try { const tx = db.transaction(STORE_NAME, 'readwrite'); const store = tx.objectStore(STORE_NAME); store.put({ key: 'state', value: data, updated: Date.now() }); tx.oncomplete = () => resolve(true); tx.onerror = () => resolve(false); } catch (e) { resolve(false); } }); }
  async function loadFromIDB() { const db = await getDB(); if (!db) return null; return new Promise((resolve) => { try { const tx = db.transaction(STORE_NAME, 'readonly'); const store = tx.objectStore(STORE_NAME); const req = store.get('state'); req.onsuccess = () => { const rec = req.result; resolve(rec ? rec.value : null); }; req.onerror = () => resolve(null); } catch (e) { resolve(null); } }); }
  async function getStorageSize() { const db = await getDB(); if (!db) return 0; return new Promise((resolve) => { try { const tx = db.transaction(STORE_NAME, 'readonly'); const store = tx.objectStore(STORE_NAME); const req = store.get('state'); req.onsuccess = () => { const rec = req.result; resolve(rec && rec.value ? new Blob([JSON.stringify(rec.value)]).size : 0); }; req.onerror = () => resolve(0); } catch (e) { resolve(0); } }); }

  const renderGantt = () => {
    const today = new Date();
    const startDate = new Date(today); startDate.setDate(today.getDate() - 5);
    const days = []; for (let i = 0; i < 30; i++) { const d = new Date(startDate); d.setDate(startDate.getDate() + i); days.push(d); }
    const ts = todayStr();
    const tasks = state.tasks.filter(t => (t.dueDate||t.startDate)&&t.status!=='done');
    tasks.sort((a,b) => { const p={high:0,medium:1,low:2}; return (p[a.priority]||2)-(p[b.priority]||2); });
    const getRange = t => {
      const pd = s => { if(!s) return null; const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); };
      const start = pd(t.startDate)||pd(t.dueDate), end = pd(t.dueDate)||pd(t.startDate);
      if(!start||!end) return null;
      const sd = Math.floor((start-startDate)/86400000), ed = Math.floor((end-startDate)/86400000);
      if((sd<0&&ed<0)||(sd>29&&ed>29)) return null;
      return {bs:Math.max(0,Math.min(29,sd)), be:Math.max(0,Math.min(29,ed))};
    };
    let html = '<div class="main-header"><div><h1 class="main-title">Gantt Chart</h1><p class="main-subtitle">30-day project timeline</p></div><button class="btn btn-primary" onclick="openTaskModal()">' + icons.plus + ' New Task</button></div>';
    html += '<div class="card" style="overflow-x:auto;"><table style="border-collapse:collapse;min-width:1100px;width:100%;"><tr><th style="background:var(--bg-tertiary);padding:8px 10px;text-align:left;font-size:12px;border:1px solid var(--border);min-width:160px;">Task</th>';
    days.forEach((d,i) => {
      const isToday = localDate(d) === ts;
      const isWeekend = d.getDay()===0||d.getDay()===6;
      html += '<th style="background:' + (isToday?'var(--accent)':isWeekend?'var(--bg-hover)':'var(--bg-tertiary)') + ';padding:4px 2px;text-align:center;font-size:9px;color:' + (isToday?'#000':'var(--text-muted)') + ';border:' + (i%7===6?'2px':'1px') + ' solid var(--border);min-width:28px;">' + ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()] + '<br>' + d.getDate() + '</th>';
    });
    html += '</tr>';
    if (tasks.length) {
      tasks.forEach(t => {
        const range = getRange(t);
        if(!range) return;
        const color = t.status==='in-progress'?'var(--warning)':t.status==='review'?'var(--accent)':'var(--success)';
        html += '<tr><td style="background:var(--bg-secondary);padding:8px 10px;font-size:12px;cursor:pointer;border:1px solid var(--border);" onclick="openTaskModal(\'' + escapeHtml(t.id) + '\')" title="' + escapeHtml(t.title) + '"><span class="tag tag-' + escapeHtml(t.priority) + '" style="font-size:9px;padding:1px 4px;">' + escapeHtml(t.priority[0].toUpperCase()) + '</span> ' + escapeHtml(t.title.length>16?t.title.slice(0,16)+'...':t.title) + '</td>';
        days.forEach((d,i) => {
          const inRange = i>=range.bs&&i<=range.be;
          html += '<td style="background:var(--bg-secondary);padding:2px;position:relative;border:' + (i%7===6?'2px':'1px') + ' solid var(--border);height:32px;">' + (inRange?'<div style="position:absolute;left:2px;right:2px;top:4px;bottom:4px;background:' + color + ';border-radius:3px;"></div>':'') + '</td>';
        });
        html += '</tr>';
      });
    } else {
      html += '<tr><td colspan="31" style="background:var(--bg-secondary);padding:20px;text-align:center;color:var(--text-muted);border:1px solid var(--border);">No active tasks with dates.</td></tr>';
    }
    html += '</table></div>';
    return html;
  };

      try {
        const d = JSON.parse(ev.target.result);
        if(d && d.tasks && Array.isArray(d.tasks)){
          let _c = 0; const genId = () => 'imp_' + Date.now() + '_' + (++_c);

            quadrant: ['q1','q2','q3','q4'].includes(t.quadrant) ? t.quadrant : 'q1',
            category: String(t.category||'').slice(0,50),
            progress: Math.min(100, Math.max(0, parseInt(t.progress)||0)),
            recurrence: ['none','daily','weekly','monthly'].includes(t.recurrence) ? t.recurrence : 'none',
          }));

            id: genId(), name: String(h.name||'').slice(0,50), emoji: String(h.emoji||'').slice(0,4),

          const safeGoals = goals.map(g => ({
            id: genId(), title: String(g.title||'').slice(0,100), description: String(g.description||'').slice(0,500),
            targetDate: /^\d{4}-\d{2}-\d{2}$/.test(g.targetDate||'') ? g.targetDate : null,
            category: String(g.category||'').slice(0,30),
            progress: Math.min(100, Math.max(0, parseInt(g.progress)||0)),
          }));
          const allowedSettings = ['weekStartDay','pomodoroWork','pomodoroBreak','theme','projectName','backupInterval','lastBackupDate'];
          const safeSettings = {};

      pomodoroWork: newWork,
      pomodoroBreak: parseInt(document.getElementById('pomo-break')?.value) || 5,
      backupInterval: parseInt(document.getElementById('backup-interval')?.value) || 7,
    };
    if(!pomodoroRunning && pomodoroPhase==='work' && oldWork!==newWork){ pomodoroTime = newWork*60; pomodoroDuration = newWork; updatePomoDisplay(); }
    applyTheme(); save(); render(); showToast('Settings updated');
  };
  window.addCategory = () => {
    const name = document.getElementById('category-name')?.value||'';
    if(!name.trim()){ showToast('Please enter a category name'); return; }
    const newId = name.trim().toLowerCase().replace(/[^a-z0-9-]/g,'-');
    if(state.categories.some(c=>c.name.toLowerCase()===name.trim().toLowerCase()||c.id===newId)){ showToast('Category already exists'); return; }
    const colors = ['--category-business','--category-personal','--category-health','--category-family','--category-social','--category-work','--category-learning','--category-finance','--category-hobby','--category-other'];
    const newCat = { id: newId, name: name.trim(), color: colors[state.categories.length%colors.length] };
    state.categories.push(newCat);
    save(); render(); showToast('Category added');
    document.getElementById('category-name').value = '';
  };
  window.deleteCategory = (id) => {
    const cat = state.categories.find(c=>c.id===id);
    if(cat && cat.id!=='business' && cat.id!=='personal' && cat.id!=='health'){
      state.categories = state.categories.filter(c=>c.id!==id);
      save(); render(); showToast('Category deleted');
    } else showToast('Cannot delete default categories');
  };

  window.undo = undo;

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if(searchQuery){ clearSearch(); return; }
      if(pendingDeleteTaskId||pendingDeleteTeamMemberId||pendingDeleteHabitId||pendingDeleteGoalId||pendingResetData){ cancelDelete(); return; }
      if(taskModalOpen){ closeTaskModal(); return; }
      if(settingsModalOpen){ closeSettings(); return; }
      if(teamModalOpen){ closeTeamModal(); return; }
      if(habitModalOpen){ closeHabitModal(); return; }
      if(goalModalOpen){ closeGoalModal(); return; }
    }
    if ((e.ctrlKey||e.metaKey) && e.key === 'n' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault(); if(!taskModalOpen&&!settingsModalOpen) openTaskModal();
    }
    if ((e.ctrlKey||e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
  });

  window.addEventListener('beforeunload', (e) => {
    if (pomodoroRunning) { e.preventDefault(); e.returnValue = 'A Pomodoro timer is running. Leave?'; }
  });

  const hideLoader = () => { const el = document.getElementById('loading-screen'); if (el) el.style.display = 'none'; };
  load().then(() => {
    applyTheme();
    render();
    hideLoader();
  }).catch(() => {
    applyTheme();
    render();
    hideLoader();
  });
</script>
