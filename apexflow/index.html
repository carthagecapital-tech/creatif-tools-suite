<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apex Flow - Project Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0a0a0a;
      --bg-secondary: #111111;
      --bg-tertiary: #1a1a1a;
      --bg-hover: #252525;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border: #262626;
      --accent: #00d4aa;
      --accent-hover: #00b38f;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --category-business: #3b82f6;
      --category-personal: #8b5cf6;
      --category-health: #06b6d4;
      --category-family: #ec4899;
      --category-social: #f97316;
      --category-work: #10b981;
      --category-learning: #eab308;
      --category-finance: #14b8a6;
      --category-hobby: #f472b6;
      --category-other: #6b7280;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 200; }
    .logo { display: flex; align-items: center; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
    .logo-text { font-size: 18px; font-weight: 600; }
    .logo-sub { font-size: 11px; color: var(--accent); }
    .hamburger { display: none; width: 24px; height: 24px; flex-direction: column; justify-content: center; gap: 4px; cursor: pointer; background: none; border: none; color: var(--text-primary); margin-left: auto; }
    .hamburger span { height: 3px; background: currentColor; border-radius: 2px; }
    nav { display: flex; flex-direction: column; flex: 1; }
    .nav-section { margin-bottom: 24px; }
    .nav-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; font-size: 14px; font-family: inherit; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: #000; font-weight: 500; }
    .nav-item svg { width: 18px; height: 18px; }
    .main { flex: 1; margin-left: 250px; padding: 24px 32px; min-height: 100vh; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .main-title { font-size: 24px; font-weight: 600; }
    .main-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 600; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-tertiary); border-radius: 8px; cursor: pointer; transition: all 0.15s; border-left: 4px solid var(--border); }
    .task-item.priority-high { border-left-color: var(--danger); }
    .task-item.priority-medium { border-left-color: var(--warning); }
    .task-item.priority-low { border-left-color: var(--success); }
    .task-item.overdue { background: rgba(239,68,68,0.1); }
    .task-item:hover { background: var(--bg-hover); transform: translateY(-2px); }
    .task-checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; background: var(--bg-tertiary); }
    .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .task-checkbox svg { width: 12px; height: 12px; color: #000; display: none; }
    .task-checkbox.checked svg { display: block; }
    .task-title { flex: 1; font-size: 14px; }
    .task-title.done { text-decoration: line-through; color: var(--text-muted); }
    .tag { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 500; }
    .tag-high { background: rgba(239,68,68,0.2); color: #ef4444; }
    .tag-medium { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .tag-low { background: rgba(16,185,129,0.2); color: #10b981; }
    .tag-todo { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .tag-in-progress { background: rgba(59,130,246,0.2); color: #3b82f6; }
    .tag-review { background: rgba(168,85,247,0.2); color: #a855f7; }
    .tag-done { background: rgba(16,185,129,0.2); color: #10b981; }
    .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
    .kanban-column { min-width: 280px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .kanban-title { font-size: 14px; font-weight: 600; }
    .kanban-count { font-size: 12px; color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 10px; }
    .kanban-cards { min-height: 200px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; }
    .kanban-card:hover { border-color: var(--accent); }
    .kanban-card-title { font-size: 14px; margin-bottom: 8px; }
    .kanban-card-meta { display: flex; gap: 8px; }
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; min-height: 500px; }
    .matrix-quadrant { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .matrix-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .q1 .matrix-title { color: #ef4444; }
    .q2 .matrix-title { color: #3b82f6; }
    .q3 .matrix-title { color: #f59e0b; }
    .q4 .matrix-title { color: #64748b; }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .team-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .team-avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #000; }
    .team-name { font-size: 16px; font-weight: 600; }
    .team-role { font-size: 13px; color: var(--text-secondary); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 20px; border-top: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select { width: 100%; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pomodoro { position: fixed; bottom: 24px; right: 24px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 260px; z-index: 100; }
    .pomodoro-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
    .pomodoro-time { font-size: 48px; font-weight: 600; color: var(--accent); text-align: center; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
    .pomodoro-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .pomodoro-controls .btn { flex: 1; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes confetti { 0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx),200px) rotate(360deg); opacity: 0; } }
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: auto; position: fixed; top: 0; left: 0; right: 0; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 16px; z-index: 1000; flex-direction: row; }
      .hamburger { display: flex; }
      .logo { padding-bottom: 0; border-bottom: none; margin-bottom: 0; gap: 8px; flex: 1; }
      .logo-icon { width: 32px; height: 32px; }
      .logo-text { font-size: 14px; }
      .logo-sub { display: none; }
      nav { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--bg-secondary); flex-direction: column; border-bottom: 1px solid var(--border); max-height: calc(100vh - 60px); overflow-y: auto; padding: 12px 0; z-index: 999; }
      nav.mobile-open { display: flex; }
      .nav-section { margin-bottom: 0; padding: 12px 16px; border-bottom: 1px solid var(--border); }
      .nav-label { padding: 0; margin-bottom: 8px; }
      .nav-item { padding: 8px 16px; border-radius: 0; }
      .main { margin-left: 0; margin-top: 60px; padding: 16px; }
      .main-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .main-title { font-size: 20px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .kanban-board { overflow-x: auto; }
      .kanban-column { min-width: 240px; }
      .matrix-grid { grid-template-columns: 1fr; gap: 12px; min-height: auto; }
      .team-grid { grid-template-columns: 1fr; }
      .pomodoro { width: calc(100% - 32px); right: 16px; left: 16px; bottom: 16px; }
      .btn { font-size: 13px; padding: 8px 12px; }
      .form-row { grid-template-columns: 1fr; }
      .modal { width: 95%; max-width: 100%; }
      .filter-bar { flex-wrap: wrap; }
    }
    @media (max-width: 480px) {
      .main { padding: 12px; }
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* Sync pill & modal */
    #sync-pill {
      position: fixed; bottom: 20px; left: 20px; padding: 8px 16px; border-radius: 30px;
      display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: bold;
      cursor: pointer; z-index: 999999; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }
    .status-local { background: #331a1a; color: #ff4d4d; }
    .status-synced { background: #0a2d25; color: #00d4aa; }
    .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }

    #sync-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: 1000000; align-items: center; justify-content: center;
    }
    #sync-modal.open { display: flex; }
    .sync-modal-content {
      background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; max-width: 400px; width: 90%; color: var(--text-primary); font-family: 'Inter', sans-serif;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .sync-modal-content h3 { margin-bottom: 16px; font-size: 16px; }
    .sync-modal-content input {
      width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 8px;
      background: var(--bg-tertiary); color: var(--text-primary); margin-bottom: 12px; font-size: 14px;
    }
    .sync-modal-content button {
      display: inline-flex; align-items: center; gap: 6px; padding: 10px 16px; border-radius: 8px;
      border: none; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .sync-modal-content button.primary { background: var(--accent); color: #000; }
    .sync-modal-content button.primary:hover { background: var(--accent-hover); }
    .sync-modal-content button.secondary {
      background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border);
    }
    .sync-modal-content button.secondary:hover { background: var(--bg-hover); }
    .sync-modal-content button.danger {
      background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2);
    }
    .sync-modal-content button.danger:hover { background: rgba(239,68,68,0.2); }
    .sync-modal-content .actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
  </style>
</head>

  const generateRecurringTasks = () => {
    const today = new Date();
    const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    const lastGen = localStorage.getItem('lastRecurringGen');
    if (lastGen === todayStr) return;
    const lastGenDate = lastGen ? new Date(lastGen) : new Date(today);
    lastGenDate.setDate(lastGenDate.getDate() + 1);
    let currentDate = new Date(lastGenDate);
    while (currentDate <= today) {
      const currentDateStr = currentDate.getFullYear() + '-' + String(currentDate.getMonth()+1).padStart(2,'0') + '-' + String(currentDate.getDate()).padStart(2,'0');
      state.tasks.forEach(function(task) {
        if (!task.recurrence || task.recurrence === 'none' || !task.dueDate || task.status !== 'done') return;
        const parts = task.dueDate.split('-');
        const taskDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        const diffTime = currentDate - taskDate;
        const diffDays = Math.floor(diffTime / 86400000);
        let shouldCreate = false;
        let newDueDate = null;
        if (task.recurrence === 'daily' && diffDays >= 0 && diffDays % 1 === 0 && diffDays > 0) {
          newDueDate = new Date(taskDate);
          newDueDate.setDate(taskDate.getDate() + diffDays);
          shouldCreate = true;
        } else if (task.recurrence === 'weekly' && diffDays >= 0 && diffDays % 7 === 0 && diffDays >= 7) {
          newDueDate = new Date(taskDate);
          newDueDate.setDate(taskDate.getDate() + diffDays);
          shouldCreate = true;
        } else if (task.recurrence === 'monthly' && diffDays >= 0) {
          const monthsDiff = (currentDate.getFullYear() - taskDate.getFullYear()) * 12 + (currentDate.getMonth() - taskDate.getMonth());
          if (monthsDiff >= 1 && monthsDiff % 1 === 0) {
            newDueDate = new Date(taskDate);
            newDueDate.setMonth(taskDate.getMonth() + monthsDiff);
            shouldCreate = true;
          }
        }
        if (shouldCreate && newDueDate) {
          const existing = state.tasks.some(t => t.title === task.title && t.dueDate === newDueDate.toISOString().split('T')[0]);
          if (!existing) {
            state.tasks.push(Object.assign({}, task, {
              id: Date.now().toString() + Math.random(),
              status: 'todo', progress: 0,
              dueDate: newDueDate.getFullYear() + '-' + String(newDueDate.getMonth()+1).padStart(2,'0') + '-' + String(newDueDate.getDate()).padStart(2,'0'),
            }));
          }
        }
      });
      currentDate.setDate(currentDate.getDate() + 1);
    }
    localStorage.setItem('lastRecurringGen', todayStr);
  };

  const getRelativeDate = function(dateStr) {
    if (!dateStr) return '';
    const parts = dateStr.split('-');
    const taskDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
    const today = new Date(); today.setHours(0,0,0,0); taskDate.setHours(0,0,0,0);
    const diff = Math.floor((taskDate - today) / 86400000);
    if (diff === 0) return 'Today';
    if (diff === 1) return 'Tomorrow';
    if (diff === -1) return '1 day overdue';
    if (diff < 0) return Math.abs(diff) + ' days overdue';
    if (diff <= 7) return 'In ' + diff + ' days';
    return dateStr;
  };

  const isOverdue = function(task) {

    const today = new Date(); today.setHours(0,0,0,0);

    return '<div style="position:relative;width:' + size + 'px;height:' + size + 'px;">'

      + '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="3"/>'
      + '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="var(--accent)" stroke-width="3" stroke-dasharray="' + circ + '" stroke-dashoffset="' + offset + '" stroke-linecap="round"/>'
      + '</svg>'

  const donutChart = function(segments, size, label, sublabel) {
    size = size || 120;
    const cx = size/2, cy = size/2, r = size*0.38, stroke = size*0.13;
    const total = segments.reduce(function(s,x){return s + (parseInt(x.value) || 0);},0);
    if (!total) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
        + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="' + stroke + '"/>'
        + '<text x="' + cx + '" y="' + (cy-4) + '" text-anchor="middle" fill="var(--text-muted)" font-size="' + (size*0.13) + '" font-family="Inter,sans-serif" font-weight="600">-</text>'
        + '</svg>';
    }
    const circ = 2 * Math.PI * r;
    let offset = 0;
    let paths = '';
    segments.forEach(function(seg) {
      const segValue = parseInt(seg.value) || 0;
      if (!segValue) return;
      const dash = (segValue / total) * circ;
      const gap = circ - dash;
      paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + escapeHtml(seg.color) + '" stroke-width="' + stroke + '"'
        + ' stroke-dasharray="' + dash + ' ' + gap + '"'
        + ' stroke-dashoffset="' + (-offset) + '"'
        + ' style="transform:rotate(-90deg);transform-origin:' + cx + 'px ' + cy + 'px;" >'
        + (seg.title ? '<title>' + escapeHtml(seg.title) + ': ' + segValue + '</title>' : '')
        + '</circle>';
      offset += dash;
    });
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="' + stroke + '"/>'
      + paths
      + '<text x="' + cx + '" y="' + (cy+3) + '" text-anchor="middle" fill="var(--text-primary)" font-size="' + (size*0.16) + '" font-family="Inter,sans-serif" font-weight="700">' + escapeHtml(String(label)) + '</text>'
      + (sublabel ? '<text x="' + cx + '" y="' + (cy + size*0.14) + '" text-anchor="middle" fill="var(--text-muted)" font-size="' + (size*0.09) + '" font-family="Inter,sans-serif">' + escapeHtml(sublabel) + '</text>' : '')
      + '</svg>';
  };

  const renderGantt = function() {
    const today = new Date();
    const startDate = new Date(today); startDate.setDate(today.getDate() - 5);
    const days = [];
    for (let i = 0; i < 30; i++) {
      const d = new Date(startDate); d.setDate(startDate.getDate() + i);
      days.push(d);
    }
    const ts = todayStr();
    const tasks = state.tasks.filter(function(t){return (t.dueDate||t.startDate)&&t.status!=='done';});
    tasks.sort(function(a,b){const p={high:0,medium:1,low:2};return (p[a.priority]||2)-(p[b.priority]||2);});

    const getRange = function(t) {
      const pd = function(s) {
        if (!s) return null;
        const p = s.split('-');
        return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      };
      const start = pd(t.startDate)||pd(t.dueDate);
      const end = pd(t.dueDate)||pd(t.startDate);
      if (!start||!end) return null;
      const sd = Math.floor((start-startDate)/86400000);
      const ed = Math.floor((end-startDate)/86400000);
      if ((sd<0&&ed<0)||(sd>29&&ed>29)) return null;
      const bs = Math.max(0,Math.min(29,sd));
      const be = Math.max(bs,Math.min(29,ed));
      return {bs:bs,be:be};
    };

    let html = '<div class="main-header"><div><h1 class="main-title">Gantt Chart</h1><p class="main-subtitle">30-day project timeline</p></div>'
      + '<button class="btn btn-primary" onclick="openTaskModal()">' + icons.plus + ' New Task</button></div>'
      + '<div class="card" style="overflow-x:auto;">'
      + '<table style="border-collapse:collapse;min-width:1100px;width:100%;">'
      + '<tr><th style="background:var(--bg-tertiary);padding:8px 10px;text-align:left;font-size:12px;border:1px solid var(--border);min-width:160px;">Task</th>';
    days.forEach(function(d,i) {
      const isToday = localDate(d) === ts;
      const isWeekend = d.getDay()===0||d.getDay()===6;
      html += '<th style="background:' + (isToday?'var(--accent)':isWeekend?'var(--bg-hover)':'var(--bg-tertiary)') + ';padding:4px 2px;text-align:center;font-size:9px;color:' + (isToday?'#000':'var(--text-muted)') + ';border:' + (i%7===6?'2px':'1px') + ' solid var(--border);min-width:28px;">'
        + ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()] + '<br>' + d.getDate() + '</th>';
    });
    html += '</tr>';
    if (tasks.length) {
      tasks.forEach(function(t) {
        const range = getRange(t);
        if (!range) return;
        const color = t.status==='in-progress'?'var(--warning)':t.status==='review'?'var(--accent)':'var(--success)';
        html += '<tr><td style="background:var(--bg-secondary);padding:8px 10px;font-size:12px;cursor:pointer;border:1px solid var(--border);" onclick="openTaskModal(\'' + escapeHtml(t.id) + '\')" title="' + escapeHtml(t.title) + '">'
          + '<span class="tag tag-' + escapeHtml(t.priority) + '" style="font-size:9px;padding:1px 4px;">' + escapeHtml(t.priority[0].toUpperCase()) + '</span> '
          + escapeHtml(t.title.length>16?t.title.slice(0,16)+'...':t.title) + '</td>';
        days.forEach(function(d,i) {
          const inRange = i>=range.bs&&i<=range.be;
          html += '<td style="background:var(--bg-secondary);padding:2px;position:relative;border:' + (i%7===6?'2px':'1px') + ' solid var(--border);height:32px;">'
            + (inRange?'<div style="position:absolute;left:2px;right:2px;top:4px;bottom:4px;background:' + color + ';border-radius:3px;"></div>':'')
            + '<tr>';
        });
        html += '</tr>';
      });
    } else {
      html += '<tr><td colspan="31" style="background:var(--bg-secondary);padding:20px;text-align:center;color:var(--text-muted);border:1px solid var(--border);">No active tasks with dates.</td></tr>';
    }
    html += '</table></div>';
    return html;
  };

  window.saveTask = function(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const oldTask = editingTask ? state.tasks.find(t => t.id === editingTask) : null;
    const task = {
      id: fd.get('id') || Date.now().toString(),
      title: fd.get('title'), description: fd.get('description')||'',
      status: fd.get('status'), priority: fd.get('priority'),
      assignee: fd.get('assignee')||null, dueDate: fd.get('dueDate')||null,

      category: fd.get('category')||'', progress: parseInt(fd.get('progress'))||0,
      recurrence: fd.get('recurrence')||'none',
    };
    if (editingTask) {
      const existing = state.tasks.find(function(t){return t.id===editingTask;})||{};
      pushToUndo('task-update', { oldTask: existing });
      state.tasks = state.tasks.map(function(t){return t.id===editingTask?Object.assign({},existing,task):t;});
      showToast('Task updated');

      state.tasks.push(task);

      showToast('Task created');
    }
    save(); closeTaskModal();

  window.toggleTask = function(id) {

    const wf = {'todo':'in-progress','in-progress':'review','review':'done','done':'todo'};
    const ns = wf[task.status] || 'done';
    if (ns === 'done') triggerConfetti();
    state.tasks = state.tasks.map(function(t) {

      return Object.assign({}, t, {status: ns});
    });

  const triggerConfetti = function() {

    for (let i = 0; i < 30; i++) {
      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;width:10px;height:10px;border-radius:50%;z-index:9999;pointer-events:none;';
      el.style.left = Math.random()*100 + '%';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.setProperty('--tx', (Math.random()-0.5)*200 + 'px');
      el.style.animation = 'confetti ' + (1+Math.random()) + 's ease-out forwards';

      setTimeout(function(){if(el && el.remove) el.remove();}, 2000);
    }

  window.dropTask = function(e,status) { 
    e.preventDefault(); 
    let droppedId = dragId;
    if (e.dataTransfer && e.dataTransfer.getData('text/plain')) {
      droppedId = e.dataTransfer.getData('text/plain');
    }
    if(droppedId){
      const task = state.tasks.find(t => t.id === droppedId);
      if (task && task.status !== status) {
        pushToUndo('task-update', { oldTask: Object.assign({}, task) });
        state.tasks = state.tasks.map(function(t){return t.id === droppedId ? Object.assign({}, t, {status: status}) : t;});
        save(); render();
      }
    }
    dragId = null;
  };

  window.importData = function(e) {
    const file = e.target.files[0]; 
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      try{
        const d = JSON.parse(ev.target.result);
        if(d.tasks && Array.isArray(d.tasks)){
          state = {
            ...state,
            tasks: d.tasks || [],
            habits: d.habits || [],
            goals: d.goals || [],
            teamMembers: d.teamMembers || [],
            categories: d.categories || state.categories,
            settings: { ...state.settings, ...d.settings }
          };
          save(); 
          render(); 
          showToast('Data imported successfully');
        } else {
          showToast('Invalid file format: missing tasks array');
        }
      } catch(err){
        console.error('Import error:', err);
        showToast('Invalid JSON file');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const updatePomoDisplay = function() {

    const m = Math.floor(pomodoroTime/60), s = pomodoroTime%60;
    const ts = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    if(el) el.textContent = ts;
    if(ft) ft.textContent = ts;
  };

  window.updateSettings = function() {
    const newWorkMins = parseInt((document.getElementById('pomo-work')||{}).value) || 25;
    const oldWorkMins = (state.settings && state.settings.pomodoroWork) || 25;
    state.settings = Object.assign({}, state.settings, {
      projectName: (document.getElementById('project-name')||{}).value || 'My Project',
      weekStartDay: (document.getElementById('week-start')||{}).value || 'monday',
      theme: (document.getElementById('theme')||{}).value || 'dark',
      pomodoroWork: newWorkMins,
      pomodoroBreak: parseInt((document.getElementById('pomo-break')||{}).value) || 5,
    });
    if (!pomodoroRunning && pomodoroPhase === 'work' && oldWorkMins !== newWorkMins) {
      pomodoroTime = newWorkMins * 60;
      pomodoroDuration = newWorkMins;
      updatePomoDisplay();
    }
    save(); 
    render();
    showToast('Settings updated');
  };

  window.addCategory = function() {
    const name = (document.getElementById('category-name')||{}).value||'';
    if(!name.trim()) { showToast('Please enter a category name'); return; }
    const existing = state.categories.some(c => c.name.toLowerCase() === name.trim().toLowerCase());
    if (existing) { showToast('Category already exists'); return; }
    const colors = ['--category-business','--category-personal','--category-health','--category-family','--category-social','--category-work','--category-learning','--category-finance','--category-hobby','--category-other'];
    const newCategory = {
      id: name.trim().toLowerCase().replace(/[^a-z0-9-]/g, '-'),
      name: name.trim(),
      color: colors[state.categories.length % colors.length]
    };
    state.categories.push(newCategory);
    save(); 
    render(); 
    showToast('Category added');
    const input = document.getElementById('category-name');
    if (input) input.value = '';
  };
  
  window.deleteCategory = function(id) { 
    const category = state.categories.find(c => c.id === id);
    if (category && category.id !== 'business' && category.id !== 'personal' && category.id !== 'health') {
      state.categories = state.categories.filter(function(c){return c.id!==id;});
      save();
      render();
      showToast('Category deleted');
    } else {
      showToast('Cannot delete default categories');
    }
  };

  window.undo = function() { undo(); };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if(searchQuery){clearSearch();return;}
      if(pendingDeleteTaskId||pendingDeleteTeamMemberId||pendingDeleteHabitId||pendingDeleteGoalId||pendingResetData){cancelDelete();return;}
      if(taskModalOpen){closeTaskModal();return;}
      if(settingsModalOpen){closeSettings();return;}
      if(teamModalOpen){closeTeamModal();return;}
      if(habitModalOpen){closeHabitModal();return;}
      if(goalModalOpen){closeGoalModal();return;}
    }
    if (e.key === 'n' && (e.ctrlKey || e.metaKey) && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      e.preventDefault();
      if(!taskModalOpen&&!settingsModalOpen) openTaskModal();
    }
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) {
      e.preventDefault();
      undo();
    }
  });

  // ======================== CLOUD SYNC (AF prefix) ========================
  (function() {
    const CFG = {
      U: "https://caring-sheepdog-97206.upstash.io",
      T: "gQAAAAAAAXu2AAIgcDJjYjViMGRlYTJiOGU0MjdkOWM4MDc3NTEyYTYwMTg1ZA",
      S: "apex2026",
      P: "AF"
    };
    let pushEnabled = false;
    let syncing = false;

    async function cloud(cmd, pin, data) {
      const h = { "Authorization": "Bearer " + CFG.T };
      const addr = CFG.U.replace(/\/$/, "") + "/" + cmd + "/" + CFG.P + "-" + pin;
      const o = data ? { method: "POST", headers: h, body: data } : { headers: h };
      try { const r = await fetch(addr, o); return await r.json(); } catch(e) { return null; }
    }

    function updatePill() {
      const pin = localStorage.getItem("c_pin");
      const pill = document.getElementById("sync-pill");
      if (pill) {
        if (pin) {
          pill.className = "status-synced";
          pill.innerHTML = '<div class="sync-dot"></div> SYNCED: AF-' + pin;
        } else {
          pill.className = "status-local";
          pill.innerHTML = '<div class="sync-dot"></div> LOCAL MODE';
        }
      }
    }

    async function pullData(pin) {
      const c = await cloud("get", pin);
      if (c && c.result && c.result !== "OK") {
        try {
          const bytes = CryptoJS.AES.decrypt(c.result, pin + CFG.S);
          const d = JSON.parse(bytes.toString(CryptoJS.enc.Utf8));
          if (d) {
            syncing = true;
            // Merge cloud state into current state
            Object.assign(state, d);
            if (typeof save === 'function') save();
            if (typeof render === 'function') render();
            syncing = false;
            return true;
          }
        } catch(e) { console.error("Pull decrypt error", e); }
      }
      return false;
    }

    async function pushData(pin) {
      const data = state;
      if (!data) return false;
      const enc = CryptoJS.AES.encrypt(JSON.stringify(data), pin + CFG.S).toString();
      const res = await cloud("set", pin, enc);
      return !!res;
    }

    window.hideModal = function() { document.getElementById("sync-modal").classList.remove("open"); };

    function showModal(title, bodyHTML, actionsHTML) {
      document.getElementById("sync-modal-title").textContent = title;
      document.getElementById("sync-modal-body").innerHTML = bodyHTML;
      document.getElementById("sync-modal-actions").innerHTML = actionsHTML;
      document.getElementById("sync-modal").classList.add("open");
    }

    window.openSyncMenu = async function() {
      const pin = localStorage.getItem("c_pin");
      if (!pin) {
        showModal(
          "Connect to Cloud",
          `<p style="margin-bottom:12px;">Enter PIN or generate new:</p>
           <input type="text" id="pin-input" placeholder="6-digit PIN" maxlength="6" style="text-align:center;">`,
          `<button class="secondary" onclick="hideModal()">Cancel</button>
           <button class="primary" id="btn-enter-pin">Use PIN</button>
           <button class="primary" id="btn-generate">Generate New</button>`
        );
        document.getElementById("btn-enter-pin").onclick = async function() {
          const p = document.getElementById("pin-input").value.trim();
          if (!p || p.length !== 6) { alert("Enter 6-digit PIN"); return; }
          hideModal();
          const cloudExists = await cloud("get", p);
          if (cloudExists && cloudExists.result && cloudExists.result !== "OK") {
            if (confirm("Cloud vault found. Pull data from cloud? (This will replace local data.)")) {
              if (await pullData(p)) {
                localStorage.setItem("c_pin", p);
                updatePill();
                showToast("Data pulled from cloud.");
              } else {
                alert("Failed to decrypt cloud data.");
              }
            }
          } else {
            if (confirm("No cloud data found. Push your local data to the cloud?")) {
              if (await pushData(p)) {
                localStorage.setItem("c_pin", p);
                updatePill();
                showToast("Data pushed to cloud.");
              } else {
                alert("Push failed.");
              }
            }
          }
        };
        document.getElementById("btn-generate").onclick = async function() {
          hideModal();
          const newPin = Math.floor(100000 + Math.random() * 900000).toString();
          if (confirm("Your new PIN is: " + newPin + ".\nSave it safely! Continue?")) {
            if (await pushData(newPin)) {
              localStorage.setItem("c_pin", newPin);
              updatePill();
              showToast("New vault created.");
            } else {
              alert("Failed to push data.");
            }
          }
        };
      } else {
        showModal(
          "Sync Management",
          `<p>You are synced with PIN: <strong>${pin}</strong></p>`,
          `<button class="secondary" onclick="hideModal()">Close</button>
           <button class="primary" id="btn-pull">Pull from Cloud</button>
           <button class="primary" id="btn-push">Push to Cloud</button>
           <button class="danger" id="btn-disconnect">Disconnect</button>`
        );
        document.getElementById("btn-pull").onclick = async function() {
          hideModal();
          if (confirm("Replace local data with cloud data?")) {
            if (await pullData(pin)) {
              updatePill();
              showToast("Data pulled from cloud.");
            } else {
              alert("No cloud data found or decryption error.");
            }
          }
        };
        document.getElementById("btn-push").onclick = async function() {
          hideModal();
          if (confirm("Overwrite cloud data with your local data?")) {
            if (await pushData(pin)) {
              showToast("Data pushed to cloud.");
            } else {
              alert("Push failed.");
            }
          }
        };
        document.getElementById("btn-disconnect").onclick = function() {
          hideModal();
          if (confirm("Disconnect from cloud? You can reconnect later.")) {
            localStorage.removeItem("c_pin");
            pushEnabled = false;
            updatePill();
            showToast("Disconnected from cloud.");
          }
        };
      }
    };

    // Auto-push on save when synced
    const originalSave = save;
    if (originalSave) {
      window.save = function() {
        const result = originalSave.apply(this, arguments);
        const pin = localStorage.getItem("c_pin");
        if (pushEnabled && !syncing && pin && navigator.onLine) {
          pushData(pin).catch(e => console.warn("Auto-push failed", e));
        }
        return result;
      };
    }

    function initSync() {
      updatePill();
      const pin = localStorage.getItem("c_pin");
      if (pin) pushEnabled = true;
      // Attach click handler to the static pill
      document.getElementById("sync-pill").onclick = function() { window.openSyncMenu(); };
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initSync);
    } else {
      initSync();
    }
  })();

  // ======================== INITIAL LOAD & RENDER ========================
  load();
  checkFirstTime();
  render();
</script>

<!-- IndexedDB storage engine (same as original) -->
<script>
(function(){
  "use strict";
  var DB_NAME="apexflow_db", V=1, ST="appdata", LK="apexflow", MAX=4000000;
  var db=null, useIDB=false, ready=false, queue=[];
  function init(){
    return new Promise(function(ok){
      if(!window.indexedDB){ok(false);return;}
      var r=indexedDB.open(DB_NAME,V);
      r.onerror=function(){ok(false)};
      r.onblocked=function(){ok(false)};
      r.onupgradeneeded=function(e){var d=e.target.result;if(!d.objectStoreNames.contains(ST))d.createObjectStore(ST,{keyPath:"k"});};
      r.onsuccess=function(e){db=e.target.result;db.onerror=function(){};useIDB=true;ready=true;flushQ();migrateLS();ok(true);};
    });
  }
  function flushQ(){var q=queue.slice();queue=[];q.forEach(function(x){try{x.resolve(doOp(x.op,x.args))}catch(e){x.reject(e)}});}
  function enqueue(op,args){return new Promise(function(ok,no){if(!useIDB){ok(lsOp(op,args));return;}if(!ready){queue.push({op:op,args:args,resolve:ok,reject:no});return;}ok(doOp(op,args));});}
  function doOp(op,args){if(op==="save")return saveIDB(args[1]);if(op==="load")return loadIDB();return Promise.resolve(null);}
  function saveIDB(data){return new Promise(function(ok,no){try{var tx=db.transaction([ST],"readwrite");var s=tx.objectStore(ST);s.put({k:"d",v:data,t:Date.now()});tx.oncomplete=function(){try{var str=JSON.stringify(data);if(str.length<MAX)localStorage.setItem(LK,str)}catch(e){}ok(true)};tx.onerror=function(){try{localStorage.setItem(LK,JSON.stringify(data));ok(true)}catch(e){no(e)}}}catch(e){no(e)}});}
  function loadIDB(){return new Promise(function(ok){try{var tx=db.transaction([ST],"readonly");var r=tx.objectStore(ST).get("d");r.onsuccess=function(){ok(r.result?r.result.v:null)};r.onerror=function(){ok(null)}}catch(e){ok(null)}});}
  function lsOp(op,args){if(op==="save"){try{var s=JSON.stringify(args[1]);if(new Blob([s]).size<MAX){localStorage.setItem(LK,s);return true}return false}catch(e){return false}}if(op==="load"){try{var r=localStorage.getItem(LK);return r?JSON.parse(r):null}catch(e){return null}}return null;}
  function migrateLS(){try{var raw=localStorage.getItem(LK);if(!raw)return;var data=JSON.parse(raw);if(!data||!data.tasks)return;loadIDB().then(function(ex){if(!ex){saveIDB(data);console.log("ApexFlow: Migrated to IndexedDB")}})}catch(e){}}
  window.ApexFlowStorage={init:init,save:function(d){return enqueue("save",["data",d])},load:function(){return enqueue("load",[])},getType:function(){return useIDB?"IndexedDB":"localStorage"},isReady:function(){return ready}};
  setTimeout(function(){if(window.ApexFlowStorage)window.ApexFlowStorage.init();},0);
})();
</script>
