<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' data: blob:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: blob:; connect-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeddingFlow Pro — Wedding Planning & Vendor Management Suite</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #fdf6ec;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f7ede0;
      --bg-hover: #f1e4d2;
      --text-primary: #3a2a1a;
      --text-secondary: #7a6450;
      --text-muted: #a08a74;
      --border: #e8d9c4;
      --accent: #c9737a;
      --accent-hover: #a85b62;
      --gold: #b8960c;
      --gold-soft: #e0c45c;
      --success: #6a8e57;
      --warning: #b8960c;
      --danger: #b94a4a;
      --category-venue: #c9737a;
      --category-catering: #b8960c;
      --category-photo: #8b6f9d;
      --category-floral: #d18a85;
      --category-music: #6f8eaa;
      --category-beauty: #c47b9d;
      --category-cake: #d4a574;
      --category-transport: #7a8a6a;
      --category-officiant: #9c7a5c;
      --category-stationery: #b89a7c;
      --category-lighting: #a89270;
      --category-coord: #8a6a8a;
    }
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 250px; background: var(--bg-secondary); border-right: 1px solid var(--border); padding: 20px 16px; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; }
    .logo { display: flex; align-items: center; gap: 12px; padding-bottom: 24px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
    .logo-text { font-size: 18px; font-weight: 600; }
    .logo-sub { font-size: 11px; color: var(--accent); }
    .hamburger { display: none; width: 24px; height: 24px; flex-direction: column; justify-content: center; gap: 4px; cursor: pointer; background: none; border: none; color: var(--text-primary); margin-left: auto; }
    .hamburger span { height: 3px; background: currentColor; border-radius: 2px; }
    nav { display: flex; flex-direction: column; flex: 1; }
    .nav-section { margin-bottom: 24px; }
    .nav-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; }
    .nav-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; font-size: 14px; font-family: inherit; }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: #000; font-weight: 500; }
    .nav-item svg { width: 18px; height: 18px; }
    .main { flex: 1; margin-left: 250px; padding: 24px 32px; min-height: 100vh; }
    .main-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .main-title { font-size: 24px; font-weight: 600; }
    .main-subtitle { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
    .btn svg { width: 16px; height: 16px; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: var(--bg-tertiary); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--bg-hover); }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .stat-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; }
    .stat-label { font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 600; }
    .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .task-list { display: flex; flex-direction: column; gap: 8px; }
    .task-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--bg-tertiary); border-radius: 8px; cursor: pointer; transition: all 0.15s; border-left: 4px solid var(--border); }
    .task-item.priority-high { border-left-color: var(--danger); }
    .task-item.priority-medium { border-left-color: var(--warning); }
    .task-item.priority-low { border-left-color: var(--success); }
    .task-item.overdue { background: rgba(239,68,68,0.1); }
    .task-item:hover { background: var(--bg-hover); transform: translateY(-2px); }
    .task-checkbox { width: 18px; height: 18px; border: 2px solid var(--border); border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .task-checkbox svg { width: 12px; height: 12px; color: #000; display: none; }
    .task-checkbox.checked svg { display: block; }
    .task-title { flex: 1; font-size: 14px; }
    .task-title.done { text-decoration: line-through; color: var(--text-muted); }
    .tag { font-size: 11px; padding: 4px 8px; border-radius: 4px; font-weight: 500; }
    .tag-high { background: rgba(239,68,68,0.2); color: #ef4444; }
    .tag-medium { background: rgba(245,158,11,0.2); color: #f59e0b; }
    .tag-low { background: rgba(16,185,129,0.2); color: #10b981; }
    .tag-todo { background: rgba(148,163,184,0.2); color: #94a3b8; }
    .tag-in-progress { background: rgba(184,150,12,0.15); color: #b8960c; }
    .tag-confirmed { background: rgba(184,150,12,0.25); color: #8a6e00; font-weight: 600; }
    .tag-done { background: rgba(106,142,87,0.2); color: #4a7a37; }
    .kanban-board { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 16px; }
    .kanban-column { min-width: 280px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .kanban-title { font-size: 14px; font-weight: 600; }
    .kanban-count { font-size: 12px; color: var(--text-muted); background: var(--bg-tertiary); padding: 2px 8px; border-radius: 10px; }
    .kanban-cards { min-height: 200px; display: flex; flex-direction: column; gap: 8px; }
    .kanban-card { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; padding: 12px; cursor: grab; }
    .kanban-card:hover { border-color: var(--accent); }
    .kanban-card-title { font-size: 14px; margin-bottom: 8px; }
    .kanban-card-meta { display: flex; gap: 8px; }
    .matrix-grid { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 16px; min-height: 500px; }
    .matrix-quadrant { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
    .matrix-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .q1 .matrix-title { color: var(--danger); }
    .q2 .matrix-title { color: var(--accent); }
    .q3 .matrix-title { color: var(--gold); }
    .q4 .matrix-title { color: var(--text-muted); }
    /* Budget tracker */
    .budget-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .budget-table th { background: var(--bg-tertiary); padding: 10px 12px; text-align: left; font-weight: 600; color: var(--text-secondary); border-bottom: 2px solid var(--border); }
    .budget-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .budget-table tr:hover td { background: var(--bg-hover); }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 10px; }
    .badge-unpaid { background: rgba(185,74,74,0.15); color: var(--danger); }
    .badge-deposit { background: rgba(184,150,12,0.18); color: var(--gold); }
    .badge-paid { background: rgba(106,142,87,0.18); color: var(--success); }
    .badge-none { background: var(--bg-tertiary); color: var(--text-muted); }
    .badge-negotiating { background: rgba(184,150,12,0.12); color: var(--gold); }
    .badge-signed { background: rgba(106,142,87,0.15); color: var(--success); }
    /* Loading screen */
    #loading-screen { position:fixed;inset:0;background:var(--bg-primary);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999; }
    .loading-logo { width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;margin-bottom:20px;animation:pulse 1.4s infinite; }
    .loading-text { font-size:20px;font-weight:600;color:var(--text-primary);margin-bottom:8px; }
    .loading-sub { font-size:13px;color:var(--gold); }
    .team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .team-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .team-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .team-avatar { width: 48px; height: 48px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; color: #000; }
    .team-name { font-size: 16px; font-weight: 600; }
    .team-role { font-size: 13px; color: var(--text-secondary); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal-overlay.active { display: flex; }
    .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; width: 90%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid var(--border); }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-body { padding: 20px; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 12px; padding: 20px; border-top: 1px solid var(--border); }
    .form-group { margin-bottom: 16px; }
    .form-label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
    .form-input, .form-select { width: 100%; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; font-family: inherit; }
    .form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .pomodoro { position: fixed; bottom: 24px; right: 24px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 16px; padding: 20px; width: 260px; z-index: 100; }
    .pomodoro-header { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; color: var(--text-secondary); font-size: 14px; font-weight: 500; }
    .pomodoro-time { font-size: 48px; font-weight: 600; color: var(--accent); text-align: center; margin-bottom: 16px; font-variant-numeric: tabular-nums; }
    .pomodoro-controls { display: flex; gap: 8px; margin-bottom: 12px; }
    .pomodoro-controls .btn { flex: 1; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes confetti { 0% { transform: translate(0,0) rotate(0deg); opacity: 1; } 100% { transform: translate(var(--tx),200px) rotate(360deg); opacity: 0; } }
    @media (max-width: 768px) {
      .sidebar { width: 100%; height: auto; position: fixed; top: 0; left: 0; right: 0; border-right: none; border-bottom: 1px solid var(--border); padding: 12px 16px; z-index: 100; flex-direction: row; }
      .hamburger { display: flex; }
      .logo { padding-bottom: 0; border-bottom: none; margin-bottom: 0; gap: 8px; flex: 1; }
      .logo-icon { width: 32px; height: 32px; }
      .logo-text { font-size: 14px; }
      .logo-sub { display: none; }
      nav { display: none; position: absolute; top: 60px; left: 0; right: 0; background: var(--bg-secondary); flex-direction: column; border-bottom: 1px solid var(--border); max-height: calc(100vh - 60px); overflow-y: auto; padding: 12px 0; }
      nav.mobile-open { display: flex; }
      .nav-section { margin-bottom: 0; padding: 12px 16px; border-bottom: 1px solid var(--border); }
      .nav-label { padding: 0; margin-bottom: 8px; }
      .nav-item { padding: 8px 16px; border-radius: 0; }
      .main { margin-left: 0; margin-top: 60px; padding: 16px; }
      .main-header { flex-direction: column; align-items: flex-start; gap: 12px; }
      .main-title { font-size: 20px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .kanban-board { overflow-x: auto; }
      .kanban-column { min-width: 240px; }
      .matrix-grid { grid-template-columns: 1fr; gap: 12px; min-height: auto; }
      .team-grid { grid-template-columns: 1fr; }
      .pomodoro { width: calc(100% - 32px); right: 16px; left: 16px; bottom: 16px; }
      .btn { font-size: 13px; padding: 8px 12px; }
      .form-row { grid-template-columns: 1fr; }
      .modal { width: 95%; max-width: 100%; }
      .filter-bar { flex-wrap: wrap; }
    }
    @media (max-width: 480px) {
      .main { padding: 12px; }
      .stats-grid { grid-template-columns: 1fr; }
    }

    /* ── Print / PDF export ───────────────────────────────── */
    .print-header { display: none; }
    .no-print {}

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      body { background: #fff !important; font-size: 11pt; }

      /* hide navigation & widgets */
      .sidebar, .pomodoro, .hamburger, .modal-overlay { display: none !important; }
      .no-print { display: none !important; }

      /* reset main content to full width */
      .main { margin-left: 0 !important; padding: 16px 24px !important; min-height: auto !important; }

      /* show branded print header */
      .print-header { display: flex !important; align-items: center; justify-content: space-between;
        border-bottom: 2px solid #c9737a; padding-bottom: 10px; margin-bottom: 18px; }
      .print-header-title { font-size: 18pt; font-weight: 700; color: #3a2a1a; }
      .print-header-meta { font-size: 9pt; color: #7a6450; text-align: right; }
      .print-header-logo { font-size: 10pt; color: #b8960c; font-weight: 600; }

      /* hide all action buttons */
      .btn, button { display: none !important; }
      /* but keep checkbox appearance (it's a div) */
      .task-checkbox { flex-shrink: 0; }

      /* cards & items: clean borders, avoid page breaks inside */
      .card, .stat-card, .kanban-column, .team-card { border: 1px solid #ccc !important; box-shadow: none !important; }
      .card, .kanban-card, .task-item, .team-card { page-break-inside: avoid; break-inside: avoid; }
      .stats-grid { grid-template-columns: repeat(4, 1fr) !important; margin-bottom: 16px !important; }
      .main-header { margin-bottom: 12px !important; }

      /* kanban: wrap columns vertically for print */
      .kanban-board { flex-wrap: wrap !important; overflow: visible !important; }
      .kanban-column { min-width: 46% !important; margin-bottom: 12px; }

      /* matrix: single column */
      .matrix-grid { grid-template-columns: 1fr 1fr !important; }

      /* print footer */
      .print-footer { display: block !important; text-align: center; font-size: 8pt;
        color: #a08a74; border-top: 1px solid #e8d9c4; margin-top: 24px; padding-top: 8px; }
    }
    .print-footer { display: none; }
  </style>
</head>

  const IDB_NAME    = 'wf_v1_db';
  const IDB_VERSION = 1;
  const IDB_STORE   = 'kv';
  let db = null;

  const openDB = function() {
    return new Promise(function(resolve, reject) {
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = function(e) {
        const d = e.target.result;
        if (!d.objectStoreNames.contains(IDB_STORE)) {
          d.createObjectStore(IDB_STORE);
        }
      };
      req.onsuccess = function(e) { db = e.target.result; resolve(db); };
      req.onerror   = function(e) { reject(e.target.error); };
    });
  };

  const dbGet = function(key) {
    return new Promise(function(resolve, reject) {
      const tx  = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = function() { resolve(req.result); };
      req.onerror   = function() { reject(req.error); };
    });
  };

  const dbSet = function(key, value) {
    return new Promise(function(resolve, reject) {
      const tx  = db.transaction(IDB_STORE, 'readwrite');
      const req = tx.objectStore(IDB_STORE).put(value, key);
      req.onsuccess = function() { resolve(); };
      req.onerror   = function() { reject(req.error); };
    });
  };

  const dbDelete = function(key) {
    return new Promise(function(resolve, reject) {
      const tx  = db.transaction(IDB_STORE, 'readwrite');
      const req = tx.objectStore(IDB_STORE).delete(key);
      req.onsuccess = function() { resolve(); };
      req.onerror   = function() { reject(req.error); };
    });
  };

  const generateRecurringTasks = function() {
    const today    = new Date();
    const todayStr = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
    return dbGet('recurring').then(function(lastGen) {
      if (lastGen === todayStr) return;
      state.tasks.forEach(function(task) {
        if (!task.recurrence || task.recurrence === 'none' || !task.dueDate || task.status !== 'done') return;
        const parts    = task.dueDate.split('-');
        const taskDate = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
        const dayDiff  = Math.floor((today - taskDate) / 86400000);
        if (dayDiff < 0) return;
        let newDueDate = new Date(taskDate);
        let shouldCreate = false;
        if (task.recurrence === 'daily' && dayDiff > 0) { newDueDate.setDate(taskDate.getDate() + dayDiff + 1); shouldCreate = true; }
        else if (task.recurrence === 'weekly' && dayDiff >= 7) { newDueDate.setDate(taskDate.getDate() + 7 * (Math.floor(dayDiff/7)+1)); shouldCreate = true; }
        else if (task.recurrence === 'monthly' && dayDiff >= 28) { newDueDate.setMonth(taskDate.getMonth() + Math.floor(dayDiff/28)+1); shouldCreate = true; }
        if (shouldCreate) {
          const nd = newDueDate;
          state.tasks.push(Object.assign({}, task, {
            id: Date.now().toString() + Math.random(),
            status: 'todo', progress: 0,
            dueDate: nd.getFullYear() + '-' + String(nd.getMonth()+1).padStart(2,'0') + '-' + String(nd.getDate()).padStart(2,'0'),
          }));
        }
      });
      return dbSet('recurring', todayStr);
    }).catch(function() {});
  };

    const today = new Date(); today.setHours(0,0,0,0); taskDate.setHours(0,0,0,0);

    if (diff === 0) return 'Today';

    if (diff === -1) return '1 day overdue';

  // SVG DONUT CHART helper
  const donutChart = function(segments, size, label, sublabel) {
    // segments: [{value, color, title}]
    size = size || 120;
    const cx = size/2, cy = size/2, r = size*0.38, stroke = size*0.13;
    const total = segments.reduce(function(s,x){return s+x.value;},0);
    if (!total) {
      return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
        + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="' + stroke + '"/>'
        + '<text x="' + cx + '" y="' + (cy-4) + '" text-anchor="middle" fill="var(--text-muted)" font-size="' + (size*0.13) + '" font-family="Georgia,serif" font-weight="600">-</text>'
        + '</svg>';
    }
    const circ = 2 * Math.PI * r;
    let offset = 0;
    let paths = '';
    segments.forEach(function(seg) {
      if (!seg.value) return;
      const dash = (seg.value / total) * circ;
      const gap = circ - dash;
      paths += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + seg.color + '" stroke-width="' + stroke + '"'
        + ' stroke-dasharray="' + dash + ' ' + gap + '"'
        + ' stroke-dashoffset="' + (-offset) + '"'
        + ' style="transform:rotate(-90deg);transform-origin:' + cx + 'px ' + cy + 'px;" >'
        + (seg.title ? '<title>' + escapeHtml(seg.title) + ': ' + seg.value + '</title>' : '')
        + '</circle>';
      offset += dash;
    });
    return '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">'
      + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="var(--border)" stroke-width="' + stroke + '"/>'
      + paths
      + '<text x="' + cx + '" y="' + (cy+3) + '" text-anchor="middle" fill="var(--text-primary)" font-size="' + (size*0.16) + '" font-family="Georgia,serif" font-weight="700">' + escapeHtml(String(label)) + '</text>'
      + (sublabel ? '<text x="' + cx + '" y="' + (cy + size*0.14) + '" text-anchor="middle" fill="var(--text-muted)" font-size="' + (size*0.09) + '" font-family="Georgia,serif">' + escapeHtml(sublabel) + '</text>' : '')
      + '</svg>';
  };

  const renderDashboard = function() {
    const total = state.tasks.length;
    const done = state.tasks.filter(function(t){return t.status==='done';}).length;
    const inProg = state.tasks.filter(function(t){return t.status==='in-progress';}).length;
    const confirmed = state.tasks.filter(function(t){return t.status==='confirmed';}).length;
    const todo = state.tasks.filter(function(t){return t.status==='todo';}).length;
    const overdueCnt = state.tasks.filter(isOverdue).length;
    const highCnt = state.tasks.filter(function(t){return t.priority==='high'&&t.status!=='done';}).length;
    const medCnt = state.tasks.filter(function(t){return t.priority==='medium'&&t.status!=='done';}).length;
    const lowCnt = state.tasks.filter(function(t){return t.priority==='low'&&t.status!=='done';}).length;
    const pct = total === 0 ? 0 : Math.round(done/total*100);

    // Tasks by category
    const catCounts = {};
    state.tasks.forEach(function(t){
      if(t.category){ catCounts[t.category] = (catCounts[t.category]||0)+1; }
    });
    const recent = state.tasks.slice().sort(function(a,b){
      if(isOverdue(a)&&!isOverdue(b)) return -1;
      if(!isOverdue(a)&&isOverdue(b)) return 1;
      if(a.status==='done'&&b.status!=='done') return 1;
      if(a.status!=='done'&&b.status==='done') return -1;
      const p={high:0,medium:1,low:2};
      return (p[a.priority]||2)-(p[b.priority]||2);
    }).slice(0,5);

    // Status donut
    const statusSegs = [
      {value:done,      color:'var(--success)',  title:'Done'},
      {value:inProg,    color:'var(--warning)',  title:'In Progress'},
      {value:confirmed, color:'var(--gold)',      title:'Confirmed'},
      {value:todo,      color:'var(--text-muted)',title:'To Do'},
    ];

    // Priority donut (active tasks only)
    const prioSegs = [
      {value:highCnt, color:'var(--danger)', title:'High'},
      {value:medCnt, color:'var(--warning)', title:'Medium'},
      {value:lowCnt, color:'var(--success)', title:'Low'},
    ];

    // Category donut
    const catKeys = Object.keys(catCounts);

  // TASK TRACKER
  const renderTasks = function() {
    const filters = ['all','todo','in-progress','confirmed','done','high','medium','low'];
    const tf = window.taskFilter || 'all';
    let filtered = state.tasks.slice();
    if (['todo','in-progress','confirmed','done'].indexOf(tf) >= 0) filtered = filtered.filter(function(t){return t.status===tf;});
    else if (['high','medium','low'].indexOf(tf) >= 0) filtered = filtered.filter(function(t){return t.priority===tf;});
    filtered.sort(function(a,b){
      if(isOverdue(a)&&!isOverdue(b)) return -1;
      if(!isOverdue(a)&&isOverdue(b)) return 1;
      const p={high:0,medium:1,low:2};
      return (p[a.priority]||2)-(p[b.priority]||2);
    });
    let html = '<div class="main-header"><div><h1 class="main-title">Planning Checklist</h1><p class="main-subtitle">Manage all wedding tasks</p></div>'
      + '<button class="btn btn-primary" onclick="openTaskModal()">' + icons.plus + ' New Task</button></div>'
      + '<div class="card" style="margin-bottom:16px;"><div class="filter-bar" style="display:flex;gap:8px;flex-wrap:wrap;">';
    filters.forEach(function(f) {
      const cnt = ['all','todo','in-progress','confirmed','done'].indexOf(f)>=0 ? ' (' + state.tasks.filter(function(t){return f==='all'||t.status===f;}).length + ')' : '';
      const label = f==='all'?'All':f==='in-progress'?'In Progress':f.charAt(0).toUpperCase()+f.slice(1);
      html += '<button class="btn ' + (tf===f?'btn-primary':'btn-secondary') + '" onclick="setTaskFilter(\'' + f + '\')" style="font-size:12px;">' + label + cnt + '</button>';
    });
    html += '</div></div><div class="card"><h3 class="card-title">Tasks (' + filtered.length + ')</h3><div class="task-list">';
    if (filtered.length) {
      filtered.forEach(function(t) {
        const overdue = isOverdue(t);
        html += '<div class="task-item priority-' + t.priority + (overdue?' overdue':'') + '" onclick="openTaskModal(\'' + t.id + '\')">'
          + '<div class="task-checkbox ' + (t.status==='done'?'checked':'') + '" onclick="event.stopPropagation();toggleTask(\'' + t.id + '\')">' + icons.check + '</div>'
          + '<div style="flex:1;"><span class="task-title ' + (t.status==='done'?'done':'') + '">' + escapeHtml(t.title) + '</span>'
          + (t.progress>0?progressBar(t.progress):'') + '</div>'
          + '<span class="tag tag-' + t.priority + '">' + t.priority + '</span>'
          + '<span class="tag tag-' + t.status + '">' + t.status.replace('-',' ') + '</span>'

          + '</div>';
      });
    } else {
      html += '<div style="color:var(--text-muted);padding:16px;">No tasks match this filter</div>';
    }
    html += '</div></div>';
    return html;

  // WEEKLY PLANNER

  // GANTT
  const renderGantt = function() {
    const today = new Date();
    const startDate = new Date(today); startDate.setDate(today.getDate() - 5);
    const days = [];
    for (let i = 0; i < 30; i++) {
      const d = new Date(startDate); d.setDate(startDate.getDate() + i);
      days.push(d);
    }
    const ts = todayStr();
    const tasks = state.tasks.filter(function(t){return (t.dueDate||t.startDate)&&t.status!=='done';});
    tasks.sort(function(a,b){const p={high:0,medium:1,low:2};return (p[a.priority]||2)-(p[b.priority]||2);});

    const getRange = function(t) {
      const pd = function(s) {
        if (!s) return null;
        const p = s.split('-');
        return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
      };
      const start = pd(t.startDate)||pd(t.dueDate);
      const end = pd(t.dueDate)||pd(t.startDate);
      if (!start||!end) return null;
      const sd = Math.floor((start-startDate)/86400000);
      const ed = Math.floor((end-startDate)/86400000);
      if ((sd<0&&ed<0)||(sd>29&&ed>29)) return null;
      const bs = Math.max(0,Math.min(29,sd));
      const be = Math.max(bs,Math.min(29,ed));
      return {bs:bs,be:be};
    };

    let html = '<div class="main-header"><div><h1 class="main-title">Gantt Chart</h1><p class="main-subtitle">30-day project timeline</p></div>'
      + '<button class="btn btn-primary" onclick="openTaskModal()">' + icons.plus + ' New Task</button></div>'
      + '<div class="card" style="overflow-x:auto;">'
      + '<table style="border-collapse:collapse;min-width:1100px;width:100%;">'
      + '<tr><th style="background:var(--bg-tertiary);padding:8px 10px;text-align:left;font-size:12px;border:1px solid var(--border);min-width:160px;">Task</th>';
    days.forEach(function(d,i) {
      const isToday = localDate(d) === ts;
      const isWeekend = d.getDay()===0||d.getDay()===6;
      html += '<th style="background:' + (isToday?'var(--accent)':isWeekend?'var(--bg-hover)':'var(--bg-tertiary)') + ';padding:4px 2px;text-align:center;font-size:9px;color:' + (isToday?'#000':'var(--text-muted)') + ';border:' + (i%7===6?'2px':'1px') + ' solid var(--border);min-width:28px;">'
        + ['Su','Mo','Tu','We','Th','Fr','Sa'][d.getDay()] + '<br>' + d.getDate() + '</th>';
    });
    html += '</tr>';
    if (tasks.length) {
      tasks.forEach(function(t) {
        const range = getRange(t);
        if (!range) return;
        const color = t.status==='in-progress'?'var(--warning)':t.status==='confirmed'?'var(--gold)':'var(--success)';
        html += '<tr><td style="background:var(--bg-secondary);padding:8px 10px;font-size:12px;cursor:pointer;border:1px solid var(--border);" onclick="openTaskModal(\'' + t.id + '\')" title="' + escapeHtml(t.title) + '">'
          + '<span class="tag tag-' + t.priority + '" style="font-size:9px;padding:1px 4px;">' + t.priority[0].toUpperCase() + '</span> '
          + escapeHtml(t.title.length>16?t.title.slice(0,16)+'...':t.title) + '</td>';
        days.forEach(function(d,i) {
          const inRange = i>=range.bs&&i<=range.be;
          html += '<td style="background:var(--bg-secondary);padding:2px;position:relative;border:' + (i%7===6?'2px':'1px') + ' solid var(--border);height:32px;">'
            + (inRange?'<div style="position:absolute;left:2px;right:2px;top:4px;bottom:4px;background:' + color + ';border-radius:3px;"></div>':'')
            + '</td>';
        });
        html += '</tr>';
      });
    } else {
      html += '<tr><td colspan="31" style="background:var(--bg-secondary);padding:20px;text-align:center;color:var(--text-muted);border:1px solid var(--border);">No active tasks with dates.</td></tr>';
    }
    html += '</table></div>';
    return html;
  };

      const el = document.createElement('div');
      el.style.cssText = 'position:fixed;width:10px;height:10px;border-radius:50%;z-index:9999;pointer-events:none;';
      el.style.left = Math.random()*100 + '%';
      el.style.top = '-10px';
      el.style.background = colors[Math.floor(Math.random()*colors.length)];
      el.style.setProperty('--tx', (Math.random()-0.5)*200 + 'px');

    reader.onload=function(ev){
      try{
        const d=JSON.parse(ev.target.result);
        if(!d.tasks){showToast('Invalid file format');return;}
        delete d._exported; delete d._app; delete d._source;
        if(!d.budget) d.budget=[];
        if(!d.goals) d.goals=[];
        if(!d.habits) d.habits=[];
        state=Object.assign({},state,d);
        save(); render(); showToast('Data imported successfully');
      }catch(err){showToast('Invalid JSON file');}
    };
    reader.readAsText(file);

      ceremonyVenue:        g('ceremony-venue'),
      receptionVenue:       g('reception-venue'),
      guestCountCeremony:   g('guest-ceremony'),
      guestCountReception:  g('guest-reception'),
      weddingStyle:         g('wedding-style'),
      colorPalette:         g('color-palette'),
      budgetTotal:          g('budget-total'),
      cateringStyle:        g('catering-style'),
      plannerRole:          g('planner-role'),
    });
    save(); render();
  };

  window.addCategory = function() {
    const name = (document.getElementById('category-name')||{}).value||'';
    if(!name.trim()) return;
    const colors = ['--category-business','--category-personal','--category-health','--category-family','--category-social','--category-work','--category-learning','--category-finance'];
    state.categories.push({id:name.toLowerCase().replace(/\s+/g,'-'),name:name.trim(),color:colors[state.categories.length%colors.length]});
    save(); render(); showToast('Category added');
  };
  window.deleteCategory = function(id) { state.categories=state.categories.filter(function(c){return c.id!==id;});save();render();showToast('Category deleted'); };

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      if(searchQuery){clearSearch();return;}
      if(pendingDeleteTaskId||pendingDeleteTeamMemberId||pendingResetData){cancelDelete();return;}
      if(taskModalOpen){closeTaskModal();return;}
      if(settingsModalOpen){closeSettings();return;}
      if(teamModalOpen){closeTeamModal();return;}
      if(budgetModalOpen){closeBudgetModal();return;}
      if(habitModalOpen){closeHabitModal();return;}
      if(goalModalOpen){closeGoalModal();return;}
    }
    if (e.key === 'n' && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
      if(!taskModalOpen&&!settingsModalOpen) openTaskModal();
    }
  });

  const hideLoader = function() {
    const el = document.getElementById('loading-screen');
    if (el) el.style.display = 'none';
  };
  openDB()
    .then(function() { return load(); })
    .then(function() { return generateRecurringTasks(); })
    .then(function() { render(); hideLoader(); })
    .catch(function() { render(); hideLoader(); });
</script>
</body>
</html>
